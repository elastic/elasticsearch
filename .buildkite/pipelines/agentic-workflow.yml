---
# yaml-language-server: $schema=https://raw.githubusercontent.com/buildkite/pipeline-schema/main/schema.json
#
# elasticsearch-agentic-workflow
#
# On-demand agentic CI workflows powered by the self-contained pi-agent CLI
# (https://github.com/elastic/rene-bk-experiments). pi runs directly on the
# agent — no remote pipeline trigger and no .pi/ config in this repo. The
# pre-command hook bootstraps pi-agent and injects secrets when USE_PI_AGENT=true.
#
# Supported workflows:
#   test-analysis          — analyse a test-failure issue        (needs ISSUE_URL)
#   pull-request-fix       — self-heal a failing pull request    (needs PR_URL)
#   pull-request-creation  — implement a task and open a PR      (needs ISSUE_URL)
#
# Trigger from the Buildkite UI (set WORKFLOW in the Environment Variables field
# of the New Build dialog) or via the Buildkite API, e.g.:
#   curl -X POST ".../pipelines/elasticsearch-agentic-workflow/builds" \
#     -H "Authorization: Bearer $BUILDKITE_API_TOKEN" \
#     -d '{"branch":"main","env":{
#            "WORKFLOW":"test-analysis",
#            "ISSUE_URL":"https://github.com/elastic/elasticsearch/issues/150989"}}'

# Expose trigger vars at pipeline level so they are visible to step `if`
# conditions and are shown in the Buildkite UI for API-triggered builds.
# WORKFLOW must be set explicitly when triggering — this pipeline does not
# run on branch pushes and has no input step (Buildkite skips input steps
# for webhook-triggered builds, making them unreliable for this use case).
env:
  WORKFLOW:  "${WORKFLOW:-}"
  ISSUE_URL: "${ISSUE_URL:-}"
  PR_URL:    "${PR_URL:-}"

steps:
  # ── Run pi-agent ─────────────────────────────────────────────────────────────
  - label: ":robot_face: Pi — :workflow:"
    key: pi-run
    timeout_in_minutes: 60
    env:
      USE_PI_AGENT: "true"
    agents:
      provider:       gcp
      image:          family/elasticsearch-ubuntu-2404
      machineType:    n4-standard-16
      diskType:       hyperdisk-balanced
      buildDirectory: /dev/shm/bk
    retry:
      automatic:
        - exit_status: "*"
          limit: 1
    command: |
      set -euo pipefail

      # ── Validate inputs ────────────────────────────────────────────────────
      case "${WORKFLOW}" in
        test-analysis)
          [[ -n "${ISSUE_URL:-}" ]] || { echo "ISSUE_URL is required for test-analysis" >&2; exit 1; }
          ;;
        pull-request-fix)
          [[ -n "${PR_URL:-}" ]] || { echo "PR_URL is required for pull-request-fix" >&2; exit 1; }
          ;;
        pull-request-creation)
          [[ -n "${ISSUE_URL:-}" ]] || { echo "ISSUE_URL is required for pull-request-creation" >&2; exit 1; }
          ;;
        *)
          echo "WORKFLOW is not set or not recognised: '${WORKFLOW:-}'" >&2
          echo "Trigger this pipeline with WORKFLOW set to one of:" >&2
          echo "  test-analysis | pull-request-fix | pull-request-creation" >&2
          echo "From the Buildkite UI: set WORKFLOW in the 'Environment Variables' field of the New Build dialog." >&2
          echo "From the API: include WORKFLOW in the env block of the build request." >&2
          exit 1
          ;;
      esac

      # ── Opening annotation (visible immediately in the Buildkite UI) ───────
      REF="${ISSUE_URL:-${PR_URL:-}}"
      buildkite-agent annotate \
        "### 🤖 pi-agent starting\n\n**Workflow:** \`${WORKFLOW}\`  \n**Ref:** ${REF}  \nSession is initialising…" \
        --context "pi-agent-progress" --style "info"

      # ── Run pi-agent ───────────────────────────────────────────────────────
      PI_EXIT=0
      case "${WORKFLOW}" in
        test-analysis)       pi-agent analyze --issue-url "${ISSUE_URL}" || PI_EXIT=$? ;;
        pull-request-fix)    pi-agent fix-pr  --pr-url    "${PR_URL}"    || PI_EXIT=$? ;;
        pull-request-creation) pi-agent create --issue-url "${ISSUE_URL}" || PI_EXIT=$? ;;
      esac

      # ── Final annotation ───────────────────────────────────────────────────
      if [[ $PI_EXIT -eq 0 ]]; then
        buildkite-agent annotate \
          "### ✅ pi-agent completed\n\n**Workflow:** \`${WORKFLOW}\`  \n**Ref:** ${REF}" \
          --context "pi-agent-progress" --style "success"
      else
        buildkite-agent annotate \
          "### ❌ pi-agent failed (exit ${PI_EXIT})\n\n**Workflow:** \`${WORKFLOW}\`  \n**Ref:** ${REF}  \nSee the job log for details." \
          --context "pi-agent-progress" --style "error"
      fi

      exit $PI_EXIT

config:
  trigger-phrase: '.*run\W+elasticsearch-ci/bwc.*'
  skip-labels:
    - ">test-mute"
    - "test-full-bwc"
steps:
  - group: bwc-snapshots
    steps:
      - label: "{{matrix.BWC_VERSION}} / Part 1 / bwc-snapshots"
        key: "bwc-snapshots-part1"
        command: .ci/scripts/run-gradle.sh -Dignore.tests.seed -Dtests.bwc.mode=auto v{{matrix.BWC_VERSION}}#bwcTestPart1
        timeout_in_minutes: 300
        matrix:
          setup:
            BWC_VERSION: $SNAPSHOT_BWC_VERSIONS
        agents:
          provider: gcp
          image: family/elasticsearch-ubuntu-2404
          machineType: n4-standard-16
          preemptible: true
          spotZones: 'asia-south2-a,asia-south2-b,asia-south2-c,europe-west2-a,europe-west2-b,europe-west2-c,northamerica-northeast2-b,northamerica-northeast2-c,southamerica-east1-a,southamerica-east1-b,southamerica-east1-c'
          diskType: hyperdisk-balanced
          buildDirectory: /dev/shm/bk
      - label: "{{matrix.BWC_VERSION}} / Part 2 / bwc-snapshots"

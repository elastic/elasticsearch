config:
  allow-labels:
    - ":Analytics/ES|QL"
    - ":ml/ES|QL"
    - ":Search Relevance/ES|QL"
    - ":StorageEngine/ES|QL"
steps:
  - group: esql-release-tests
    steps:
      - label: "{{matrix.TASK_SET}} / release-tests"
        key: "esql-release-tests-{{matrix.TASK_SET}}"
        command: bash .buildkite/scripts/esql-release-tests.sh {{matrix.TASK_SET}}
        timeout_in_minutes: 120
        matrix:
          setup:
            TASK_SET:
              - esql-engine
              - esql-qa
              - esql-datasource-core
              - esql-datasource-qa
        agents:
          provider: gcp
          image: family/elasticsearch-ubuntu-2404
          diskSizeGb: 350
          machineType: n4-custom-32-98304
          diskType: hyperdisk-balanced

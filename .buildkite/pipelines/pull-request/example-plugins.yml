config:
  included-regions:
    - build-conventions/.*
    - build-tools/.*
    - build-tools-internal/.*
    - plugins/examples/.*
steps:
  - label: example-plugins
    command: |-
      cd $$WORKSPACE/plugins/examples

      $$WORKSPACE/.ci/scripts/run-gradle.sh -Dorg.gradle.jvmargs=-Xmx8g build --include-build $$WORKSPACE
    timeout_in_minutes: 300
    agents:
      provider: gcp
      zones: us-east1-b,us-east1-c,us-east1-d,us-west1-a,us-west1-b,us-west1-c
      image: family/elasticsearch-ubuntu-2404
      machineType: custom-32-98304
      buildDirectory: /dev/shm/bk

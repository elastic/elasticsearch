config:
  skip-labels:
    - ">test-mute"
    - ":Delivery/Packaging"
steps:
  - group: packaging-tests-unix-sample
    steps:
      - label: "{{matrix.image}} / {{matrix.PACKAGING_TASK}} / packaging-tests-unix-sample"
        key: "packaging-tests-unix-sample"
        command: ./.ci/scripts/packaging-test.sh $$PACKAGING_TASK
        timeout_in_minutes: 300
        matrix:
          setup:
            image:
              - rhel-8
              - ubuntu-2404
            PACKAGING_TASK:
              - destructiveDistroTest.docker
              - destructiveDistroTest.packages
              - destructiveDistroTest.archives
        agents:
          provider: gcp
          image: family/elasticsearch-{{matrix.image}}
          diskSizeGb: 350
          machineType: n4-standard-8
          diskType: hyperdisk-balanced
          preemptible: true
          spotZones: 'asia-south2-a,asia-south2-b,asia-south2-c,europe-west2-a,europe-west2-b,europe-west2-c,northamerica-northeast2-b,northamerica-northeast2-c,southamerica-east1-a,southamerica-east1-b,southamerica-east1-c'
        env:
          USE_PROD_DOCKER_CREDENTIALS: "true"
          PACKAGING_TASK: "{{matrix.PACKAGING_TASK}}"

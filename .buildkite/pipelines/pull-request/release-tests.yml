config:
  allow-labels: test-release
steps:
  - group: release-tests
    steps:
      - label: "{{matrix.CHECK_TASK}} / release-tests"
        key: "packaging-tests-unix"
        command: .buildkite/scripts/release-tests.sh {{matrix.CHECK_TASK}}
        timeout_in_minutes: 120
        matrix:
          setup:
            CHECK_TASK:
              - checkPart1
              - checkPart2
              - checkPart3
              - checkPart4
              - checkPart5
              - checkPart6
        agents:
          provider: gcp
          image: family/elasticsearch-ubuntu-2404
          diskSizeGb: 350
          machineType: n4-standard-32
          diskType: hyperdisk-balanced
          preemptible: true
          spotZones: us-east1-b,us-east1-c,us-east1-d,us-central1-a,us-central1-b,us-central1-c,us-central1-f,us-west1-a,us-west1-b

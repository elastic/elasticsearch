name: docs-build

on:
  push:
    branches:
      - main
  pull_request_target: ~
  merge_group: ~

jobs:
  docs-preview:
    uses: elastic/docs-builder/.github/workflows/preview-build.yml@42b43e9b1093f392298afa717c8bf9c67e47e4c7 # main
    with:
      enable-vale-linting: true
      include-paths: |
        docs/reference/**
        docs/extend/**
        !docs/reference/query-languages/esql/**
      path-pattern: docs/**
      path-pattern-ignore: docs/changelog/**/*.yaml
      enable-cumulative-comment: true
    permissions:
      deployments: write
      id-token: write
      contents: read
      pull-requests: write

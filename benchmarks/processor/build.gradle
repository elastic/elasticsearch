// Minimal build for the ExtraParam annotation processor.
// Intentionally does not apply ElasticsearchJavaBasePlugin to avoid pulling
// in the full ES build machinery. No external dependencies needed — the
// processor only uses javax.annotation.processing from the JDK.
apply plugin: 'java-library'

java {
  toolchain {
    languageVersion = JavaLanguageVersion.of(21)
  }
}

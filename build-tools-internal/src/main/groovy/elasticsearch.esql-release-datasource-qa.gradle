def releaseTestCheck = tasks.register('releaseTestCheck') {
  group = 'Verification'
  description = 'Runs release checks for ESQL datasource QA projects.'
  dependsOn 'check'
  if (buildParams.snapshotBuild == false) {
    dependsOn 'assemble'
  }
}

rootProject.tasks.named('releaseTestCheckEsqlDatasourceQa').configure {
  dependsOn releaseTestCheck
}

/**
 * This plugin is used to apply common configuration to all stateless plugins.
 * It is applied by convention in the build.gradle of each stateless plugin.
 */

// New path: plain Test tasks enrolled via RestTestBasePlugin / JUnit-rule-based test clusters
plugins.withType(RestTestBasePlugin) {
  restTests.tasks.configureEach {
    onlyIf("stateless tests skipped on windows") { OS.current() != OS.WINDOWS }
  }
}

// Legacy path: Gradle test-cluster framework (LegacyRestTestBasePlugin).
// Must remain unconditional so that projects not using RestTestBasePlugin still receive this guard.
tasks.withType(StandaloneRestIntegTestTask).configureEach {
  onlyIf("stateless tests skipped on windows") { OS.current() != OS.WINDOWS }
}

project.extensions.configure(PluginPropertiesExtension) {
  // All stateless plugins are stateless only, so we can set this by convention here.
  it.deploymentTarget = "STATELESS_ONLY"
}

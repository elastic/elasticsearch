import org.elasticsearch.gradle.VersionProperties
import org.elasticsearch.gradle.internal.docker.NativeImageBuildTask
import org.elasticsearch.gradle.internal.precommit.CheckForbiddenApisTask

apply plugin: 'elasticsearch.build'

configurations {
  nativeLinuxX64 {
    canBeConsumed = true
    canBeResolved = false
  }
  nativeLinuxAarch64 {
    canBeConsumed = true
    canBeResolved = false
  }
}

dependencies {
  implementation project(':libs:server-launcher-common')
  implementation project(':libs:cli-terminal')
  testImplementation project(':test:framework')
}

tasks.withType(CheckForbiddenApisTask).configureEach {
  // ServerLauncher uses various forbidden APIs such as System.exit() and printing directly to stdout and stderr.
  enabled = false
}

// --- GraalVM native-image build (Linux only, Docker-based) ---
def graalVmMajor = "25" // A relatively recent LTS version
def nativeImageImage = "ghcr.io/graalvm/native-image-community:${graalVmMajor}-ol8"
def launcherMainClass = 'org.elasticsearch.server.launcher.ServerLauncher'

def nativeImageLinuxX64 = tasks.register('nativeImageLinuxX64', NativeImageBuildTask) {
  description = 'Builds Linux x86_64 native server-launcher binary via Docker'
  group = 'build'
  classpath = sourceSets.main.runtimeClasspath
  imageTag = nativeImageImage
  platform = 'linux/amd64'
  mainClass = launcherMainClass
  // Use the AMD64 baseline so the binary runs on any x86_64 CPU; GraalVM 25 defaults to v3 which requires AVX2.
  extraArgs = ['-march=compatibility']
  outputFile = layout.buildDirectory.file('native/linux-x86_64/server-launcher')
}

def nativeImageLinuxAarch64 = tasks.register('nativeImageLinuxAarch64', NativeImageBuildTask) {
  description = 'Builds Linux aarch64 native server-launcher binary via Docker'
  group = 'build'
  classpath = sourceSets.main.runtimeClasspath
  imageTag = nativeImageImage
  platform = 'linux/arm64'
  mainClass = launcherMainClass
  outputFile = layout.buildDirectory.file('native/linux-aarch64/server-launcher')
}

artifacts {
  nativeLinuxX64(nativeImageLinuxX64)
  nativeLinuxAarch64(nativeImageLinuxAarch64)
}

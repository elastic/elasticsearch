area: CCS
breaking:
  area: REST API
  details: Cluster exclusions in cross-cluster search index expressions are now processed
    left-to-right, matching the existing behavior of index exclusions. An exclusion
    only applies to clusters already included by a preceding expression.
  impact: Queries that place a cluster exclusion before the corresponding inclusion
    (e.g., `/-remote1:*,*:*/_search`) will now return an error. Reorder expressions
    so that exclusions follow inclusions (e.g., `/*:*,-remote1:*/_search`).
  notable: false
  title: Order remote cluster exclusions
issues: []
pr: 143338
summary: Correctly handle order for remote cluster exclusions in CCS. An exclusion
  affects targets listed before it and has no impact on targets listed after it.
type: breaking

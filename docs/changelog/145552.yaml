area: TSDB
breaking:
  area: TSDB
  details: >-
    Reduce the time series look ahead time to 9 minutes, this means that the benefits of a rollover
    will take effect sooner in a time series data stream. However, this also means that documents with
    `@timestamp` more than 9 minutes in the future will be rejected since their timestamp will be out of bounds.
  impact: >-
    This change will make the rollover more effective; a side-effect is that the future time window will also be
    reduced to 9 minutes.
  notable: true
  title: Decrease tsdb `look_ahead_time` to 9 minutes
issues:
 - 142602
pr: 145552
summary: >-

  In standard data streams, when a rollover occurs the ingestion traffic is routed directly to
  the new backing index, this has two benefits:

  - changes in the settings or mappings will take effect immediately,
  - the old index will not keep accepting new data if the rollover conditions were met.

  In time series data streams (TSDS) all backing indices are potentially write indices because the
  documents are being routed to the right backing index based on their `@timestamp`. Assuming that
  the majority of ingestion traffic has a current `@timestamp`, after a rollover occurs, there is a
  delay up to `index.look_ahead_time` for the majority of the ingestion traffic to be routed to the
  new index. This delays the benefits of writing to to the new index.

  In {es} `9.4.0`, we reduce this delay from 30 minutes to 9 minutes. This will make the rollover more effective.
  However, there is the side-effect that documents with `@timestamp` more than 9 minutes in the future will be
  rejected since their timestamp will be out of bounds.

  In order to revert this, you can set the `index.look_ahead_time` back to 30 minutes in the data stream's composable
  or component templates.
type: "breaking"

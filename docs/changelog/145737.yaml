area: TSDB
breaking:
  area: Metrics
  details: Sequence numbers get trimmed in time-series indices once they are no longer needed for replication.
  impact: Optimistic concurrency control is no longer applicable to these indices.
    `update_by_query` and `delete_by_query` operations are supported with relaxed consistency semantics.
  notable: true
  title: Disable sequence numbers for indices in time-series mode
issues:
  - 136305
pr: 145737
summary: >-

  Sequence numbers have significant storage footprint in metrics applications (up to 30% for OTLP). To alleviate this,
  we are disabling sequence numbers for indices in time-series mode, meaning that they get trimmed once they are no
  longer needed for replication. This helps with storage efficiency, as well as reducing the overhead for segment merging.

  The downside is that [Optimistic Concurrency Control](https://www.elastic.co/docs/reference/elasticsearch/rest-apis/optimistic-concurrency-control)
  is no longer applicable to these indices. Index, update and delete operations using `if_seq_no` error out, and
  search calls with `seq_no_primary_term` set return sentinel values for sequence numbers. Moreover, `update_by_query`
  and `delete_by_query` operations proceed without conflict detection, so concurrent modifications may silently
  overwrite the affected docs without triggering version conflict errors.

  This is largely a favorable tradeoff as concurrent modifications are rather rare in metrics applications and the
  storage savings are substantial. Still, users requiring OCC support can restore the old behavior by setting
  `index.disable_sequence_numbers` to `false` in their time-series index templates.

type: "breaking"

area: Mapping
highlight:
  body: "Two new index modes, `columnar` and `logsdb_columnar`, are now available\
    \ as\na Tech Preview. With columnar mode enabled, Elasticsearch becomes a full\n\
    analytical and search columnar store.\n\nFields are stored **once, as doc values\
    \ only** — no inverted index or BKD\ntree is maintained by default, which eliminates\
    \ redundant index structures\nand significantly reduces the storage footprint.\
    \ Doc values skippers\n(compact skip lists with min/max metadata) are enabled\
    \ by default for number based fields, \nallowing large blocks of documents to\
    \ be skipped without scanning individual values.\nLater doc value skippers will\
    \ be enabled for all fields where applicable.\n\nMappings are always flat: object\
    \ and passthrough fields are auto-flattened\nto leaf fields at mapping time. The\
    \ original document source is not stored;\nthe columnar source is generated on\
    \ the fly from doc values at query time.\nOptionally, a pre-built columnar representation\
    \ can be stored on disk using\nthe new `columnar_stored` source mode.\n\nNew multi-value\
    \ semantics: the original ordering of multiple values per field \nper document\
    \ (e.g., in arrays) is preserved by default. Optionally, fields in \nmappings\
    \ can be configured to only allow one value per document.\n\n**Single-value enforcement**\
    \ (`doc_values.multi_value: false`): reject\ndocuments that provide more than\
    \ one value for a field, enabling tighter\ncolumnar encoding and stronger schema\
    \ guarantees.\n\n**Required-value enforcement** (`doc_values.nullability: false`):\
    \ reject\ndocuments that omit a field or supply an explicit `null`.\n\n`logsdb_columnar`\
    \ adds logging-oriented defaults on top of the columnar\nfoundation: a default\
    \ `@timestamp` mapping, and index sorting on `host.name`\nand `@timestamp` when\
    \ those fields are present. `columnar` provides the same\ncolumn-oriented storage\
    \ without use-case-specific defaults, suitable for\ngeneral-purpose indices and\
    \ data streams.\n\nImproved columnar storage: An optimized doc values format is\
    \ used by default, \nfurther reducing storage footprint, especially when combined\
    \ with index sorting."
  notable: true
  title: Columnar index mode (Tech Preview)

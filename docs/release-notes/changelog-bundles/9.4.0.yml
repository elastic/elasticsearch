  - pr: 141877
    summary: Deprecate the `default_metric` parameter in the `aggregate_metric_double` mapping configuration.
    area: Mapping
    type: deprecation
    issues:
      - 128356
    deprecation:
      area: Mapping
      title: Deprecate the `default_metric` in `aggregate_metric_double` field type.
      details: |-
        The `default_metric` parameter in the `aggregate_metric_double` used to determine which sub-field would be used in
        non-native operations, for example, the queries `range`, `term` and `exists`.
        In Elasticsearch `9.4`, we change this behaviour, the default metric value depends on the number of sub-fields:
        - When there are multiple sub-fields, the default is the average, calculated from `sum` and `value_count`.
        - When there is only a single sub-field, that sub-field's value is used directly.

        This change aims to both simplify the configuration of `aggregate_metric_double` and improve its use by non-native operations.
      impact: |-
        Users do not have to specify a `default_metric` anymore, they just need to configure the sub-fields `sum` and `value_count`
        unless the `aggregate_metric_double` only has one sub-field configured.`
      notable: false
      essSettingChange: false

apply plugin: 'elasticsearch.build'
apply plugin: 'elasticsearch.publish'

var arrowVersion = "18.3.0"

dependencies {
  // Arrow-vector
  api("org.apache.arrow:arrow-vector:${arrowVersion}")
  api("org.apache.arrow:arrow-format:${arrowVersion}")
  api("org.apache.arrow:arrow-memory-core:${arrowVersion}")
  api("org.apache.arrow:arrow-memory-unsafe:${arrowVersion}")

  api("org.checkerframework:checker-qual:3.42.0")
  api("com.google.flatbuffers:flatbuffers-java:23.5.26")

  // Pin Jackson newer than the repo-wide versions.jackson (2.15.0). Arrow 18.3.0 itself targets
  // Jackson 2.18+, and the esql-datasource-csv direct-to-block reader needs jackson-core 2.18+ for
  // NumberInput.parseDouble(char[], off, len, fastParser). Because Arrow is the source of the Jackson
  // bundled into the x-pack-esql plugin (esql:compute -> libs:arrow), aligning it here lets the
  // esql-datasource-* plugins that extend x-pack-esql resolve to this same Jackson, so their copies
  // are de-duplicated out of their bundles instead of tripping the plugin jar-hell check at boot.
  // jackson-annotations is released without a matching patch version, so it stays at 2.21.
  api("com.fasterxml.jackson.core:jackson-annotations:2.21")
  api("com.fasterxml.jackson.core:jackson-core:2.21.2")
  api("com.fasterxml.jackson.core:jackson-databind:2.21.2")

  implementation("org.slf4j:slf4j-api:${versions.slf4j}")
  runtimeOnly "org.slf4j:slf4j-nop:${versions.slf4j}"
}

tasks.named('forbiddenApisMain').configure {
  replaceSignatureFiles 'jdk-signatures'
}

tasks.named("thirdPartyAudit").configure {
  ignoreViolations(
    'org.apache.arrow.memory.util.MemoryUtil',
    'org.apache.arrow.memory.util.MemoryUtil$1',
  )
  ignoreMissingClasses(
    'org.apache.commons.codec.binary.Hex'
  )
}

tasks.named("dependencyLicenses").configure {
  mapping from: /arrow-.*/, to: 'arrow'
  mapping from: /jackson-.*/, to: 'jackson'
  mapping from: /slf4j-.*/, to: 'slf4j'
}

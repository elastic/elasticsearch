import org.elasticsearch.gradle.internal.precommit.CheckForbiddenApisTask

apply plugin: 'elasticsearch.publish'
apply plugin: 'elasticsearch.mrjar'
apply plugin: 'elasticsearch.foreign-api'

dependencies {
  api project(':libs:core')
  api project(':libs:logging')
  api project(':libs:foreign-adapter')

  testImplementation buildLibs.junit
}

tasks.withType(CheckForbiddenApisTask).configureEach {
  // :libs:foreign-library does not depend on server (and so not on lucene)
  replaceSignatureFiles 'jdk-signatures'
}

// Tests extend junit.framework.TestCase directly rather than LuceneTestCase, which
// is incompatible with the ES testing-conventions baseline (same reason as the processor).
tasks.named('testTestingConventions').configure { enabled = false }

apply plugin: 'elasticsearch.java'

// The annotation processor uses java.lang.classfile (finalized JDK 24, JEP 484) and
// java.lang.foreign (finalized JDK 22, JEP 454), requiring Java 25 at minimum.
def processorJavaVersion = JavaLanguageVersion.of(25)

tasks.withType(JavaCompile).configureEach {
  javaCompiler = javaToolchains.compilerFor { languageVersion = processorJavaVersion }
  options.release = processorJavaVersion.asInt()
}

tasks.named('javadoc').configure {
  javadocTool = javaToolchains.javadocToolFor { languageVersion = processorJavaVersion }
}

dependencies {
  implementation project(':libs:foreign-library')
  testImplementation buildLibs.junit
}

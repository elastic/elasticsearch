import org.elasticsearch.gradle.internal.precommit.CheckForbiddenApisTask

apply plugin: 'elasticsearch.publish'
apply plugin: 'elasticsearch.build'
apply plugin: 'elasticsearch.mrjar'
apply plugin: 'java-test-fixtures'

// The annotation processor (libs/ffm/processor) requires Java 24+ (java.lang.classfile API).
// Gradle's incremental annotation processing loads processors in the Gradle daemon JVM (JDK 21),
// which cannot load Java 24 class files. We bypass this by running javac as an external process
// using Exec + JDK 25, then include the generated class files in the main compilation classpath.
configurations {
  processorPath
}

def generatedLibraryClassesDir = layout.buildDirectory.dir('generated-library-classes')

// Run annotation processing only (-proc:only) using JDK 25 javac as an external process.
// This generates ZstdLibrary$Impl.class (and any other @NativeLibrary implementations)
// in a dedicated output directory, fully outside Gradle's incremental AP infrastructure.
tasks.register('runAnnotationProcessor', Exec) {
  dependsOn ':libs:ffm:assemble', ':libs:core:assemble', ':libs:logging:assemble',
            ':libs:ffm:processor:assemble'

  outputs.dir(generatedLibraryClassesDir)
  inputs.files(sourceSets.main.java)
  inputs.files(configurations.processorPath)
  // Also depend on the compile classpath JARs (e.g. annotation definitions in libs/ffm)
  // so changes to annotation types or their module force the AP to re-run.
  inputs.files(configurations.compileClasspath)

  // Resolve project references at configuration time to avoid Task.project deprecation.
  def ffmDistDir = project(':libs:ffm').layout.buildDirectory.dir('distributions')
  def coreDistDir = project(':libs:core').layout.buildDirectory.dir('distributions')
  def loggingDistDir = project(':libs:logging').layout.buildDirectory.dir('distributions')
  def processorDistDir = project(':libs:ffm:processor').layout.buildDirectory.dir('distributions')

  doFirst {
    def outputDir = generatedLibraryClassesDir.get().asFile
    outputDir.mkdirs()

    def jdk25Compiler = javaToolchains.compilerFor {
      languageVersion = JavaLanguageVersion.of(25)
    }.get()
    def javacExe = "${jdk25Compiler.metadata.installationPath.asFile.absolutePath}/bin/javac"

    // Use distribution JARs (not raw class dirs) so the multi-release JAR is read correctly.
    // Exclude classifier JARs (sources, javadoc, tests) — we want the main artifact only.
    def findDistJar = { dirProvider ->
      dirProvider.get().asFile.listFiles()?.find { f ->
        f.name.endsWith('.jar') &&
        !f.name.contains('sources') &&
        !f.name.contains('javadoc') &&
        !f.name.contains('tests') &&
        !f.name.endsWith('.pom')
      }
    }

    def ffmJar = findDistJar(ffmDistDir)?.absolutePath
    def coreJar = findDistJar(coreDistDir)?.absolutePath
    def loggingJar = findDistJar(loggingDistDir)?.absolutePath
    def processorJar = findDistJar(processorDistDir)?.absolutePath

    if (!ffmJar || !coreJar || !loggingJar || !processorJar) {
      throw new GradleException(
        "Could not find distribution JARs. ffm=${ffmJar}, core=${coreJar}, " +
        "logging=${loggingJar}, processor=${processorJar}"
      )
    }

    def modulePath = [ffmJar, coreJar, loggingJar].join(File.pathSeparator)
    def processorModulePath = [processorJar, ffmJar, coreJar, loggingJar].join(File.pathSeparator)

    def sourceFiles = sourceSets.main.java.files.collect { it.absolutePath }

    commandLine = [javacExe,
      '-proc:only',
      '--module-path', modulePath,
      '--processor-module-path', processorModulePath,
      '-d', outputDir.absolutePath
    ] + sourceFiles
  }
}

// Include generated class files in the main jar so ZstdLibrary$Impl is available at runtime.
tasks.named('jar').configure {
  from generatedLibraryClassesDir
  dependsOn runAnnotationProcessor
}

tasks.named('compileJava').configure {
  dependsOn runAnnotationProcessor
  // Disable annotation processing in the main compilation (already done in runAnnotationProcessor).
  options.compilerArgs += ['-proc:none']
  // Patch the module being compiled with the generated class files so the compiler can
  // resolve ZstdLibrary$Impl (and any other generated types) within org.elasticsearch.nativeaccess.
  doFirst {
    def genDir = generatedLibraryClassesDir.get().asFile.absolutePath
    options.compilerArgs += ['--patch-module', "org.elasticsearch.nativeaccess=${genDir}"]
  }
}


dependencies {
  api project(':libs:ffm')
  api project(':libs:core')
  processorPath project(':libs:ffm:processor')
  api project(':libs:logging')
  testImplementation(project(":test:framework")) {
    exclude group: 'org.elasticsearch', module: 'native'
  }
}

tasks.named("test").configure {
  // this is necessary so that VectorSystemPropertyTests can invoke java
  systemProperty "tests.system_call_filter", "false"
}

tasks.named("forbiddenPatterns").configure {
  exclude '**/*.parquet'
}

tasks.withType(CheckForbiddenApisTask).configureEach {
  replaceSignatureFiles 'jdk-signatures'
}

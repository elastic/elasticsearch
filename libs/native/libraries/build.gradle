import org.elasticsearch.gradle.transform.UnzipTransform

apply plugin: 'base'

configurations {
  // Internal configuration: declares + resolves the per-platform binary distributions pulled from
  // the elasticsearch-native repository. Used only as input to `extractLibs`; never published.
  libs {
    attributes.attribute(ArtifactTypeDefinition.ARTIFACT_TYPE_ATTRIBUTE, ArtifactTypeDefinition.DIRECTORY_TYPE)
    canBeConsumed = false
  }
}

// Dedicated consumable variant carrying the extracted platform-specific native libraries
// (the `extractLibs` task output directory). Consumers must request this configuration
// explicitly via `project(path: ':libs:native:native-libraries', configuration: 'nativeLibs')`.
//
// We deliberately do NOT publish these binaries via the `default` configuration. If another
// plugin (e.g. `elasticsearch.build`) ends up applied to this project, its standard Java
// outputs would otherwise hijack `default` and silently break native library resolution for
// every test JVM (es.nativelibs.path) and for the distribution packaging. Keeping a named
// configuration here makes the contract explicit and resilient to such cross-project changes.
//
// Declared via the role-based factory because Gradle 9.x locks configuration usage at creation
// time — toggling `canBeConsumed`/`canBeResolved` post-creation on a legacy configuration is
// rejected with "Cannot change the allowed usage of configuration ...".
configurations.consumable('nativeLibs') {
  attributes.attribute(ArtifactTypeDefinition.ARTIFACT_TYPE_ATTRIBUTE, ArtifactTypeDefinition.DIRECTORY_TYPE)
}

var zstdVersion = "1.5.5"
var vecVersion = "1.0.19"

repositories {
  exclusiveContent {
    forRepository {
      maven {
        url = "https://artifactory.elastic.dev/artifactory/elasticsearch-native"
        metadataSources {
          artifact()
        }
      }
    }
    filter {
      includeModule("org.elasticsearch", "zstd")
      includeModule("org.elasticsearch", "vec")
      includeModule("org.elasticsearch", "es-parquet-rs")
    }
  }
}

dependencies {
  registerTransform(UnzipTransform, transformSpec -> {
    transformSpec.getFrom().attribute(ArtifactTypeDefinition.ARTIFACT_TYPE_ATTRIBUTE, ArtifactTypeDefinition.JAR_TYPE);
    transformSpec.getTo().attribute(ArtifactTypeDefinition.ARTIFACT_TYPE_ATTRIBUTE, ArtifactTypeDefinition.DIRECTORY_TYPE);
  });
  registerTransform(UnzipTransform, transformSpec -> {
    transformSpec.getFrom().attribute(ArtifactTypeDefinition.ARTIFACT_TYPE_ATTRIBUTE, ArtifactTypeDefinition.ZIP_TYPE);
    transformSpec.getTo().attribute(ArtifactTypeDefinition.ARTIFACT_TYPE_ATTRIBUTE, ArtifactTypeDefinition.DIRECTORY_TYPE);
  });
  libs "org.elasticsearch:zstd:${zstdVersion}:darwin-aarch64"
  libs "org.elasticsearch:zstd:${zstdVersion}:darwin-x86-64"
  libs "org.elasticsearch:zstd:${zstdVersion}:linux-aarch64"
  libs "org.elasticsearch:zstd:${zstdVersion}:linux-x86-64"
  libs "org.elasticsearch:zstd:${zstdVersion}:windows-x86-64"
  // if testing locally, its assumed that the custom compiled binaries are copied to the correct directory
  // See `simdvec/native/Makefile` for details on how to compile locally
  if (System.getenv("LOCAL_VEC_BINARY_OS") == null){
    libs "org.elasticsearch:vec:${vecVersion}@zip"
  }
}

def extractLibs = tasks.register('extractLibs', Copy) {
  into layout.buildDirectory.dir('platform')
  from configurations.libs
  // TODO: fix architecture in uploaded libs
  filesMatching("*-x86-64/*") {
    it.path = it.path.replace("x86-64", "x64")
  }
  filesMatching("win32*/*") {
    it.path = it.path.replace("win32", "windows")
  }
  includeEmptyDirs = false
  filePermissions {
    unix("644")
  }
  dirPermissions {
    unix("755")
  }
}

artifacts {
  nativeLibs extractLibs
}

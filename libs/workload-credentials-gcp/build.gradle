apply plugin: 'elasticsearch.build'

dependencies {
  implementation project(':modules:workload-identity')

  implementation 'com.google.auth:google-auth-library-credentials:1.33.1'
  implementation 'com.google.auth:google-auth-library-oauth2-http:1.33.1'
}

tasks.named('forbiddenApisMain').configure {
  replaceSignatureFiles 'jdk-signatures'
}

def dependencyMappings = {
  mapping from: /google-auth-.*/, to: 'google-auth'
}
tasks.named('dependencyLicenses').configure(dependencyMappings)
tasks.named('dependenciesInfo').configure(dependencyMappings)

tasks.named("thirdPartyAudit").configure {
  // TODO: add the necessary dependencies while implementing the credentials provider
  ignoreMissingClasses(
    'com.google.api.client.http.GenericUrl',

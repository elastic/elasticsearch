  - do:
      allowed_warnings:
        - "index template [columnar-logsdb-template] has index patterns [columnar-logsdb-logs*] matching patterns from existing older templates [global] with patterns (global => [*]); this template [columnar-logsdb-template] will take precedence during new index creation"
      indices.put_index_template:
        name: columnar-logsdb-template
        body:
          index_patterns: [ "columnar-logsdb-logs*" ]
          data_stream: {}
          template:
            settings:
              index:
                mode: columnar_logsdb
                number_of_replicas: 0
            mappings:
              subobjects: false
              properties:
                "@timestamp":
                  type: date
                host.name:
                  type: keyword
                agent_id:
                  type: keyword
                process_id:
                  type: integer
                message:
                  type: text

  - do:
      bulk:
        index: columnar-logsdb-logs
        refresh: true
        body:
          - { "create": { } }
          - { "@timestamp": "2024-06-01T10:00:00Z", "host.name": "host-a", "agent_id": "agent-1", "process_id": 101, "message": "First log entry" }
          - { "create": { } }
          - { "@timestamp": "2024-06-01T10:01:00Z", "host.name": "host-b", "agent_id": "agent-2", "process_id": 102, "message": "Second log entry" }

  - match: { errors: false }

  - do:
      search:
        index: columnar-logsdb-logs
        body:
          query:
            match_all: {}
          sort: "@timestamp"

  - match: { hits.total.value: 2 }
  - match: { hits.hits.0._source.agent_id: "agent-1" }
  - match: { hits.hits.0._source.process_id: 101 }
  - match: { hits.hits.0._source.message: "First log entry" }
  - match: { hits.hits.0._source.host\.name: "host-a" }
  - match: { hits.hits.1._source.agent_id: "agent-2" }
  - match: { hits.hits.1._source.process_id: 102 }
  - match: { hits.hits.1._source.message: "Second log entry" }
  - match: { hits.hits.1._source.host\.name: "host-b" }

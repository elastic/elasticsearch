---
teardown:
  - do:
      ingest.delete_pipeline:
        id: "command_line_args_pipeline"
        ignore: 404

---
"Test command_line_args processor with bash shell":
  - do:
      ingest.put_pipeline:
        id: "command_line_args_pipeline"
        body: >
          {
            "description": "parse command line args",
            "processors": [
              {
                "command_line_args": {
                  "field": "process.command_line",
                  "target_field": "process.args",
                  "shell": "bash"
                }
              }
            ]
          }
  - match: { acknowledged: true }

  - do:
      index:
        index: test
        id: "1"
        pipeline: "command_line_args_pipeline"
        body: >
          {
            "process": {
              "command_line": "ls -la '/tmp/my dir'"
            }
          }

  - do:
      get:
        index: test
        id: "1"
  - match: { _source.process.args: ["ls", "-la", "/tmp/my dir"] }

---
"Test command_line_args processor with cmd shell":
  - do:
      ingest.put_pipeline:
        id: "command_line_args_pipeline"
        body: >
          {
            "description": "parse command line args",
            "processors": [
              {
                "command_line_args": {
                  "field": "process.command_line",
                  "target_field": "process.args",
                  "shell": "cmd"
                }
              }
            ]
          }
  - match: { acknowledged: true }

  - do:
      index:
        index: test
        id: "1"
        pipeline: "command_line_args_pipeline"
        body: >
          {
            "process": {
              "command_line": "\"C:\\Program Files\\app.exe\" --flag \"hello world\""
            }
          }

  - do:

---
"Test command_line_args processor with ignore_missing":
  - do:
      ingest.put_pipeline:
        id: "command_line_args_pipeline"
        body: >
          {
            "description": "parse command line args with ignore_missing",
            "processors": [
              {
                "command_line_args": {
                  "field": "process.command_line",
                  "target_field": "process.args",
                  "ignore_missing": true
                }
              }
            ]
          }
  - match: { acknowledged: true }

  - do:
      index:
        index: test
        id: "1"
        pipeline: "command_line_args_pipeline"
        body: >
          {
            "other_field": "value"
          }

  - do:
      get:
        index: test
        id: "1"
  - match: { _source.other_field: "value" }
  - is_false: _source.process.args

---
"Test command_line_args processor fails on missing field":
  - do:
      ingest.put_pipeline:
        id: "command_line_args_pipeline"
        body: >
          {
            "description": "parse command line args without ignore_missing",
            "processors": [
              {
                "command_line_args": {
                  "field": "process.command_line",
                  "target_field": "process.args"
                }
              }
            ]
          }
  - match: { acknowledged: true }

  - do:
      catch: /field \[process.command_line\] not present/
      index:
        index: test
        id: "1"
        pipeline: "command_line_args_pipeline"
        body: >
          {
            "other_field": "value"
          }

apply plugin: 'elasticsearch.internal-yaml-rest-test'

esplugin {
  description = 'Ingest processors for IP geolocation enrichment'
  classname = 'org.elasticsearch.ingest.iplocation.IngestIpLocationPlugin'
}

dependencies {
  clusterModules project(':modules:reindex')
  clusterModules project(':modules:ip-location')
  yamlRestTestImplementation project(':test:fixtures:geoip-fixture')
  yamlRestTestImplementation(testArtifact(project(":modules:ip-location"), "yamlRestTest"))
}

restResources {
  restApi {
    include '_common', 'indices', 'index', 'cluster', 'nodes', 'get', 'ingest'
  }
}

tasks.named("forbiddenPatterns").configure {
  exclude '**/*.mmdb'
}

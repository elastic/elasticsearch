          size: 0
          aggs:
            spinning:
              scripted_metric:
                init_script: "state.total = 0"
                map_script:
                  source: |
                    long start = System.currentTimeMillis();
                    while (System.currentTimeMillis() - start < 60000L) {
                        /* deliberately empty: rely on timeout to cancel */
                    }
                    state.total += doc['val'].value;
                combine_script: "return state.total"
                reduce_script: "double t = 0; for (a in states) { t += a } return t"
  - is_true: timed_out


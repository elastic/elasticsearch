# Timeout tests: each spins a tight loop that the 100 ms search timeout must cancel via the
# Painless-injected poll (present when the script base class overrides _getCancellationCheck()).
# Without the poll every loop would run ~60 s.
#
# aggs_init / aggs_combine omitted: doPostCollection() sets timeoutOverwrites=true, suppressing
# TimeExceededException in that phase.  geometry_field test lives in spatial/130_geo_shape_runtime.yml.
#
# SimilarityScript / SimilarityWeightScript omitted: they declare _getCancellationCheck() so the
# poll bytecode is injected, but no caller wires up _setCancellationCheck() on these instances
# (Lucene's Similarity API does not expose a searcher context), so the runnable stays null and
# search timeouts never propagate into the script.
#
# "static lambda" tests (below the context tests) verify that the cancellation poll is forwarded
# into typed static lambda bodies (e.g. removeIf / sort) via the synthetic #scriptThis capture
# (the script receiver) injected by the compiler.  The loop lives inside the lambda, not the
# top-level script body, and shares the script's persistent $cancelPoll counter.

---
"Search timeout aborts a long-running filter script loop":
  - do:
      indices.create:
        index: test_filter_script_timeout
        body:
          settings:
            number_of_shards: 1
          mappings:
            properties:
              val:
                type: long
  - do:
      index:
        index: test_filter_script_timeout
        id: d1
        body: {"val": 1}
  - do:
      indices.refresh: {}

  - do:
      search:
        rest_total_hits_as_int: true
        index: test_filter_script_timeout
        timeout: 100ms
        body:
          query:
            script:
              script:
                source: |
                  long start = System.currentTimeMillis();
                  while (System.currentTimeMillis() - start < 60000L) {
                      /* deliberately empty: rely on timeout to cancel */
                  }
                  return true;
  - is_true: timed_out


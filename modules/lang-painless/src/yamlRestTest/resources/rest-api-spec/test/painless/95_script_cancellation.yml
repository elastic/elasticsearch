---
"Search timeout cancels a loop inside a static lambda in a filter script":
  # The loop is inside a typed removeIf lambda, not in the top-level script body.
  # Exercises the IRCStaticCancellationCheck path: the compiler injects a synthetic
  # #scriptThis capture so the lambda body shares the script's $cancelPoll counter.
  - do:
      indices.create:
        index: test_filter_lambda_timeout
        body:
          settings:
            number_of_shards: 1
          mappings:
            properties:
              val:
                type: long
  - do:
      index:
        index: test_filter_lambda_timeout
        id: d1
        body: {"val": 1}
  - do:
      indices.refresh: {}

  - do:
      search:
        rest_total_hits_as_int: true
        index: test_filter_lambda_timeout
        timeout: 100ms
        body:
          query:
            script:
              script:
                source: |
                  List l = new ArrayList();
                  l.add(1);
                  l.removeIf(x -> {
                    long start = System.currentTimeMillis();
                    while (System.currentTimeMillis() - start < 60000L) {
                        /* deliberately empty: rely on timeout to cancel */
                    }
                    return false;
                  });
                  return true;
  - is_true: timed_out


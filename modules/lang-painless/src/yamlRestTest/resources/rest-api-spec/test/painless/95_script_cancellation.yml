---
"Search timeout aborts a long-running composite runtime field script loop":
  # composite_field scripts are evaluated via sub-field wrappers; the cancellation
  # check is propagated to the composite script by AbstractFieldScript.emitFromCompositeScript.
  - do:
      indices.create:
        index: test_rt_composite_timeout
        body:
          settings:
            number_of_shards: 1
  - do:
      index:
        index: test_rt_composite_timeout
        id: d1
        body: {"val": 1}
  - do:
      indices.refresh: {}

  - do:
      search:
        rest_total_hits_as_int: true
        index: test_rt_composite_timeout
        timeout: 100ms
        body:
          runtime_mappings:
            rt_field:
              type: composite
              fields:
                count:
                  type: long
              script:
                source: |
                  long start = System.currentTimeMillis();
                  while (System.currentTimeMillis() - start < 60000L) {
                      /* deliberately empty: rely on timeout to cancel */
                  }
                  emit('count', 1L);
          query:
            exists:
              field: rt_field.count
  - is_true: timed_out

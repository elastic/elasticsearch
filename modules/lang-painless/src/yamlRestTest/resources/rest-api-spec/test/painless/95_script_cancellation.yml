# "def lambda" tests verify the same wire effect for lambdas whose target functional interface
# is not statically known (because the receiver of the call is def, so dispatch goes through
# DefBootstrap rather than LambdaBootstrap).  These reuse the existing needsInstance / instance-
# capture machinery: the analysis phase widens the trigger for `usesInstanceMethod` to also fire
# when the script supports cancellation, so the lambda becomes a non-static method on the script
# class and the regular IRCCancellationCheck path handles the prologue + per-iteration poll.


import org.elasticsearch.gradle.Architecture
import org.elasticsearch.gradle.DistributionDownloadPlugin
import org.elasticsearch.gradle.ElasticsearchDistribution
import org.elasticsearch.gradle.OS
import org.elasticsearch.gradle.internal.test.AntFixture
import org.elasticsearch.gradle.transform.UnzipTransform
import org.gradle.api.tasks.TaskProvider

apply plugin: 'elasticsearch.test-with-dependencies'
apply plugin: 'elasticsearch.jdk-download'
apply plugin: 'elasticsearch.internal-yaml-rest-test'
apply plugin: 'elasticsearch.legacy-java-rest-test'
apply plugin: 'elasticsearch.yaml-rest-compat-test'
apply plugin: 'elasticsearch.internal-cluster-test'

esplugin {
  description = 'The Reindex module adds APIs to reindex from one index to another or update documents in place.'
  classname = 'org.elasticsearch.reindex.ReindexPlugin'
}

testClusters.configureEach {
  // Modules who's integration is explicitly tested in integration tests
  module ':modules:parent-join'
  module ':modules:lang-painless'
  module ':modules:rest-root'
  // Registers reindex PIT cluster features (ReindexManagementFeatures) and management REST APIs
  module ':modules:reindex-management'
  // Whitelist reindexing from the local node so we can test reindex-from-remote.
  setting 'reindex.remote.whitelist', '127.0.0.1:*,[::1]:*'
}

dependencies {
  api project(":client:rest")
  api project(":libs:ssl-config")
  // for parent/child testing
  testImplementation project(':modules:parent-join')
  testImplementation project(':modules:rest-root')
  // for data stream integration tests
  internalClusterTestImplementation project(':modules:data-streams')
  // registers reindex relocation and pit search node features
  internalClusterTestImplementation project(':modules:reindex-management')

  clusterModules project(':modules:lang-painless')
  clusterModules project(':modules:parent-join')
  clusterModules project(":modules:rest-root")
  clusterModules project(':modules:reindex-management')
}

restResources {
  restApi {
    include '_common', 'cluster', 'nodes', 'indices', 'index', 'get', 'search', 'mget', 'count',
                'update_by_query', 'delete_by_query', 'reindex_rethrottle', 'tasks', 'reindex', 'put_script', 'bulk', 'info'
  }
}

configurations {
  restTests {
    attributes {
      attribute(ArtifactTypeDefinition.ARTIFACT_TYPE_ATTRIBUTE, ArtifactTypeDefinition.DIRECTORY_TYPE)
    }
  }
}

artifacts {
  restTests(new File(projectDir, "src/yamlRestTest/resources/rest-api-spec/test"))
}

tasks.named("thirdPartyAudit").configure {
  ignoreMissingClasses(
          // Commons logging
          'javax.servlet.ServletContextEvent',
          'javax.servlet.ServletContextListener',
          'org.apache.avalon.framework.logger.Logger',
          'org.apache.log.Hierarchy',
          'org.apache.log.Logger',
  )
}

tasks.named("forbiddenPatterns").configure {
  // PKCS#12 file are not UTF-8
  exclude '**/*.p12'
}

// Support for testing reindex-from-remote against old Elasticsearch versions
configurations {
  oldesFixture
  es2
  es1
  es090
  es500
  es62
  es63
}

dependencies {
  oldesFixture project(':test:fixtures:old-elasticsearch')
  /* Right now we just test against the latest version of each major we expect
   * reindex-from-remote to work against. We could randomize the versions but
   * that doesn't seem worth it at this point. */
  es2 'org.elasticsearch.distribution.zip:elasticsearch:2.4.5@zip'
  es1 'org.elasticsearch:elasticsearch:1.7.6@zip'
  es090 'org.elasticsearch:elasticsearch:0.90.13@zip'
  es500 'org.elasticsearch.distribution.zip:elasticsearch:5.0.0@zip'
  es62 'org.elasticsearch.distribution.zip:elasticsearch:6.2.4@zip'
  // 6.3.x default artifact is gone from Central; OSS zip remains. Published POM uses group org.elasticsearch.distribution.zip (not .oss-zip) for artifact elasticsearch-oss.
  es63 'org.elasticsearch.distribution.zip:elasticsearch-oss:6.3.1@zip'
}

jdks {
  legacy {
    vendor = 'adoptium'
    version = '8u302+b08'
    platform = OS.current().name().toLowerCase()
    architecture = Architecture.current().name().toLowerCase()
  }
}

if (OS.current() == OS.MAC && Architecture.current() == Architecture.AARCH64) {
  jdks.legacy.vendor = 'zulu'
  jdks.legacy.distributionVersion = '8.56.0.23'
}

if (OS.current() == OS.WINDOWS) {
  logger.warn("Disabling reindex-from-old tests because we can't get the pid file on windows")
  tasks.named("javaRestTest").configure {
    systemProperty "tests.fromOld", "false"
    systemProperty "tests.fromRemoteEs500", "false"
    systemProperty "tests.fromRemoteEs62", "false"
    systemProperty "tests.fromRemoteEs63", "false"
    systemProperty "tests.fromRemote7x", "false"
    systemProperty "tests.fromRemote7xEs79", "false"
    systemProperty "tests.fromRemote7xEs710", "false"
    systemProperty "tests.fromRemoteEs812", "false"
    systemProperty "tests.fromRemoteEs816", "false"
    systemProperty "tests.fromRemoteEs93", "false"
  }
} else if (rootProject.rootDir.toString().contains(" ")) {
  logger.warn("Disabling reindex-from-old tests because Elasticsearch 1.7 won't start with spaces in the path")
  tasks.named("javaRestTest").configure {
    systemProperty "tests.fromOld", "false"
    systemProperty "tests.fromRemoteEs500", "false"
    systemProperty "tests.fromRemoteEs62", "false"
    systemProperty "tests.fromRemoteEs63", "false"
    systemProperty "tests.fromRemote7x", "false"
    systemProperty "tests.fromRemote7xEs79", "false"
    systemProperty "tests.fromRemote7xEs710", "false"
    systemProperty "tests.fromRemoteEs812", "false"
    systemProperty "tests.fromRemoteEs816", "false"
    systemProperty "tests.fromRemoteEs93", "false"
  }
} else {
  /* Register a gradle artifact transformation to unpack resolved elasticsearch distributions. We only resolve
   * zip files here. Using artifact transforms allow a better caching of the downloaded distros as the
   * transformed (unpacked) distro will be cached by gradle resulting in less unpacking
   *
   * To avoid testing against too many old versions, always pick first and last version per major
   */
  project.getDependencies().registerTransform(UnzipTransform.class, transformSpec -> {
    transformSpec.getFrom().attribute(ArtifactTypeDefinition.ARTIFACT_TYPE_ATTRIBUTE, ArtifactTypeDefinition.ZIP_TYPE);
    transformSpec.getTo().attribute(ArtifactTypeDefinition.ARTIFACT_TYPE_ATTRIBUTE, ArtifactTypeDefinition.DIRECTORY_TYPE);
  });

  def oldesFixtureConfiguration = project.configurations.oldesFixture

  def versions = ['2', '1', '090', '500', '62', '63']
  if (OS.current() == OS.MAC) {
    // 0.90 fails sometimes on mac, given that it is so old, let us disable it
    // see: https://github.com/elastic/elasticsearch/issues/51202
    versions = ['2', '1', '500', '62', '63']
  }
  versions.each { version ->
    def oldEsDependency = configurations['es' + version]
    oldEsDependency.getAttributes().attribute(ArtifactTypeDefinition.ARTIFACT_TYPE_ATTRIBUTE, ArtifactTypeDefinition.DIRECTORY_TYPE);
    TaskProvider<AntFixture> fixture = tasks.register("oldEs${version}Fixture", AntFixture) {
      dependsOn project.configurations.oldesFixture, jdks.legacy, oldEsDependency
      executable = "${buildParams.runtimeJavaHome.get()}/bin/java"
      env 'CLASSPATH', "${-> oldesFixtureConfiguration.asPath}"
      // old versions of Elasticsearch need JAVA_HOME
      env 'JAVA_HOME', jdks.legacy.javaHomePath
      // If we are running on certain arm systems we need to explicitly set the stack size to overcome JDK page size bug
      if (Architecture.current() == Architecture.AARCH64) {
        env 'ES_JAVA_OPTS', '-Xss512k'
      }
      args 'oldes.OldElasticsearch',
        baseDir,
        "${ -> oldEsDependency.singleFile.getPath()}",
        version == '090'
      if ((version == '62' || version == '63') && Architecture.current() == Architecture.AARCH64) {
        args 'xpack.ml.enabled: false'
      }
      waitCondition = { fixture, ant ->
        // the fixture writes the ports file when Elasticsearch's HTTP service
        // is ready, so we can just wait for the file to exist
        return fixture.portsFile.exists()
      }
    }

    tasks.named("oldEs${version}Fixture").configure { setFinalizedBy([]) }

    tasks.named("javaRestTest").configure {
      dependsOn fixture
      if (version == '500') {
        systemProperty "tests.fromRemoteEs500", "true"
      } else if (version == '62') {
        systemProperty "tests.fromRemoteEs62", "true"
      } else if (version == '63') {
        systemProperty "tests.fromRemoteEs63", "true"
      } else {
        systemProperty "tests.fromOld", "true"
      }
      /* Use a closure on the string to delay evaluation until right before we
       * run the integration tests so that we can be sure that the file is
       * ready. */
      nonInputProperties.systemProperty "es${version}.port", fixture.map(f->f.addressAndPort)
    }
  }

  /* 7.x distributions are not published to Maven Central under org.elasticsearch.distribution.zip (that
   * coordinate stops at 6.8.x). Use the same ElasticsearchDistribution resolution as BWC tests (Elastic
   * download service / InternalDistributionDownloadPlugin).
   *
   * 8.x / 9.x run on all host OSes.
   */
  def distributions = DistributionDownloadPlugin.getContainer(project)
  boolean macOsAarch64 = OS.current() == OS.MAC && Architecture.current() == Architecture.AARCH64

  def registerRemoteReindexDistFixture = { String taskName, ElasticsearchDistribution dist ->
    TaskProvider<AntFixture> fxProvider = tasks.register(taskName, AntFixture) {
      dependsOn project.configurations.oldesFixture, jdks.legacy, dist
      executable = "${buildParams.runtimeJavaHome.get()}/bin/java"
      env 'CLASSPATH', "${-> oldesFixtureConfiguration.asPath}"
      env 'JAVA_HOME', jdks.legacy.javaHomePath
      if (Architecture.current() == Architecture.AARCH64) {
        env 'ES_JAVA_OPTS', '-Xss512k'
      }
      args 'oldes.OldElasticsearch',
        baseDir,
        "${ -> dist.extracted.getSingleFile().getPath() }",
        'false',
        'xpack.security.enabled: false',
        'discovery.type: single-node'
      if (Architecture.current() == Architecture.AARCH64) {
        args 'xpack.ml.enabled: false'
      }
      maxWaitInSeconds = 120
      waitCondition = { fixture, ant ->
        return fixture.portsFile.exists()
      }
    }
    tasks.named(taskName).configure { setFinalizedBy([]) }
    return fxProvider
  }

  def registerDownloadedRemote = { String version, String distributionName, String taskName, String portPrefix, String enableProperty ->
    ElasticsearchDistribution dist = distributions.findByName(distributionName)
    if (dist == null) {
      dist = distributions.create(distributionName) { ElasticsearchDistribution d ->
        d.version = version
        d.architecture = Architecture.current()
      }
    }
    TaskProvider<AntFixture> fx = registerRemoteReindexDistFixture(taskName, dist)
    tasks.named("javaRestTest").configure {
      dependsOn fx
      systemProperty enableProperty, "true"
      nonInputProperties.systemProperty "${portPrefix}.port", fx.map(f -> f.addressAndPort)
    }
  }

  if (macOsAarch64 == false) {
    registerDownloadedRemote('7.9.3', 'remote_reindex_es79', 'remoteEs79Fixture', 'es79', 'tests.fromRemote7xEs79')
    registerDownloadedRemote('7.10.0', 'remote_reindex_es710', 'remoteEs710Fixture', 'es710', 'tests.fromRemote7xEs710')
  } else {
    tasks.named("javaRestTest").configure {
      systemProperty "tests.fromRemote7xEs79", "false"
      systemProperty "tests.fromRemote7xEs710", "false"
    }
  }

  registerDownloadedRemote('8.12.2', 'remote_reindex_es812', 'remoteEs812Fixture', 'es812', 'tests.fromRemoteEs812')
  registerDownloadedRemote('8.16.4', 'remote_reindex_es816', 'remoteEs816Fixture', 'es816', 'tests.fromRemoteEs816')
  registerDownloadedRemote('9.3.0', 'remote_reindex_es93', 'remoteEs93Fixture', 'es93', 'tests.fromRemoteEs93')

  /* AntFixture registers a *#stop task in its constructor. Passing string paths to finalizedBy(...) breaks Gradle 9
   * configuration: # is interpreted as part of task-path syntax, and stop tasks are absent until the fixture task is
   * realized. Realize each fixture so *#stop exists, then use TaskProvider-based finalizedBy. */
  versions.each { version ->
    tasks.named("oldEs${version}Fixture").get()
  }
  ['remoteEs812Fixture', 'remoteEs816Fixture', 'remoteEs93Fixture'].each { name ->
    tasks.named(name).get()
  }
  if (macOsAarch64 == false) {
    tasks.named('remoteEs79Fixture').get()
    tasks.named('remoteEs710Fixture').get()
  }

  def oldElasticsearchFixtureStopTaskProviders = []
  versions.each { version ->
    oldElasticsearchFixtureStopTaskProviders.add(tasks.named("oldEs${version}Fixture#stop"))
  }
  oldElasticsearchFixtureStopTaskProviders.addAll([
    tasks.named('remoteEs812Fixture#stop'),
    tasks.named('remoteEs816Fixture#stop'),
    tasks.named('remoteEs93Fixture#stop')
  ])
  if (macOsAarch64 == false) {
    oldElasticsearchFixtureStopTaskProviders.addAll([
      tasks.named('remoteEs79Fixture#stop'),
      tasks.named('remoteEs710Fixture#stop')
    ])
  }

  tasks.named("javaRestTest").configure { task ->
    oldElasticsearchFixtureStopTaskProviders.each { stopProvider ->
      task.finalizedBy(stopProvider)
    }
    task.systemProperty "tests.fromRemote7x", "true"
  }
}

tasks.named("yamlRestCompatTestTransform").configure { task ->
  task.skipTest("reindex/20_validation/specifying size fails", "size is rejected in 9.0")
}

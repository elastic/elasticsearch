org.elasticsearch.workloadidentity:
  - outbound_network
  - manage_threads
# Apache HttpComponents 4.x async transport. The NIO reactor opens sockets from its own
# event-loop threads (org.apache.httpcomponents.httpcore.nio), while DNS / SSL handshake
# calls originate from org.apache.httpcomponents.httpclient, and the async future plumbing
# spins worker threads inside org.apache.httpcomponents.httpasyncclient. Without these
# entitlements TLS handshake and connection establishment fail at runtime with
# NotEntitledException. Mirrors the grants x-pack/plugin/core makes for the same modules.
org.apache.httpcomponents.httpclient:
  - outbound_network
  - manage_threads
org.apache.httpcomponents.httpcore.nio:
  - outbound_network
  - manage_threads
org.apache.httpcomponents.httpasyncclient:
  - manage_threads

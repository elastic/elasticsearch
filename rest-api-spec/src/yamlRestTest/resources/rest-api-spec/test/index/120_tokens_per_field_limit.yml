setup:
  - requires:
      cluster_features: ["mapper.tokens_per_field_limit"]
      reason: "setting must be present to be tested"

---
"Test field within token limit succeeds":
  - do:
      indices.create:
        index: test_token_limit
        body:
          settings:
            index:
              mapping:
                tokens_per_field:
                  limit: 100
          mappings:
            properties:
              body:
                type: text

  - do:
      index:
        index: test_token_limit
        id: "1"
        body:
          body: "hello world"

  - match: { result: created }

---
"Test field exceeding token limit is rejected":
  - do:
      indices.create:
        index: test_token_limit_exceeded
        body:
          settings:
            index:
              mapping:
                tokens_per_field:
                  limit: 3
          mappings:
            properties:
              body:
                type: text

  - do:
      catch: /field \[body\].*tokens_per_field\.limit/
      index:
        index: test_token_limit_exceeded
        id: "1"
        body:
          body: "one two three four five"

---
"Test token limit is per field not per document":
  - do:
      indices.create:
        index: test_token_limit_per_field
        body:
          settings:
            index:
              mapping:
                tokens_per_field:
                  limit: 4
          mappings:
            properties:
              field1:
                type: text
              field2:
                type: text

  # field1: 2 tokens, field2: 3 tokens - each under limit of 4, should succeed
  - do:
      index:
        index: test_token_limit_per_field
        id: "1"
        body:
          field1: "one two"
          field2: "three four five"

  - match: { result: created }

---
"Test no limit by default":
  - do:
      indices.create:
        index: test_token_no_limit
        body:
          mappings:
            properties:
              body:
                type: text

  - do:
      index:
        index: test_token_no_limit
        id: "1"
        body:
          body: "one two three four five six seven eight nine ten eleven twelve thirteen fourteen fifteen"

  - match: { result: created }

---
"Test setting rejects zero":
  - do:
      catch: /must be -1 \(no limit\) or a positive number/
      indices.create:
        index: test_token_limit_zero
        body:
          settings:
            index:
              mapping:
                tokens_per_field:
                  limit: 0

---
"Test dynamic update of token limit":
  - do:
      indices.create:
        index: test_token_dynamic
        body:
          settings:
            index:
              mapping:
                tokens_per_field:
                  limit: 1000
          mappings:
            properties:
              body:
                type: text

  - do:
      index:
        index: test_token_dynamic
        id: "1"
        body:
          body: "hello world"

  - match: { result: created }

  - do:
      indices.put_settings:
        index: test_token_dynamic
        body:
          index:
            mapping:
              tokens_per_field:
                limit: 1

  - do:
      catch: /tokens_per_field\.limit/
      index:
        index: test_token_dynamic
        id: "2"
        body:
          body: "hello world"

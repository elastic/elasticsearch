---
"Raise 404 when index doesn't exist":
  - requires:
      test_runner_features: ["allowed_warnings"]

  - do:
      catch: missing
      allowed_warnings:
        - "The get field mapping API is no longer maintained. Use the get mapping API (`GET /<index>/_mapping`) instead."
      indices.get_field_mapping:
        index: test_index
        fields: field



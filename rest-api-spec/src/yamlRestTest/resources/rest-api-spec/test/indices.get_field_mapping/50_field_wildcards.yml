---
setup:

  - do:
        indices.create:
          index: test_index
          body:
              mappings:
                properties:
                  t1:
                    type:     text
                  t2:
                    type:     text
                  obj:
                    properties:
                      t1:
                        type:   text
                      i_t1:
                        type:   text
                      i_t3:
                        type:   text

  - do:
        indices.create:
          index: test_index_2
          body:
              mappings:
                properties:
                  t1:
                    type:     text
                  t2:
                    type:     text
                  obj:
                    properties:
                      t1:
                        type:   text
                      i_t1:
                        type:   text
                      i_t3:
                        type:   text

---
"Get field mapping with * for fields":

  - do:
      indices.get_field_mapping:
        fields: "*"

  - match: {test_index.mappings.t1.full_name:     t1     }
  - match: {test_index.mappings.t2.full_name:     t2     }
  - match: {test_index.mappings.obj\.t1.full_name: obj.t1 }
  - match: {test_index.mappings.obj\.i_t1.full_name: obj.i_t1 }
  - match: {test_index.mappings.obj\.i_t3.full_name: obj.i_t3 }

---
"Get field mapping with t* for fields":

  - do:
      indices.get_field_mapping:
        index: test_index
        fields: "t*"

  - match:  {test_index.mappings.t1.full_name:     t1       }
  - match:  {test_index.mappings.t2.full_name:     t2       }
  - length: {test_index.mappings: 2}

---
"Get field mapping with *t1 for fields":

  - do:
      indices.get_field_mapping:
        index: test_index
        fields: "*t1"
  - match:  {test_index.mappings.t1.full_name:        t1       }
  - match:  {test_index.mappings.obj\.t1.full_name:   obj.t1   }
  - match:  {test_index.mappings.obj\.i_t1.full_name: obj.i_t1 }
  - length: {test_index.mappings: 3}

---
"Get field mapping with wildcarded relative names":

  - do:
      indices.get_field_mapping:
        index: test_index
        fields: "obj.i_*"
  - match:  {test_index.mappings.obj\.i_t1.full_name: obj.i_t1 }
  - match:  {test_index.mappings.obj\.i_t3.full_name: obj.i_t3 }
  - length: {test_index.mappings: 2}

---
"Get field mapping should work using '_all' for index":

  - do:
      indices.get_field_mapping:
        index: _all
        fields: "t*"
  - match:  {test_index.mappings.t1.full_name: t1 }
  - match:  {test_index.mappings.t2.full_name: t2 }
  - length: {test_index.mappings: 2}
  - match:  {test_index_2.mappings.t1.full_name: t1 }
  - match:  {test_index_2.mappings.t2.full_name: t2 }
  - length: {test_index_2.mappings: 2}

---
"Get field mapping should work using '*' for index":

  - do:
      indices.get_field_mapping:
        index: '*'
        fields: "t*"
  - match:  {test_index.mappings.t1.full_name: t1 }
  - match:  {test_index.mappings.t2.full_name: t2 }
  - length: {test_index.mappings: 2}
  - match:  {test_index_2.mappings.t1.full_name: t1 }
  - match:  {test_index_2.mappings.t2.full_name: t2 }
  - length: {test_index_2.mappings: 2}

---
"Get field mapping should work using comma_separated values for indices":

  - do:
      indices.get_field_mapping:
        index: 'test_index,test_index_2'
        fields: "t*"
  - match:  {test_index.mappings.t1.full_name: t1 }
  - match:  {test_index.mappings.t2.full_name: t2 }
  - length: {test_index.mappings: 2}
  - match:  {test_index_2.mappings.t1.full_name: t1 }
  - match:  {test_index_2.mappings.t2.full_name: t2 }
  - length: {test_index_2.mappings: 2}


---
"Get field mapping with wildcard for search_as_you_type field":
  - requires:
      cluster_features: ["gte_v8.16.0"]
      reason: search_as_you_type wildcard fix landed after 8.16

  - do:
      indices.create:
        index: search_as_you_type_index
        body:
          mappings:
            properties:
              field1a:
                type: search_as_you_type
              field1b:
                type: text
              field2a:
                type: text

  # Wildcard that matches a search_as_you_type root field must return that field
  # and must not return its synthetic prefix/shingle subfields (gh-118636).
  - do:
      indices.get_field_mapping:
        index: search_as_you_type_index
        fields: "field1*"

  - match:    { search_as_you_type_index.mappings.field1a.full_name: field1a }
  - match:    { search_as_you_type_index.mappings.field1b.full_name: field1b }
  - length:   { search_as_you_type_index.mappings: 2 }

  # Match-all wildcard must include the search_as_you_type root field but exclude
  # its synthetic subfields.
  - do:
      indices.get_field_mapping:
        index: search_as_you_type_index
        fields: "*"

  - match:    { search_as_you_type_index.mappings.field1a.full_name: field1a }
  - is_false: search_as_you_type_index.mappings.field1a\\._index_prefix
  - is_false: search_as_you_type_index.mappings.field1a\\._2gram
  - is_false: search_as_you_type_index.mappings.field1a\\._3gram

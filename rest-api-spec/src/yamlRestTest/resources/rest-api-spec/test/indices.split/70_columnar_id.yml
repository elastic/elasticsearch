---
setup:
  - do:
      indices.create:
        index: source
        wait_for_active_shards: 1
        body:
          settings:
            index.number_of_shards: 2
            index.number_of_replicas: 0
            index.number_of_routing_shards: 4
          mappings:
            _id:
              mode: columnar
  - do:
      index:
        index: source
        id:    "1"
        body:  { "foo": "hello world" }

  - do:
      index:
        index: source
        id:    "2"
        body:  { "foo": "hello world 2" }

  - do:
      index:
        index: source
        id:    "3"
        body:  { "foo": "hello world 3" }

---
"Split index via API with columnar _id mode":
  - requires:
      cluster_features: ["mapper.id_field.mode_mapping_attribute"]
      reason: columnar _id mode was added in this version
  # make it read-only
  - do:
      indices.put_settings:
        index: source
        body:
          index.blocks.write: true
          index.number_of_replicas: 0

  - do:
      cluster.health:
        wait_for_status: green
        index: source

  # now we do the actual split
  - do:
      indices.split:
        index: "source"
        target: "target"
        wait_for_active_shards: 1
        master_timeout: 10s
        body:
          settings:
            index.number_of_replicas: 0
            index.number_of_shards: 4

  - do:
      cluster.health:
        wait_for_status: green

  - do:
      get:
        index: target
        id:    "1"

  - match: { _index:   target }
  - match: { _id:      "1"     }
  - match: { _source:  { foo: "hello world" } }


  - do:
      get:
        index: target
        id:    "2"

  - match: { _index:   target }
  - match: { _id:      "2"     }
  - match: { _source:  { foo: "hello world 2" } }


  - do:
      get:
        index: target
        id:    "3"

  - match: { _index:   target }
  - match: { _id:      "3"     }
  - match: { _source:  { foo: "hello world 3" } }

  - do:
      search:
        index: target
  - match: { hits.total.value: 3 }


---
"Split from 1 to N with columnar _id mode":
  - requires:
      cluster_features: ["mapper.id_field.mode_mapping_attribute", "gte_v7.0.0"]
      reason: columnar _id mode and automatic preparation for splitting were added in this version
  - do:
      indices.create:
        index: source_one_shard
        wait_for_active_shards: 1
        body:
          settings:
            index.number_of_shards: 1
            index.number_of_replicas: 0
          mappings:
            _id:
              mode: columnar
  - do:
      index:
        index: source_one_shard
        id:    "1"
        body:  { "foo": "hello world" }

  - do:
      index:
        index: source_one_shard
        id:    "2"
        body:  { "foo": "hello world 2" }

  - do:
      index:
        index: source_one_shard
        id:    "3"
        body:  { "foo": "hello world 3" }

  # make it read-only
  - do:
      indices.put_settings:
        index: source_one_shard
        body:
          index.blocks.write: true
          index.number_of_replicas: 0

  - do:
      cluster.health:
        wait_for_status: green
        index: source_one_shard

  # now we do the actual split from 1 to 5
  - do:
      indices.split:
        index: "source_one_shard"
        target: "target"
        wait_for_active_shards: 1
        master_timeout: 10s
        body:
          settings:
            index.number_of_replicas: 0
            index.number_of_shards: 5

  - do:
      cluster.health:
        wait_for_status: green

  - do:
      get:
        index: target
        id:    "1"

  - match: { _index:   target }
  - match: { _id:      "1"     }
  - match: { _source:  { foo: "hello world" } }


  - do:
      get:
        index: target
        id:    "2"

  - match: { _index:   target }
  - match: { _id:      "2"     }
  - match: { _source:  { foo: "hello world 2" } }


  - do:
      get:
        index: target
        id:    "3"

  - match: { _index:   target }
  - match: { _id:      "3"     }
  - match: { _source:  { foo: "hello world 3" } }

  - do:
      search:
        index: target
  - match: { hits.total.value: 3 }

---
"Split index with custom routing and columnar _id mode":
  - requires:
      cluster_features: ["mapper.id_field.mode_mapping_attribute"]
      reason: columnar _id mode was added in this version
  - do:
      indices.create:
        index: source_routing
        wait_for_active_shards: 1
        body:
          settings:
            index.number_of_shards: 2
            index.number_of_replicas: 0
            index.number_of_routing_shards: 4
          mappings:
            _id:
              mode: columnar
            _routing:
              required: true

  - do:
      index:
        index:   source_routing
        id:      "1"
        routing: "1"
        body:    { "foo": "hello world" }

  - do:
      index:
        index:   source_routing
        id:      "2"
        routing: "2"
        body:    { "foo": "hello world 2" }

  - do:
      index:
        index:   source_routing
        id:      "3"
        routing: "3"
        body:    { "foo": "hello world 3" }

  # make it read-only
  - do:
      indices.put_settings:
        index: source_routing
        body:
          index.blocks.write: true
          index.number_of_replicas: 0

  - do:
      cluster.health:
        wait_for_status: green
        index: source_routing

  # now we do the actual split
  - do:
      indices.split:
        index: "source_routing"
        target: "target_routing"
        wait_for_active_shards: 1
        master_timeout: 10s
        body:
          settings:
            index.number_of_replicas: 0
            index.number_of_shards: 4

  - do:
      cluster.health:
        wait_for_status: green

  - do:
      get:
        index:   target_routing
        routing: "1"
        id:      "1"

  - match: { _index:   target_routing }
  - match: { _id:      "1"            }
  - match: { _source:  { foo: "hello world" } }

  - do:
      get:
        index:   target_routing
        routing: "2"
        id:      "2"

  - match: { _index:   target_routing }
  - match: { _id:      "2"            }
  - match: { _source:  { foo: "hello world 2" } }

  - do:
      get:
        index:   target_routing
        routing: "3"
        id:      "3"

  - match: { _index:   target_routing }
  - match: { _id:      "3"            }
  - match: { _source:  { foo: "hello world 3" } }

  - do:
      search:
        index: target_routing
  - match: { hits.total.value: 3 }

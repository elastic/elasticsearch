---
"multi_value=false is enforced per document not per segment":
  - requires:
      cluster_features: ["mapper.doc_values.multi_value_rename"]
      reason: "multi_value doc values parameter uses boolean wire-format"

  - do:
      indices.create:
        index: test_per_document
        body:
          settings:
            index.mode: logsdb
          mappings:
            properties:
              kw:
                type: keyword
                doc_values:
                  multi_value: false

  - do:
      index:
        index: test_per_document
        id: "1"
        body:
          "@timestamp": "2024-01-01T00:00:00Z"
          kw: "value_a"

  - do:
      index:
        index: test_per_document
        id: "2"
        body:
          "@timestamp": "2024-01-01T00:00:00Z"
          kw: "value_b"

  - do:
      indices.refresh: {}

  - do:
      search:
        index: test_per_document
        body:
          query:
            match_all: {}
  - match: { hits.total.value: 2 }

---
"multi_value=false mapping serialization roundtrip":
  - requires:
      cluster_features: ["mapper.doc_values.multi_value_rename"]
      reason: "multi_value doc values parameter uses boolean wire-format"

  - do:
      indices.create:
        index: test_roundtrip
        body:
          settings:
            index.mode: logsdb
          mappings:
            properties:
              kw:
                type: keyword
                doc_values:
                  multi_value: false

  - do:
      indices.get_mapping:
        index: test_roundtrip

  - match: { test_roundtrip.mappings.properties.kw.doc_values.multi_value: false }

---
"multi_value=false on multi-field sub rejects parent array":
  - requires:
      cluster_features: ["mapper.doc_values.multi_value_rename"]
      reason: "multi_value=false enforcement on indexing"

  - do:
      indices.create:
        index: test_multifield_sub
        body:
          settings:
            index.mode: logsdb
          mappings:
            properties:
              parent:
                type: keyword
                fields:
                  child:
                    type: keyword
                    doc_values:
                      multi_value: false

  # The first value is accepted by both the parent and child fields.
  - do:
      index:
        index: test_multifield_sub
        id: "1"
        body:
          "@timestamp": "2024-01-01T00:00:00Z"
          parent: "a"

  # The second value is rejected by the child field.
  - do:
      catch: /configured with \[multi_value=false\] but encountered multiple values in the same document/
      index:
        index: test_multifield_sub
        id: "2"
        body:
          "@timestamp": "2024-01-01T00:00:00Z"
          parent: ["a", "b"]

---
"multi_value=false on multi-field parent rejects parent array":
  - requires:
      cluster_features: ["mapper.doc_values.multi_value_rename"]
      reason: "multi_value=false enforcement on indexing"

  - do:
      indices.create:
        index: test_multifield_parent
        body:
          settings:
            index.mode: logsdb
          mappings:
            properties:
              parent:
                type: keyword
                doc_values:
                  multi_value: false
                fields:
                  child:
                    type: keyword

  # The second value is rejected by the parent field.
  - do:
      catch: /configured with \[multi_value=false\] but encountered multiple values in the same document/
      index:
        index: test_multifield_parent
        id: "1"
        body:
          "@timestamp": "2024-01-01T00:00:00Z"
          parent: ["a", "b"]

---
"index.mapping.doc_values.multi_value=false defaults all fields to single-valued":
  - requires:
      cluster_features: ["mapper.doc_values.multi_value_index_setting"]
      reason: "index.mapping.doc_values.multi_value index-level setting requires this feature"

  - do:
      indices.create:
        index: test_index_setting_default
        body:
          settings:
            index.mapping.doc_values.multi_value: false
          mappings:
            properties:
              kw:
                type: keyword

  # A second value for a field that did not override the index setting is rejected.
  - do:
      catch: /configured with \[multi_value=false\] but encountered multiple values in the same document/
      index:
        index: test_index_setting_default
        id: "1"
        body:
          kw: ["a", "b"]

  # A single value is accepted.
  - do:
      index:
        index: test_index_setting_default
        id: "2"
        body:
          kw: "a"

---
"field-level multi_value overrides index.mapping.doc_values.multi_value":
  - requires:
      cluster_features: ["mapper.doc_values.multi_value_index_setting"]
      reason: "index.mapping.doc_values.multi_value index-level setting requires this feature"

  - do:
      indices.create:
        index: test_index_setting_override
        body:
          settings:
            index.mapping.doc_values.multi_value: false
          mappings:
            properties:
              kw_default:
                type: keyword
              kw_override:
                type: keyword
                doc_values:
                  multi_value: true

  # The field with the index-level default (single-valued) rejects two values.
  - do:
      catch: /configured with \[multi_value=false\] but encountered multiple values in the same document/
      index:
        index: test_index_setting_override
        id: "1"
        body:
          kw_default: ["a", "b"]

  # The field that explicitly overrides to multi_value=true accepts two values.
  - do:
      index:
        index: test_index_setting_override
        id: "2"
        body:
          kw_override: ["a", "b"]

---
"index.mapping.doc_values.multi_value=false mapping round-trip":
  - requires:
      cluster_features: ["mapper.doc_values.multi_value_index_setting"]
      reason: "index.mapping.doc_values.multi_value index-level setting requires this feature"

  - do:
      indices.create:
        index: test_index_setting_roundtrip
        body:
          settings:
            index.mapping.doc_values.multi_value: false
          mappings:
            properties:
              kw:
                type: keyword

  # The mapping for kw should not emit an explicit doc_values.multi_value because it was not set at the field level.
  - do:
      indices.get_mapping:
        index: test_index_setting_roundtrip

  - is_false: test_index_setting_roundtrip.mappings.properties.kw.doc_values

---
"term-family queries decode multi-valued ArrayOrderInlineNull doc values":
  - requires:
      test_runner_features: [ capabilities ]
      capabilities:
        - method: PUT
          path: /{index}
          capabilities: [ columnar_index_modes ]
      cluster_features: ["mapper.keyword.columnar_default_high_cardinality"]
      reason: "multi-valued, high-cardinality keyword/ip fields with index:false store doc values in the ArrayOrderInlineNull binary format; this guards that the scanning binary doc-values path can decode it"

  - do:
      indices.create:
        index: test_mv_inline_null
        body:
          settings:
            index:
              mode: columnar
          mappings:
            dynamic: false
            properties:
              kw:
                type: keyword
                index: false
              ip_field:
                type: ip
                index: false

  # Document order matters: the all-null array (doc 2) and the empty array (doc 4) sit immediately before matching docs, exercising the
  # advanceExact behaviour of the inline-null iterator (before the fix these mis-read the neighbouring document's blob).
  - do:
      bulk:
        index: test_mv_inline_null
        refresh: true
        body:
          - { "index": { "_id": "1" } }
          - { "kw": ["alpha", "beta"], "ip_field": ["10.0.0.1", "10.0.0.9"] }
          - { "index": { "_id": "2" } }
          - { "kw": [null, "beta"] }
          - { "index": { "_id": "3" } }
          - { "kw": ["delta", "epsilon"], "ip_field": ["192.168.0.1"] }
          - { "index": { "_id": "4" } }
          - { "kw": [] }
          - { "index": { "_id": "5" } }
          - { "kw": "zeta" }

  # "beta" is carried by doc 1 (["alpha","beta"]) and doc 2 ([null,"beta"]); the leading null slot must neither hide nor duplicate it.
  - do:
      search:
        index: test_mv_inline_null
        body: { size: 0, track_total_hits: true, query: { term: { kw: beta } } }
  - match: { hits.total.value: 2 }

  - do:
      search:
        index: test_mv_inline_null
        body: { size: 0, track_total_hits: true, query: { terms: { kw: [ alpha, delta ] } } }
  - match: { hits.total.value: 2 }

  - do:
      search:
        index: test_mv_inline_null
        body: { size: 0, track_total_hits: true, query: { prefix: { kw: be } } }
  - match: { hits.total.value: 2 }

  # "beta" (docs 1,2) and "zeta" (doc 5) both contain "et".
  - do:
      search:
        index: test_mv_inline_null
        body: { size: 0, track_total_hits: true, query: { wildcard: { kw: "*et*" } } }
  - match: { hits.total.value: 3 }

  - do:
      search:
        index: test_mv_inline_null
        body: { size: 0, track_total_hits: true, query: { regexp: { kw: beta } } }
  - match: { hits.total.value: 2 }

  # [10.0.0.0, 10.0.0.255] matches doc 1 only; doc 3's 192.168.0.1 is out of range and the empty / null docs carry no ip.
  - do:
      search:
        index: test_mv_inline_null
        body: { size: 0, track_total_hits: true, query: { range: { ip_field: { gte: "10.0.0.0", lte: "10.0.0.255" } } } }
  - match: { hits.total.value: 1 }

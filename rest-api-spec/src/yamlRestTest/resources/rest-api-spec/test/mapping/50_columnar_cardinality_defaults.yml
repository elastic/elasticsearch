---
setup:
  - requires:
      test_runner_features: [ capabilities ]
      capabilities:
        - method: PUT
          path: /{index}
          capabilities: [ columnar_index_modes ]
      cluster_features: [ "mapper.keyword.columnar_default_high_cardinality" ]
      reason: "Columnar mode fields should default to high-cardinality doc values"

---
"Keyword sort field uses low-cardinality doc values by default in columnar mode":
  - do:
      indices.create:
        index: test-keyword-sort-cardinality
        body:
          settings:
            index:
              mode: columnar
              sort.field: sort_field
              number_of_shards: 1
              number_of_replicas: 0
          mappings:
            properties:
              "@timestamp":
                type: date
              sort_field:
                type: keyword
              data_field:
                type: keyword

  - do:
      indices.get_mapping:
        index: test-keyword-sort-cardinality
  - match: { test-keyword-sort-cardinality.mappings.properties.sort_field.doc_values.cardinality: "low" }

  - do:
     indices.get_field_mapping:
       index: test-keyword-sort-cardinality
       fields: data_field
       include_defaults: true
  - match: { test-keyword-sort-cardinality.mappings.data_field.mapping.data_field.doc_values.cardinality: "high" }

---
"IP sort field uses low-cardinality doc values by default in columnar mode":
  - do:
      indices.create:
        index: test-ip-sort-cardinality
        body:
          settings:
            index:
              mode: columnar
              sort.field: sort_field
              number_of_shards: 1
              number_of_replicas: 0
          mappings:
            properties:
              "@timestamp":
                type: date
              sort_field:
                type: ip
              data_field:
                type: ip

  - do:
      indices.get_mapping:
        index: test-ip-sort-cardinality
  - match: { test-ip-sort-cardinality.mappings.properties.sort_field.doc_values.cardinality: "low" }

  - do:
     indices.get_field_mapping:
       index: test-ip-sort-cardinality
       fields: data_field
       include_defaults: true
  - match: { test-ip-sort-cardinality.mappings.data_field.mapping.data_field.doc_values.cardinality: "high" }

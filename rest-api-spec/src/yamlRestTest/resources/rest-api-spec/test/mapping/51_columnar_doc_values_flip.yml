---
setup:
  - requires:
      test_runner_features: [ capabilities ]
      capabilities:
        - method: PUT
          path: /{index}
          capabilities: [ columnar_index_modes ]
      cluster_features: [ "mapper.columnar.ignores_doc_values_false" ]
      reason: "Strict columnar modes must silently ignore doc_values:false and keep doc values enabled"

---
"columnar mode silently ignores doc_values:false for keyword field":
  - do:
      indices.create:
        index: test-columnar-dv-kwd
        body:
          settings:
            index:
              mode: columnar
              number_of_shards: 1
              number_of_replicas: 0
          mappings:
            properties:
              "@timestamp":
                type: date
              field:
                type: keyword
                doc_values: false

  - do:
      indices.get_field_mapping:
        index: test-columnar-dv-kwd
        fields: field
        include_defaults: true
  # doc_values must be enabled despite the explicit doc_values:false
  - is_true: test-columnar-dv-kwd.mappings.field.mapping.field.doc_values

  - do:
      index:
        index: test-columnar-dv-kwd
        id: "1"
        refresh: true
        body:
          "@timestamp": "2023-01-01T00:00:00.000Z"
          field: "hello"
  - do:
      get:
        index: test-columnar-dv-kwd
        id: "1"
  - match: { _source.field: "hello" }


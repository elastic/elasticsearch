---
"standard mode still respects doc_values:false":
  - do:
      indices.create:
        index: test-standard-dv-false
        body:
          settings:
            index:
              mode: standard
              number_of_shards: 1
              number_of_replicas: 0
          mappings:
            properties:
              field:
                type: long
                doc_values: false

  - do:
      indices.get_field_mapping:
        index: test-standard-dv-false
        fields: field
        include_defaults: true
  - is_false: test-standard-dv-false.mappings.field.mapping.field.doc_values

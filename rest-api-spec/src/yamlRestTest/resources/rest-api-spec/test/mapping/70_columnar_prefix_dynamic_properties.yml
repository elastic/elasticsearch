---
"columnar: index created with prefix_properties.dynamic in mapping body is preserved on get_mapping":
  - do:
      indices.create:
        index: test_columnar_prefix_props_input
        body:
          settings:
            index.mode: columnar
          mappings:
            dynamic: "true"
            prefix_properties:
              dynamic:
                attributes: "false"
                resource: "strict"
            properties:
              attributes.host:
                type: keyword
              resource.service:
                type: keyword

  - do:
      indices.get_mapping:

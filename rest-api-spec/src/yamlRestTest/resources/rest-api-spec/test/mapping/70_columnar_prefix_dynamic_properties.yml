  - is_false: test_logsdb_columnar_root_only_dynamic.mappings.prefix_properties

  # Unknown field at root level is auto-mapped since root dynamic is true
  - do:
      index:
        index: test_logsdb_columnar_root_only_dynamic
        refresh: true
        body:
          "@timestamp": "2024-01-01T00:00:00Z"
          host: "es-node-1"
          version: "9.5.0"


---
"columnar: sub-object with enabled false is serialized under prefix_properties":
  - do:
      indices.create:
        index: test_columnar_enabled_false
        body:
          settings:
            index.mode: columnar
          mappings:
            properties:
              attributes:
                enabled: false

  - do:
      indices.get_mapping:
        index: test_columnar_enabled_false
  - match: { test_columnar_enabled_false.mappings.prefix_properties.attributes.enabled: false }
  # Children of a disabled object are not flattened into indexed leaf mappers
  - is_false: test_columnar_enabled_false.mappings.properties.attributes

  # Fields under the disabled prefix are dropped entirely (not indexed, not stored)
  - do:
      index:
        index: test_columnar_enabled_false
        refresh: true
        body:
          attributes:
            host: "es-node-1"
            region: "us-east"
          name: "test"

  - do:
      search:
        index: test_columnar_enabled_false
        body:
          query:
            term:
              attributes.host: "es-node-1"
  - match: { hits.total.value: 0 }

  - do:
      indices.get_mapping:
        index: test_columnar_enabled_false
  # No leaf fields under the disabled prefix are created
  - is_false: test_columnar_enabled_false.mappings.properties.attributes\.host
  - is_false: test_columnar_enabled_false.mappings.properties.attributes\.region

---
"columnar: explicitly declared field under enabled:false is also dropped":
  - do:
      indices.create:
        index: test_columnar_enabled_mapped
        body:
          settings:
            index.mode: columnar
          mappings:
            properties:
              attributes:
                enabled: false
                properties:
                  host:
                    type: keyword

  - do:
      indices.get_mapping:
        index: test_columnar_enabled_mapped
  - match: { test_columnar_enabled_mapped.mappings.prefix_properties.attributes.enabled: false }
  # No children are flattened — the entire subtree is disabled
  - is_false: test_columnar_enabled_mapped.mappings.properties.attributes\.host

  # Declared field is dropped even when sent in the document
  - do:
      index:
        index: test_columnar_enabled_mapped
        refresh: true
        body:
          attributes:
            host: "es-node-1"
          name: "test"

  - do:
      search:
        index: test_columnar_enabled_mapped
        body:
          query:
            term:
              attributes.host: "es-node-1"
  - match: { hits.total.value: 0 }


---
setup:
  - do:
      cluster.put_settings:
        body:
          persistent:
            indices.breaker.request.limit: null

---
teardown:
  - do:
      cluster.put_settings:
        body:
          persistent:
            indices.breaker.request.limit: null

---
"msearch circuit breaker trips and returns failure item without aborting the request":

  - do:
      indices.create:
        index: msearch-cb-test
        body:
          settings:
            number_of_shards: 1
            number_of_replicas: 0

  - do:
      index:
        index: msearch-cb-test
        id: "1"
        body:
          payload: placeholder

  # Use a Painless script to set a 20000-char payload without embedding a long literal.
  # Stored _source becomes {"payload":"x*20000"} ≈ 20015 B.
  # Per-sub-response estimate:
  #   BASE_RESPONSE_OVERHEAD (512) + PER_HIT_OBJECT_OVERHEAD (400) + rawSourceLength (~20015) ≈ 20927 B
  #
  # In plain (non-CCS) mode the 40000 B limit lets sub-search 0's estimate (20927 B) fit, then
  # trips on sub-search 1's estimate (20927 + 20927 = 41854 B > 40000 B).
  #
  # In CCS mode, RecyclerBytesStreamOutput additionally reserves 16384 B on the remote cluster's
  # REQUEST breaker to serialise the shard response.  After sub-search 0's estimate is on the
  # breaker, sub-search 1's transport peaks at 20927 + 16384 = 37311 B < 40000 B (fits), releases,
  # then our estimation adds 20927 B: 20927 + 20927 = 41854 B > 40000 B → trips.
  - do:
      update:
        index: msearch-cb-test
        id: "1"
        refresh: true
        body:
          script:
            lang: painless
            source: >-
              StringBuilder sb = new StringBuilder();
              for (int i = 0; i < 20000; i++) { sb.append("x"); }
              ctx._source.payload = sb.toString();

  - do:
      cluster.put_settings:
        body:
          persistent:
            indices.breaker.request.limit: "40000b"

  # max_concurrent_searches=1 forces sequential execution so sub-search 0 completes and
  # its estimate is reserved before sub-search 1 starts.
  - do:
      msearch:
        max_concurrent_searches: 1
        body:
          - index: msearch-cb-test
          - { query: { match_all: {} }, size: 1 }
          - index: msearch-cb-test
          - { query: { match_all: {} }, size: 1 }

  # Sub-search 0 completes normally.
  - match: { responses.0.status: 200 }
  - match: { responses.0.hits.hits.0._id: "1" }
  # Sub-search 1 is rejected by the circuit breaker; the overall request still returns HTTP 200.
  - match: { responses.1.status: 429 }
  - match: { responses.1.error.type: circuit_breaking_exception }

---
setup:
  - do:
      cluster.put_settings:
        body:
          persistent:
            indices.breaker.request.limit: null

---
teardown:
  - do:
      cluster.put_settings:
        body:
          persistent:
            indices.breaker.request.limit: null

---
"msearch circuit breaker trips and returns failure item without aborting the request":

  - do:
      indices.create:
        index: msearch-cb-test
        body:
          settings:
            number_of_shards: 1
            number_of_replicas: 0

  # Index 50 documents with a 100-char payload each.
  # Each hit contributes PER_HIT_OBJECT_OVERHEAD (400) + rawSourceLength (~115) ≈ 515 B.
  # Per-sub-response estimate:
  #   BASE_RESPONSE_OVERHEAD (512) + 50 × 515 ≈ 26262 B
  #
  # In plain (non-CCS) mode the 46000 B limit lets sub-search 0's estimate (26262 B) fit,
  # then trips on sub-search 1's estimate (26262 + 26262 = 52524 B > 46000 B).
  #
  # In CCS mode, RecyclerBytesStreamOutput additionally reserves 16384 B on the remote
  # cluster's REQUEST breaker. After sub-search 0's estimate is on the breaker, sub-search
  # 1's transport peaks at 26262 + 16384 = 42646 B < 46000 B (fits, ~3354 B margin), then
  # releases. Our estimation adds 26262 B more: 26262 + 26262 = 52524 B > 46000 B → trips.
  - do:
      bulk:
        refresh: true
        body:
          - { index: { _index: msearch-cb-test, _id: "1" } }
          - { payload: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" }
          - { index: { _index: msearch-cb-test, _id: "2" } }
          - { payload: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" }
          - { index: { _index: msearch-cb-test, _id: "3" } }
          - { payload: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" }
          - { index: { _index: msearch-cb-test, _id: "4" } }
          - { payload: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" }
          - { index: { _index: msearch-cb-test, _id: "5" } }
          - { payload: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" }
          - { index: { _index: msearch-cb-test, _id: "6" } }
          - { payload: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" }
          - { index: { _index: msearch-cb-test, _id: "7" } }
          - { payload: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" }
          - { index: { _index: msearch-cb-test, _id: "8" } }

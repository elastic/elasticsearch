---
setup:
  - do:
      cluster.put_settings:
        body:
          persistent:
            indices.breaker.request.limit: null

---
teardown:
  - do:
      cluster.put_settings:
        body:
          persistent:
            indices.breaker.request.limit: null

---
"msearch circuit breaker trips and returns failure item without aborting the request":
  - do:
      indices.create:
        index: msearch-cb-test
        body:
          settings:
            number_of_shards: 1
            number_of_replicas: 0

  # Index 80 empty documents. Using empty source avoids relying on rawSourceLength(), which
  # can be near-zero after transport compression for repetitive payloads in CCS mode.
  # Each hit contributes exactly PER_HIT_OBJECT_OVERHEAD (400 B) to the estimate.
  # Per-sub-response estimate:
  #   BASE_RESPONSE_OVERHEAD (512) + 80 × 400 = 32512 B
  #
  # In plain (non-CCS) mode the 63000 B limit lets sub-search 0's estimate (32512 B) fit,
  # then trips on sub-search 1's estimate (32512 + 32512 = 65024 B > 63000 B).
  #
  # In CCS mode, RecyclerBytesStreamOutput additionally reserves 16384 B on the remote
  # cluster's REQUEST breaker. After sub-search 0's estimate is on the breaker, sub-search
  # 1's transport peaks at 32512 + 16384 = 48896 B < 63000 B (~14 KB margin), then releases.
  # Our estimation adds 32512 B more: 32512 + 32512 = 65024 B > 63000 B → trips.
  - do:
      bulk:
        refresh: true
        body:
          - { index: { _index: msearch-cb-test, _id: "1" } }
          - {}
          - { index: { _index: msearch-cb-test, _id: "2" } }
          - {}
          - { index: { _index: msearch-cb-test, _id: "3" } }
          - {}
          - { index: { _index: msearch-cb-test, _id: "4" } }
          - {}

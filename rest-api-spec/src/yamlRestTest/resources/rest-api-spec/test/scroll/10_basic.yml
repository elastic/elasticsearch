---
"Scroll with new response format":

  - do:
      indices.create:
        index: test_scroll
  - do:
      index:
        index:  test_scroll
        id:     "42"
        body:   { foo: 1 }

  - do:
      index:
        index:  test_scroll
        id:     "43"
        body:   { foo: 2 }

  - do:
      indices.refresh: {}

  - do:
      search:
        index: test_scroll
        size: 1
        scroll: 1m
        sort: foo
        body:
          query:
            match_all: {}

  - set: {_scroll_id: scroll_id}
  - match: {hits.total.value:         2    }
  - match: {hits.total.relation:      eq   }
  - length: {hits.hits:      1    }
  - match: {hits.hits.0._id: "42" }

  - do:
      scroll:
        body: { "scroll_id": "$scroll_id", "scroll": "1m"}

  - match: {hits.total.value:      2    }
  - match: {hits.total.relation:   eq   }
  - length: {hits.hits:      1    }
  - match: {hits.hits.0._id: "43" }

  - do:
      scroll:
        scroll_id: $scroll_id
        scroll: 1m

  - match: {hits.total.value:      2    }
  - match: {hits.total.relation:   eq   }
  - length: {hits.hits:      0    }

  - do:
      clear_scroll:
        scroll_id: $scroll_id

---
"Scroll when can_match skips every shard returns an empty 200":
  - requires:
      cluster_features: [ "search.scroll.empty_context_returns_200" ]
      reason: "before this fix, scrolling an empty-context scroll_id returned 503"

  - do:
      indices.create:
        index: scroll_can_match_skip_all
        body:
          settings:
            number_of_shards: 3
          mappings:
            properties:
              created_date:
                type: date
                format: yyyy-MM-dd

  - do:
      bulk:
        refresh: true
        body:
          - { index: { _index: scroll_can_match_skip_all, _id: "1" } }
          - { created_date: "2020-01-01" }
          - { index: { _index: scroll_can_match_skip_all, _id: "2" } }
          - { created_date: "2020-01-02" }
          - { index: { _index: scroll_can_match_skip_all, _id: "3" } }
          - { created_date: "2020-01-03" }

  - do:
      search:
        index: scroll_can_match_skip_all
        scroll: 1m
        pre_filter_shard_size: 1
        body:
          size: 1
          query:
            range:
              created_date:
                gte: "2030-01-01"
                lte: "2030-01-02"

  - set: { _scroll_id: scroll_id }
  # The empty-context branch is exercised by the next scroll call below; we don't pin the
  # initial-response _shards.* counts so the test stays resilient to can_match accounting changes.
  - match: { hits.total.value: 0 }
  - length: { hits.hits: 0 }

  - do:
      scroll:
        scroll_id: $scroll_id
        scroll: 1m

  # The scroll id encoded zero contexts (skipped shards never executed the query phase).
  - match: { _shards.total: 0 }
  - match: { _shards.successful: 0 }
  - match: { _shards.skipped: 0 }
  - match: { _shards.failed: 0 }
  - match: { hits.total.value: 0 }
  - length: { hits.hits: 0 }

---
"Scroll on a non-matching index pattern returns an empty 200":
  - requires:
      cluster_features: [ "search.scroll.empty_context_returns_200" ]
      reason: "before this fix, scrolling an empty-context scroll_id returned 503"

  - do:
      search:
        index: non_existent_pattern_*
        scroll: 1m
        body:
          query:
            match_all: { }

  - set: { _scroll_id: scroll_id }
  - match: { _shards.total: 0 }
  - match: { hits.total.value: 0 }
  - length: { hits.hits: 0 }

  - do:
      scroll:
        scroll_id: $scroll_id
        scroll: 1m

  - match: { _shards.total: 0 }
  - match: { _shards.successful: 0 }
  - match: { _shards.skipped: 0 }
  - match: { _shards.failed: 0 }
  - match: { hits.total.value: 0 }
  - length: { hits.hits: 0 }

  # idempotent: scrolling the same empty cursor again still returns 200
  - do:
      scroll:
        scroll_id: $scroll_id
        scroll: 1m

  - match: { _shards.total: 0 }
  - match: { hits.total.value: 0 }
  - length: { hits.hits: 0 }

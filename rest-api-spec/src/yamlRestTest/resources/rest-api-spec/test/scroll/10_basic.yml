---
"Scroll cannot used the request cache":

  - do:
      indices.create:
        index: test_scroll
  - do:
      catch: /\[request_cache\] cannot be used in a scroll context/
      search:
        rest_total_hits_as_int: true
        index: test_scroll
        scroll: 1m
        request_cache: true
        body:
          query:
            match_all: {}

---
"Scroll with size 0":

  - do:
      indices.create:
        index: test_scroll
  - do:
      catch: /\[size\] cannot be \[0\] in a scroll context/
      search:
        rest_total_hits_as_int: true
        index: test_scroll
        scroll: 1m
        request_cache: true
        body:
          query:
            match_all: {}
          size: 0


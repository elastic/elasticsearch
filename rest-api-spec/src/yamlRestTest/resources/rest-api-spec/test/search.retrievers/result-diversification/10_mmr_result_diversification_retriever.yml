      search:
        index: test-result-byte-diversification-index
        body:
          retriever:
            standard:
              query:
                match_all: { }
              sort:
                id:
                  order: asc

  - match: { hits.total.value: 7 }
  - length: { hits.hits: 7 }
  - match: { hits.hits.0._source.textbody: "first text" }
  - match: { hits.hits.1._source.textbody: "second text" }

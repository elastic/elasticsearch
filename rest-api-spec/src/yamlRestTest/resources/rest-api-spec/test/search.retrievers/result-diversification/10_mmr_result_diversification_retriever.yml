---
"Test MMR result diversification rank_window_size restricts top docs":

  - do:
      search:
        index: test-result-diversification-index
        body:
          retriever:
            diversify:
              type: "mmr"
              field: "textvector"
              lambda: 0.3
              rank_window_size: 2
              size: 2
              retriever:
                knn:
                  field: "textvector"
                  query_vector: [ 0.5, 0.2, 0.4, 0.4 ]
                  k: 10
                  num_candidates: 10

  - match: { hits.total.value: 2 }
  - length: { hits.hits: 2 }
  - match: { hits.hits.0._source.textbody: "second text" }
  - match: { hits.hits.1._source.textbody: "second text duplicate" }

---
"Test MMR result diversification required parameters":

  - do:
      catch: /Required \[type\]/
      search:
        index: test-result-diversification-index
        body:
          retriever:
            diversify:
              field: "textvector"
              lambda: 0.7
              size: 3
              retriever:
                knn:
                  field: "textvector"
                  query_vector: [ 0.5, 0.2, 0.4, 0.4 ]
                  k: 6
                  num_candidates: 6

  - match: { status: 400 }
  - match: { error.type: illegal_argument_exception }

  - do:
      catch: /unknown result diversification type \[invalid\]/
      search:
        index: test-result-diversification-index
        body:
          retriever:
            diversify:
              type: "invalid"
              field: "textvector"
              lambda: 0.7
              size: 3
              retriever:
                knn:
                  field: "textvector"
                  query_vector: [ 0.5, 0.2, 0.4, 0.4 ]
                  k: 6
                  num_candidates: 6

  - match: { status: 400 }

  - do:
      catch: /Required \[retriever\]/
      search:
        index: test-result-diversification-index
        body:
          retriever:
            diversify:
              type: "mmr"
              field: "textvector"
              lambda: 0.7
              size: 3

  - match: { status: 400 }
  - match: { error.type: illegal_argument_exception }

  - do:
      catch: /\[diversify\] MMR result diversification \[size\] of -3 must be greater than zero/
      search:
        index: test-result-diversification-index
        body:
          retriever:
            diversify:
              type: "mmr"
              field: "textvector"
              size: -3
              lambda: 0.7
              retriever:
                knn:
                  field: "textvector"
                  query_vector: [ 0.5, 0.2, 0.4, 0.4 ]
                  k: 6
                  num_candidates: 6

  - match: { status: 400 }
  - match: { error.type: action_request_validation_exception }

  - do:
      catch: /\[diversify\] MMR result diversification must have a \[lambda\] between 0.0 and 1.0. The value provided was null/
      search:
        index: test-result-diversification-index
        body:
          retriever:
            diversify:
              type: "mmr"
              field: "textvector"
              size: 3
              retriever:
                knn:
                  field: "textvector"
                  query_vector: [ 0.5, 0.2, 0.4, 0.4 ]
                  k: 6
                  num_candidates: 6

  - match: { status: 400 }
  - match: { error.type: action_request_validation_exception }

  - do:
      catch: /\[diversify\] MMR result diversification must have a \[lambda\] between 0.0 and 1.0. The value provided was -0.5/
      search:
        index: test-result-diversification-index
        body:
          retriever:
            diversify:
              type: "mmr"
              field: "textvector"
              lambda: -0.5
              size: 3
              retriever:
                knn:
                  field: "textvector"
                  query_vector: [ 0.5, 0.2, 0.4, 0.4 ]
                  k: 6
                  num_candidates: 6

  - match: { status: 400 }
  - match: { error.type: action_request_validation_exception }

  - do:
      catch: /\[diversify\] MMR result diversification must have a \[lambda\] between 0.0 and 1.0. The value provided was 1.5/
      search:
        index: test-result-diversification-index
        body:
          retriever:
            diversify:
              type: "mmr"
              field: "textvector"
              lambda: 1.5
              size: 3
              retriever:
                knn:
                  field: "textvector"
                  query_vector: [ 0.5, 0.2, 0.4, 0.4 ]
                  k: 6
                  num_candidates: 6

  - match: { status: 400 }
  - match: { error.type: action_request_validation_exception }

  - do:
      catch: /\[diversify\] MMR result diversification \[size\] of 3 cannot be greater than the \[rank_window_size\] of 2/
      search:
        index: test-result-diversification-index
        body:

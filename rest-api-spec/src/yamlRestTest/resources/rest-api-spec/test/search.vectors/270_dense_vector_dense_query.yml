---
"dense_vector raw scoring on a non-indexed byte field matches the indexed equivalent":
  # A non-indexed byte field decodes stored binary doc values and applies the supplied similarity function.
  # Scores must match the indexed dv_byte field under the same l2_norm override (both use RawByteVectorScorer
  # / DocValuesByteVectorScorer with EUCLIDEAN on the raw integer byte values).
  - do:
      search:
        index: dv_byte
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [4, -10, 15, -20, 25]
              similarity_function: l2_norm
  - match: { hits.total.value: 3 }
  - set: { hits.hits.0._id: byte_top_id }
  - set: { hits.hits.0._score: byte_indexed_score_0 }
  - set: { hits.hits.1._score: byte_indexed_score_1 }
  - set: { hits.hits.2._score: byte_indexed_score_2 }

  - do:
      search:
        index: dv_unindexed_byte
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [4, -10, 15, -20, 25]
              similarity_function: l2_norm
  - match: { hits.total.value: 3 }
  - match: { hits.hits.0._id: $byte_top_id }
  - close_to: {hits.hits.0._score: {value: $byte_indexed_score_0, error: 0.000001}}
  - close_to: {hits.hits.1._score: {value: $byte_indexed_score_1, error: 0.000001}}
  - close_to: {hits.hits.2._score: {value: $byte_indexed_score_2, error: 0.000001}}

---
"dense_vector on a non-indexed field defaults to cosine when no similarity_function is given":
  # A non-indexed field has no mapped similarity, so scoring defaults to cosine.
  - do:
      search:
        index: dv_unindexed
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [0.5, 111.3, -13.0, 14.8, -156.0]
  - match: { hits.total.value: 3 }
  # Query equals doc 3 (rabbit) verbatim ⇒ cosine ≈ 1.0 ⇒ Lucene score (1 + cosine) / 2 ≈ 1.0.
  - match: { hits.hits.0._id: "3" }
  - close_to: {hits.hits.0._score: {value: 1.0, error: 0.001}}

---
"dense_vector on a non-indexed field supports a cosine similarity_function":
  - do:
      search:
        index: dv_unindexed
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [0.5, 111.3, -13.0, 14.8, -156.0]
              similarity_function: cosine
  - match: { hits.total.value: 3 }
  # Query equals doc 3 (rabbit) verbatim ⇒ cosine ≈ 1.0 ⇒ Lucene score (1 + cosine) / 2 ≈ 1.0.
  - match: { hits.hits.0._id: "3" }
  - close_to: {hits.hits.0._score: {value: 1.0, error: 0.001}}

---
"dense_vector Hamming scoring on a non-indexed bit field matches the indexed equivalent":
  # bit fields score by Hamming distance ((numBits - xorBitCount) / numBits). A non-indexed bit field has no
  # KNN values, so it is scored from doc values; the scores must match the indexed bit field exactly.
  - do:
      search:
        index: dv_bit
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [2, -1, 1, 4, -3]
  - match: { hits.total.value: 3 }
  - set: { hits.hits.0._id: bit_top_id }
  - set: { hits.hits.0._score: bit_indexed_score_0 }
  - set: { hits.hits.1._score: bit_indexed_score_1 }
  - set: { hits.hits.2._score: bit_indexed_score_2 }

  - do:
      search:
        index: dv_unindexed_bit
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [2, -1, 1, 4, -3]
  - match: { hits.total.value: 3 }
  - match: { hits.hits.0._id: $bit_top_id }
  # Query equals doc 1 (cow) verbatim ⇒ Hamming 0 ⇒ score (40 - 0) / 40 = 1.0.
  - close_to: {hits.hits.0._score: {value: 1.0, error: 0.000001}}
  - close_to: {hits.hits.0._score: {value: $bit_indexed_score_0, error: 0.000001}}
  - close_to: {hits.hits.1._score: {value: $bit_indexed_score_1, error: 0.000001}}
  - close_to: {hits.hits.2._score: {value: $bit_indexed_score_2, error: 0.000001}}

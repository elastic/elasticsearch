setup:
  - requires:
      cluster_features: "search.vectors.dense_vector_query"
      test_runner_features: "close_to"
      reason: 'dense_vector query introduced in 9.5'

  - do:
      indices.create:
        index: dv_flat
        body:
          mappings:
            properties:
              name:
                type: keyword
              vector:
                type: dense_vector
                dims: 5
                index: true
                similarity: l2_norm
                index_options:
                  type: flat

  - do:
      indices.create:
        index: dv_hnsw
        body:
          mappings:
            properties:
              name:
                type: keyword
              vector:
                type: dense_vector
                dims: 5
                index: true
                similarity: l2_norm
                index_options:
                  type: hnsw

  - do:
      indices.create:
        index: dv_int8_hnsw
        body:
          mappings:
            properties:
              name:
                type: keyword
              vector:
                type: dense_vector
                dims: 5
                index: true
                similarity: cosine
                index_options:
                  type: int8_hnsw

  - do:
      indices.create:
        index: dv_int4_hnsw
        body:
          mappings:
            properties:
              name:
                type: keyword
              vector:
                type: dense_vector
                dims: 8
                index: true
                similarity: cosine
                index_options:
                  type: int4_hnsw

  - do:
      indices.create:
        index: dv_byte
        body:
          mappings:
            properties:
              name:
                type: keyword
              vector:
                type: dense_vector
                element_type: byte
                dims: 5
                index: true
                similarity: dot_product

  - do:
      indices.create:
        index: dv_bit
        body:
          mappings:
            properties:
              name:
                type: keyword
              vector:
                type: dense_vector
                element_type: bit
                dims: 40
                index: true
                similarity: l2_norm

  - do:
      indices.create:
        index: dv_bbq_hnsw
        body:
          mappings:
            properties:
              name:
                type: keyword
              vector:
                type: dense_vector
                dims: 64
                index: true
                similarity: cosine
                index_options:
                  type: bbq_hnsw

  # bfloat16 on a non-quantized codec: the raw path reads the preserved bfloat16 values, so quantized=true
  # must be a no-op. Mirrors dv_hnsw so the two can be compared.
  - do:
      indices.create:
        index: dv_bfloat16_hnsw
        body:
          mappings:
            properties:
              name:
                type: keyword
              vector:
                type: dense_vector
                element_type: bfloat16
                dims: 5
                index: true
                similarity: l2_norm
                index_options:
                  type: hnsw

  # bfloat16 on a quantized codec: the raw path still reads the preserved bfloat16 values, while
  # quantized=true scores against the int8 representation. Mirrors dv_int8_hnsw.
  - do:
      indices.create:
        index: dv_bfloat16_int8_hnsw
        body:
          mappings:
            properties:
              name:
                type: keyword
              vector:
                type: dense_vector
                element_type: bfloat16
                dims: 5
                index: true
                similarity: cosine
                index_options:
                  type: int8_hnsw

  # Non-indexed (index:false) fields store vectors as binary doc values and have no configured similarity,
  # so the query must supply [similarity_function]. dv_unindexed mirrors dv_flat's vectors so l2_norm scoring
  # can be compared against the indexed equivalent.
  - do:
      indices.create:
        index: dv_unindexed
        body:
          mappings:
            properties:
              name:
                type: keyword
              vector:
                type: dense_vector
                dims: 5
                index: false

  # dv_unindexed_bfloat16 mirrors dv_bfloat16_hnsw's vectors for the same comparison on a bfloat16 field.
  - do:
      indices.create:
        index: dv_unindexed_bfloat16
        body:
          mappings:
            properties:
              name:
                type: keyword
              vector:
                type: dense_vector
                element_type: bfloat16
                dims: 5
                index: false

  # dv_unindexed_byte mirrors dv_byte's vectors so l2_norm override scoring can be compared against the
  # indexed equivalent (different code path: binary doc values vs KNN byte vector values).
  - do:
      indices.create:
        index: dv_unindexed_byte
        body:
          mappings:
            properties:
              name:
                type: keyword
              vector:
                type: dense_vector
                element_type: byte
                dims: 5
                index: false

  # dv_unindexed_bit mirrors dv_bit's vectors, to compare Hamming scoring against the indexed equivalent.
  - do:
      indices.create:
        index: dv_unindexed_bit
        body:
          mappings:
            properties:
              name:
                type: keyword
              vector:
                type: dense_vector
                element_type: bit
                dims: 40
                index: false

  - do:
      index:
        index: dv_flat
        id: "1"
        body: { name: cow.jpg,    vector: [230.0, 300.33, -34.8988, 15.555, -200.0] }
  - do:
      index:
        index: dv_flat
        id: "2"
        body: { name: moose.jpg,  vector: [-0.5, 100.0, -13, 14.8, -156.0] }
  - do:
      index:
        index: dv_flat
        id: "3"
        body: { name: rabbit.jpg, vector: [0.5, 111.3, -13.0, 14.8, -156.0] }

  # dv_hnsw mirrors dv_flat exactly so we can compare quantized=true vs default (must be a no-op).
  - do:
      index:
        index: dv_hnsw
        id: "1"
        body: { name: cow.jpg,    vector: [230.0, 300.33, -34.8988, 15.555, -200.0] }
  - do:
      index:
        index: dv_hnsw
        id: "2"
        body: { name: moose.jpg,  vector: [-0.5, 100.0, -13, 14.8, -156.0] }
  - do:
      index:
        index: dv_hnsw
        id: "3"
        body: { name: rabbit.jpg, vector: [0.5, 111.3, -13.0, 14.8, -156.0] }

  - do:
      index:
        index: dv_int8_hnsw
        id: "1"
        body: { name: cow.jpg,    vector: [0.6, 0.5, 0.4, 0.3, 0.2] }
  - do:
      index:
        index: dv_int8_hnsw
        id: "2"
        body: { name: moose.jpg,  vector: [0.1, 0.2, 0.3, 0.4, 0.6] }
  - do:
      index:
        index: dv_int8_hnsw
        id: "3"
        body: { name: rabbit.jpg, vector: [0.5, 0.5, 0.5, 0.5, 0.5] }

  - do:
      index:
        index: dv_int4_hnsw
        id: "1"
        body: { name: cow.jpg,    vector: [0.6, 0.5, 0.4, 0.3, 0.2, 0.1, 0.05, 0.0] }
  - do:
      index:
        index: dv_int4_hnsw
        id: "2"
        body: { name: moose.jpg,  vector: [0.1, 0.2, 0.3, 0.4, 0.6, 0.5, 0.4, 0.3] }
  - do:
      index:
        index: dv_int4_hnsw
        id: "3"
        body: { name: rabbit.jpg, vector: [0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5] }

  - do:
      index:
        index: dv_byte
        id: "1"
        body: { name: cow.jpg,    vector: [10, -20, 30, -40, 50] }
  - do:
      index:
        index: dv_byte
        id: "2"
        body: { name: moose.jpg,  vector: [-10, 20, -30, 40, -50] }
  - do:
      index:
        index: dv_byte
        id: "3"
        body: { name: rabbit.jpg, vector: [5, -10, 15, -20, 25] }

  - do:
      index:
        index: dv_bit
        id: "1"
        body: { name: cow.jpg,    vector: [2, -1, 1, 4, -3] }
  - do:
      index:
        index: dv_bit
        id: "2"
        body: { name: moose.jpg,  vector: [-1, 5, 0, 1, 4] }
  - do:
      index:
        index: dv_bit
        id: "3"
        body: { name: rabbit.jpg, vector: [3, 0, -1, 2, 6] }

  # dv_bbq_hnsw needs ≥64 dims for the binary-quantization codec. Three roughly-clustered docs:
  # rabbit is closest to the test query [0.1] * 64, cow next, moose furthest.
  - do:
      index:
        index: dv_bbq_hnsw
        id: "1"
        body:
          name: cow.jpg
          vector: [0.077,  0.32 , -0.205,  0.63 ,  0.032,  0.201,  0.167, -0.313,
                   0.176,  0.531, -0.375,  0.334, -0.046,  0.078, -0.349,  0.272,
                   0.307, -0.083,  0.504,  0.255, -0.404,  0.289, -0.226, -0.132,
                   -0.216,  0.49 ,  0.039,  0.507, -0.307,  0.107,  0.09 , -0.265,
                   -0.285,  0.336, -0.272,  0.369, -0.282,  0.086, -0.132,  0.475,
                   -0.224,  0.203,  0.439,  0.064,  0.246, -0.396,  0.297,  0.242,
                   -0.028,  0.321, -0.022, -0.009, -0.001,  0.031, -0.533,  0.45,
                   -0.683,  1.331,  0.194, -0.157, -0.1  , -0.279, -0.098, -0.176]
  - do:
      index:
        index: dv_bbq_hnsw
        id: "2"
        body:
          name: moose.jpg
          vector: [0.196,  0.514,  0.039,  0.555, -0.042,  0.242,  0.463, -0.348,
                   -0.08 ,  0.442, -0.067, -0.05 , -0.001,  0.298, -0.377,  0.048,
                   0.307,  0.159,  0.278,  0.119, -0.057,  0.333, -0.289, -0.438,
                   -0.014,  0.361, -0.169,  0.292, -0.229,  0.123,  0.031, -0.138,
                   -0.139,  0.315, -0.216,  0.322, -0.445, -0.059,  0.071,  0.429,
                   -0.602, -0.142,  0.11 ,  0.192,  0.259, -0.241,  0.181, -0.166,
                   0.082,  0.107, -0.05 ,  0.155,  0.011,  0.161, -0.486,  0.569,
                   -0.489,  0.901,  0.208,  0.011, -0.209, -0.153, -0.27 , -0.013]
  - do:
      index:
        index: dv_bbq_hnsw
        id: "3"
        body:
          name: rabbit.jpg
          vector: [0.139,  0.178, -0.117,  0.399,  0.014, -0.139,  0.347, -0.33 ,
                   0.139,  0.34 , -0.052, -0.052, -0.249,  0.327, -0.288,  0.049,
                   0.464,  0.338,  0.516,  0.247, -0.104,  0.259, -0.209, -0.246,
                   -0.11 ,  0.323,  0.091,  0.442, -0.254,  0.195, -0.109, -0.058,
                   -0.279,  0.402, -0.107,  0.308, -0.273,  0.019,  0.082,  0.399,
                   -0.658, -0.03 ,  0.276,  0.041,  0.187, -0.331,  0.165,  0.017,
                   0.171, -0.203, -0.198,  0.115, -0.007,  0.337, -0.444,  0.615,
                   -0.683,  1.331,  0.194, -0.157, -0.1  , -0.279, -0.098, -0.176]

  # dv_bfloat16_hnsw mirrors dv_hnsw exactly so we can compare quantized=true vs default (must be a no-op).
  - do:
      index:
        index: dv_bfloat16_hnsw
        id: "1"
        body: { name: cow.jpg,    vector: [230.0, 300.33, -34.8988, 15.555, -200.0] }
  - do:
      index:
        index: dv_bfloat16_hnsw
        id: "2"
        body: { name: moose.jpg,  vector: [-0.5, 100.0, -13, 14.8, -156.0] }
  - do:
      index:
        index: dv_bfloat16_hnsw
        id: "3"
        body: { name: rabbit.jpg, vector: [0.5, 111.3, -13.0, 14.8, -156.0] }

  - do:
      index:
        index: dv_bfloat16_int8_hnsw
        id: "1"
        body: { name: cow.jpg,    vector: [0.6, 0.5, 0.4, 0.3, 0.2] }
  - do:
      index:
        index: dv_bfloat16_int8_hnsw
        id: "2"
        body: { name: moose.jpg,  vector: [0.1, 0.2, 0.3, 0.4, 0.6] }
  - do:
      index:
        index: dv_bfloat16_int8_hnsw
        id: "3"
        body: { name: rabbit.jpg, vector: [0.5, 0.5, 0.5, 0.5, 0.5] }

  # dv_unindexed mirrors dv_flat exactly so l2_norm scoring can be compared against the indexed equivalent.
  - do:
      index:
        index: dv_unindexed
        id: "1"
        body: { name: cow.jpg,    vector: [230.0, 300.33, -34.8988, 15.555, -200.0] }
  - do:
      index:
        index: dv_unindexed
        id: "2"
        body: { name: moose.jpg,  vector: [-0.5, 100.0, -13, 14.8, -156.0] }
  - do:
      index:
        index: dv_unindexed
        id: "3"
        body: { name: rabbit.jpg, vector: [0.5, 111.3, -13.0, 14.8, -156.0] }

  # dv_unindexed_bfloat16 mirrors dv_bfloat16_hnsw exactly.
  - do:
      index:
        index: dv_unindexed_bfloat16
        id: "1"
        body: { name: cow.jpg,    vector: [230.0, 300.33, -34.8988, 15.555, -200.0] }
  - do:
      index:
        index: dv_unindexed_bfloat16
        id: "2"
        body: { name: moose.jpg,  vector: [-0.5, 100.0, -13, 14.8, -156.0] }
  - do:
      index:
        index: dv_unindexed_bfloat16
        id: "3"
        body: { name: rabbit.jpg, vector: [0.5, 111.3, -13.0, 14.8, -156.0] }

  # dv_unindexed_byte mirrors dv_byte exactly.
  - do:
      index:
        index: dv_unindexed_byte
        id: "1"
        body: { name: cow.jpg,    vector: [10, -20, 30, -40, 50] }
  - do:
      index:
        index: dv_unindexed_byte
        id: "2"
        body: { name: moose.jpg,  vector: [-10, 20, -30, 40, -50] }
  - do:
      index:
        index: dv_unindexed_byte
        id: "3"
        body: { name: rabbit.jpg, vector: [5, -10, 15, -20, 25] }

  # dv_unindexed_bit mirrors dv_bit exactly.
  - do:
      index:
        index: dv_unindexed_bit
        id: "1"
        body: { name: cow.jpg,    vector: [2, -1, 1, 4, -3] }
  - do:
      index:
        index: dv_unindexed_bit
        id: "2"
        body: { name: moose.jpg,  vector: [-1, 5, 0, 1, 4] }
  - do:
      index:
        index: dv_unindexed_bit
        id: "3"
        body: { name: rabbit.jpg, vector: [3, 0, -1, 2, 6] }

  - do:
      indices.refresh: {}

---
"quantized: true is a no-op on FLAT (non-quantized) indexes":
  # The codec has no quantized representation to fall back to, so default and quantized must match exactly.
  - do:
      search:
        index: dv_flat
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [-0.5, 90.0, -10, 14.8, -156.0]
  - set: { hits.hits.0._score: flat_score_0 }
  - set: { hits.hits.1._score: flat_score_1 }
  - set: { hits.hits.2._score: flat_score_2 }

  - do:
      search:
        index: dv_flat
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [-0.5, 90.0, -10, 14.8, -156.0]
              quantized: true
  - close_to: {hits.hits.0._score: {value: $flat_score_0, error: 0.000001}}
  - close_to: {hits.hits.1._score: {value: $flat_score_1, error: 0.000001}}
  - close_to: {hits.hits.2._score: {value: $flat_score_2, error: 0.000001}}

---
"quantized: true is a no-op on HNSW (non-quantized) indexes":
  - do:
      search:
        index: dv_hnsw
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [-0.5, 90.0, -10, 14.8, -156.0]
  - set: { hits.hits.0._score: hnsw_score_0 }
  - set: { hits.hits.1._score: hnsw_score_1 }
  - set: { hits.hits.2._score: hnsw_score_2 }

  - do:
      search:
        index: dv_hnsw
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [-0.5, 90.0, -10, 14.8, -156.0]
              quantized: true
  - close_to: {hits.hits.0._score: {value: $hnsw_score_0, error: 0.000001}}
  - close_to: {hits.hits.1._score: {value: $hnsw_score_1, error: 0.000001}}
  - close_to: {hits.hits.2._score: {value: $hnsw_score_2, error: 0.000001}}

---
"dense_vector exact query against int4_hnsw uses raw scoring by default":
  # int4_hnsw is more lossy than int8 but the raw path still iterates the preserved float values.
  # Top hit must be the document whose vector matches the query (rabbit, all-equal vector).
  - do:
      search:
        index: dv_int4_hnsw
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5]
  - match: {hits.total.value: 3}
  - match: {hits.hits.0._id: "3"}
  # Score against an identical (post-normalization) vector ⇒ ≈ 1.0; tighter than int8 because the raw
  # path is unaffected by int4 quantization.
  - close_to: {hits.hits.0._score: {value: 1.0, error: 0.001}}

  - do:
      search:
        index: dv_int4_hnsw
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5]
              quantized: true
  - match: {hits.hits.0._id: "3"}
  # quantized=true on int4 lets int4 quantization noise through — give a wider tolerance.
  - close_to: {hits.hits.0._score: {value: 1.0, error: 0.05}}

---
"dense_vector on a byte field: quantized flag is a no-op":
  # BYTE fields have no codec-level quantization (the bytes are the storage). default and quantized
  # must produce identical scores.
  - do:
      search:
        index: dv_byte
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [10, -20, 30, -40, 50]
  - set: { hits.hits.0._score: byte_score_0 }
  - set: { hits.hits.1._score: byte_score_1 }
  - set: { hits.hits.2._score: byte_score_2 }

  - do:
      search:
        index: dv_byte
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [10, -20, 30, -40, 50]
              quantized: true
  - close_to: {hits.hits.0._score: {value: $byte_score_0, error: 0.000001}}
  - close_to: {hits.hits.1._score: {value: $byte_score_1, error: 0.000001}}
  - close_to: {hits.hits.2._score: {value: $byte_score_2, error: 0.000001}}

---
"dense_vector on a bit field: quantized flag is a no-op":
  # BIT fields encode hamming distance over the bits themselves — no codec quantization layer.
  - do:
      search:
        index: dv_bit
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [2, -1, 1, 4, -3]
  - set: { hits.hits.0._score: bit_score_0 }
  - set: { hits.hits.1._score: bit_score_1 }
  - set: { hits.hits.2._score: bit_score_2 }

  - do:
      search:
        index: dv_bit
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [2, -1, 1, 4, -3]
              quantized: true
  - close_to: {hits.hits.0._score: {value: $bit_score_0, error: 0.000001}}
  - close_to: {hits.hits.1._score: {value: $bit_score_1, error: 0.000001}}
  - close_to: {hits.hits.2._score: {value: $bit_score_2, error: 0.000001}}

---
"dense_vector on a bit field rejects non-l2 similarity_function override":
  # l2_norm (Hamming) is the only valid metric for bit vectors, on both indexed and non-indexed fields.
  - do:
      catch: bad_request
      search:
        index: dv_bit
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [2, -1, 1, 4, -3]
              similarity_function: cosine

  - do:
      catch: bad_request
      search:
        index: dv_unindexed_bit
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [2, -1, 1, 4, -3]
              similarity_function: cosine

  - do:
      catch: bad_request
      search:
        index: dv_bit
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [2, -1, 1, 4, -3]
              similarity_function: dot_product

  - do:
      catch: bad_request
      search:
        index: dv_bit
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [2, -1, 1, 4, -3]
              similarity_function: max_inner_product

---
"similarity_function and quantized: true are mutually exclusive":
  - do:
      catch: bad_request
      search:
        index: dv_flat
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [-0.5, 90.0, -10, 14.8, -156.0]
              similarity_function: l2_norm
              quantized: true

---
"similarity_function override changes the score function":
  # Override the cosine-mapped int8_hnsw index to l2_norm. Doc 3 (original [0.5,…]) is nearest in
  # Euclidean distance to the query [0.4, 0.5, …]. The override reconstructs original vectors via the
  # stored per-doc magnitude, so the score is 1/(1+||query−original||²) = 1/(1+0.01) ≈ 0.990 —
  # well below the cosine default of ~1.0, proving the override drove scoring.
  - do:
      search:
        index: dv_int8_hnsw
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [0.4, 0.5, 0.5, 0.5, 0.5]
              similarity_function: l2_norm
  - match: {hits.hits.0._id: "3"}
  # dist² from query [0.4,0.5,0.5,0.5,0.5] to original doc 3 [0.5,0.5,0.5,0.5,0.5] = 0.01 →
  # EUCLIDEAN score = 1/(1+0.01) ≈ 0.990; cosine score for same query ≈ 0.998 (outside the error range).
  - close_to: {hits.hits.0._score: {value: 0.990, error: 0.01}}

---
"dense_vector exact query against bbq_hnsw uses raw scoring by default":
  # bbq_hnsw applies aggressive 1-bit binary quantization. The raw path iterates the preserved
  # full-precision vectors (when available); quantized=true exercises the binary scorer.
  # Top hit must be the document whose stored vector is closest to the query under cosine similarity.
  - do:
      search:
        index: dv_bbq_hnsw
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [0.139,  0.178, -0.117,  0.399,  0.014, -0.139,  0.347, -0.33 ,
                             0.139,  0.34 , -0.052, -0.052, -0.249,  0.327, -0.288,  0.049,
                             0.464,  0.338,  0.516,  0.247, -0.104,  0.259, -0.209, -0.246,
                             -0.11 ,  0.323,  0.091,  0.442, -0.254,  0.195, -0.109, -0.058,
                             -0.279,  0.402, -0.107,  0.308, -0.273,  0.019,  0.082,  0.399,
                             -0.658, -0.03 ,  0.276,  0.041,  0.187, -0.331,  0.165,  0.017,
                             0.171, -0.203, -0.198,  0.115, -0.007,  0.337, -0.444,  0.615,
                             -0.683,  1.331,  0.194, -0.157, -0.1  , -0.279, -0.098, -0.176]
  - match: {hits.total.value: 3}
  # Query equals doc 3 (rabbit) verbatim ⇒ raw cosine ≈ 1.0 with very tight tolerance.
  - match: {hits.hits.0._id: "3"}
  - close_to: {hits.hits.0._score: {value: 1.0, error: 0.001}}

---
"dense_vector on bbq_hnsw: quantized scoring stays close to raw within binary-quantization budget":
  # Same query as above; switch to quantized=true. Binary quantization can flip individual bits, so
  # the score is bounded but noticeably noisier than int8/int4. We assert top hit ordering AND that
  # the quantized score sits in a wide band around the raw 1.0 — proving the codec scorer is bounded
  # by the BBQ noise budget.
  - do:
      search:
        index: dv_bbq_hnsw
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [0.139,  0.178, -0.117,  0.399,  0.014, -0.139,  0.347, -0.33 ,
                             0.139,  0.34 , -0.052, -0.052, -0.249,  0.327, -0.288,  0.049,
                             0.464,  0.338,  0.516,  0.247, -0.104,  0.259, -0.209, -0.246,
                             -0.11 ,  0.323,  0.091,  0.442, -0.254,  0.195, -0.109, -0.058,
                             -0.279,  0.402, -0.107,  0.308, -0.273,  0.019,  0.082,  0.399,
                             -0.658, -0.03 ,  0.276,  0.041,  0.187, -0.331,  0.165,  0.017,
                             0.171, -0.203, -0.198,  0.115, -0.007,  0.337, -0.444,  0.615,
                             -0.683,  1.331,  0.194, -0.157, -0.1  , -0.279, -0.098, -0.176]
              quantized: true
  - match: {hits.hits.0._id: "3"}
  - close_to: {hits.hits.0._score: {value: 1.0, error: 0.5}}

---
"quantized: true is a no-op on a bfloat16 non-quantized index":
  # The hnsw codec has no quantized representation, so both paths read the same preserved bfloat16
  # values and scores must match exactly.
  - do:
      search:
        index: dv_bfloat16_hnsw
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [-0.5, 90.0, -10, 14.8, -156.0]
  - set: { hits.hits.0._score: bf16_score_0 }
  - set: { hits.hits.1._score: bf16_score_1 }
  - set: { hits.hits.2._score: bf16_score_2 }

  - do:
      search:
        index: dv_bfloat16_hnsw
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [-0.5, 90.0, -10, 14.8, -156.0]
              quantized: true
  - close_to: {hits.hits.0._score: {value: $bf16_score_0, error: 0.000001}}
  - close_to: {hits.hits.1._score: {value: $bf16_score_1, error: 0.000001}}
  - close_to: {hits.hits.2._score: {value: $bf16_score_2, error: 0.000001}}

---
"dense_vector raw scoring on a quantized bfloat16 index uses the preserved values":
  # int8_hnsw quantizes, but the default raw path iterates the preserved bfloat16 vectors. Doc 3's
  # stored vector equals the query (0.5 is exact in bfloat16), so raw cosine ≈ 1.0 with tight tolerance.
  - do:
      search:
        index: dv_bfloat16_int8_hnsw
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [0.5, 0.5, 0.5, 0.5, 0.5]
  - match: {hits.total.value: 3}
  - match: {hits.hits.0._id: "3"}
  - close_to: {hits.hits.0._score: {value: 1.0, error: 0.001}}

---
"similarity_function override works on a bfloat16 field":
  # Override the cosine-mapped bfloat16 index to l2_norm: doc 3 (original [0.5,…]) is nearest in
  # Euclidean distance to the query [0.4, 0.5, …]. The override reconstructs original vectors via the
  # stored per-doc magnitude, so the score is 1/(1+||query−original||²) ≈ 0.990, proving the
  # override drove scoring on the bfloat16 read path.
  - do:
      search:
        index: dv_bfloat16_int8_hnsw
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [0.4, 0.5, 0.5, 0.5, 0.5]
              similarity_function: l2_norm
  - match: {hits.hits.0._id: "3"}
  # dist² from query [0.4,0.5,0.5,0.5,0.5] to original doc 3 [0.5,0.5,0.5,0.5,0.5] = 0.01 →
  # score ≈ 0.990 (bfloat16 rounding introduces a tiny error, covered by error: 0.01).
  - close_to: {hits.hits.0._score: {value: 0.990, error: 0.01}}

---
"similarity_function override on int4_hnsw":
  # Same denormalization path as int8_hnsw: the override reconstructs the original vectors via the stored
  # per-doc magnitude, then applies EUCLIDEAN directly against the full-precision preserved floats.
  - do:
      search:
        index: dv_int4_hnsw
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [0.4, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5]
              similarity_function: l2_norm
  - match: {hits.hits.0._id: "3"}
  # dist² from query [0.4,0.5,…] to original doc 3 [0.5,0.5,…] = 0.01 → score = 1/1.01 ≈ 0.990.
  - close_to: {hits.hits.0._score: {value: 0.990, error: 0.01}}

---
"similarity_function override on bbq_hnsw":
  # Override the cosine-mapped bbq_hnsw index to l2_norm using a query at half the magnitude of doc 3.
  # Cosine is scale-invariant (score ≈ 1.0), but EUCLIDEAN on the reconstructed original gives
  # 1/(1 + 0.25·||doc3||²) ≈ 0.375 — clearly different, proving the override drove scoring.
  - do:
      search:
        index: dv_bbq_hnsw
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [0.0695,  0.089 , -0.0585,  0.1995,  0.007 , -0.0695,  0.1735, -0.165 ,
                             0.0695,  0.170 , -0.026 , -0.026 , -0.1245,  0.1635, -0.144 ,  0.0245,
                             0.232 ,  0.169 ,  0.258 ,  0.1235, -0.052 ,  0.1295, -0.1045, -0.123 ,
                             -0.055 ,  0.1615,  0.0455,  0.221 , -0.127 ,  0.0975, -0.0545, -0.029 ,
                             -0.1395,  0.201 , -0.0535,  0.154 , -0.1365,  0.0095,  0.041 ,  0.1995,
                             -0.329 , -0.015 ,  0.138 ,  0.0205,  0.0935, -0.1655,  0.0825,  0.0085,
                             0.0855, -0.1015, -0.099 ,  0.0575, -0.0035,  0.1685, -0.222 ,  0.3075,
                             -0.3415,  0.6655,  0.097 , -0.0785, -0.05  , -0.1395, -0.049 , -0.088 ]
              similarity_function: l2_norm
  - match: {hits.hits.0._id: "3"}
  # query = 0.5·doc3_original → dist² = 0.25·||doc3||² ≈ 0.25·6.655 = 1.664 → score ≈ 1/2.664 ≈ 0.375.
  # BBQ scoring uses the preserved full-precision floats (not the 1-bit representation), so error is small.
  - close_to: {hits.hits.0._score: {value: 0.375, error: 0.05}}

---
"similarity_function override on a byte field":
  # Byte vectors go through a separate code path (createExactKnnByteQuery / RawByteVectorScorer).
  # Override the dot_product-indexed byte field with l2_norm; EUCLIDEAN is applied directly to the stored
  # integer byte values with no denormalization (no magnitude is stored for byte fields).
  - do:
      search:
        index: dv_byte
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [4, -10, 15, -20, 25]
              similarity_function: l2_norm
  - match: {hits.hits.0._id: "3"}
  # dist² from query [4,-10,15,-20,25] to doc 3 [5,-10,15,-20,25] = 1 → score = 1/(1+1) = 0.5.
  - close_to: {hits.hits.0._score: {value: 0.5, error: 0.000001}}

---
"dense_vector raw scoring on a non-indexed field matches the indexed equivalent":
  # A non-indexed field stores vectors as binary doc values and has no configured similarity, so the query
  # supplies l2_norm. The raw scores must match the indexed flat field (same vectors, same metric).
  - do:
      search:
        index: dv_flat
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [-0.5, 90.0, -10, 14.8, -156.0]
  - match: { hits.total.value: 3 }
  - set: { hits.hits.0._id: top_id }
  - set: { hits.hits.0._score: indexed_score_0 }
  - set: { hits.hits.1._score: indexed_score_1 }
  - set: { hits.hits.2._score: indexed_score_2 }

  - do:
      search:
        index: dv_unindexed
        body:
          query:
            dense_vector:
              field: vector
              query_vector: [-0.5, 90.0, -10, 14.8, -156.0]
              similarity_function: l2_norm
  - match: { hits.total.value: 3 }
  - match: { hits.hits.0._id: $top_id }
  - close_to: {hits.hits.0._score: {value: $indexed_score_0, error: 0.000001}}
  - close_to: {hits.hits.1._score: {value: $indexed_score_1, error: 0.000001}}
  - close_to: {hits.hits.2._score: {value: $indexed_score_2, error: 0.000001}}

---

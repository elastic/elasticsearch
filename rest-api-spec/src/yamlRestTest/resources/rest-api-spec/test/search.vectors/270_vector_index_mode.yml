setup:
  - requires:
      test_runner_features: [ capabilities ]
      capabilities:
        - method: PUT
          path: /{index}
          capabilities: [ vector_index_mode ]
      reason: "Support for 'vector' index mode capability required"

---
"Create vector index":
  - do:
      indices.create:
        index: test_vector
        body:
          settings:
            index.mode: vector
          mappings:
            properties:
              embedding:
                type: dense_vector
                dims: 8

  - do:
      indices.get_settings:
        index: test_vector
  - match: { test_vector.settings.index.mode: "vector" }

  - do:
      indices.get_mapping:
        index: test_vector
  - match: { test_vector.mappings.properties.embedding.type: "dense_vector" }
  - match: { test_vector.mappings.properties.embedding.element_type: "bfloat16" }

---
"Vector index mode forbids disabling exclude_source_vectors":
  - do:
      catch: /illegal_argument_exception/
      indices.create:
        index: test_vector_bad
        body:
          settings:
            index.mode: vector
            index.mapping.exclude_source_vectors: false

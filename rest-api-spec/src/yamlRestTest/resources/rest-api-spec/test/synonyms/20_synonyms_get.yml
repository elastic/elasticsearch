setup:
  - requires:
      cluster_features: ["gte_v8.10.0"]
      reason: Introduced in 8.10.0
  - do:
      synonyms.put_synonym:
        id: test-get-synonyms
        body:
          synonyms_set:
            - synonyms: "hello, hi"
              id: "test-id-1"
            - synonyms: "bye => goodbye"
              id: "test-id-2"
            - synonyms: "test => check"
              id: "test-id-3"

---
"Get synonyms set":
  - do:
      synonyms.get_synonym:
        id: test-get-synonyms

  - match:
      count: 3
  - match:
      synonyms_set:
        - synonyms: "hello, hi"
          id: "test-id-1"
        - synonyms: "bye => goodbye"
          id: "test-id-2"
        - synonyms: "test => check"
          id: "test-id-3"
---
"Get synonyms set - not found":
  - do:
      catch: missing
      synonyms.get_synonym:
        id: unknown-synonym-set

---
"Pagination - size":
  - do:
      synonyms.get_synonym:
        id: test-get-synonyms
        size: 2

  - match:
      count: 3
  - match:
      synonyms_set:
        - synonyms: "hello, hi"
          id: "test-id-1"
        - synonyms: "bye => goodbye"
          id: "test-id-2"

---
"Pagination - invalid size and from":
  - do:
      catch: bad_request
      synonyms.get_synonym:
        id: test-get-synonyms
        size: -1

  - do:
      catch: bad_request
      synonyms.get_synonym:
        id: test-get-synonyms
        from: -1

---
"Pagination - synonym max size exceeded":
  - requires:
      cluster_features: ["gte_v8.15.0"]
      reason: Synonym size checks introduced in 8.15.0

  - do:
      catch: bad_request
      synonyms.get_synonym:
        id: test-get-synonyms
        size: 100001

  - do:
      catch: bad_request
      synonyms.get_synonym:
        id: test-get-synonyms
        from: 100001

---
"Pagination - from":
  - do:
      synonyms.get_synonym:
        id: test-get-synonyms
        from: 1

  - match:
      count: 3
  - match:
      synonyms_set:
        - synonyms: "bye => goodbye"
          id: "test-id-2"
        - synonyms: "test => check"
          id: "test-id-3"

---
"PIT cursor pagination":
  - requires:
      test_runner_features: [ capabilities ]
      capabilities:
        - method: GET
          path: /_synonyms/{synonymsSet}
          capabilities: [ synonyms_get_pit_search_after ]
      reason: "synonyms_get_pit_search_after capability needed"

  # First page: size=2, no pit_id — opens a new PIT and returns first 2 rules
  - do:
      synonyms.get_synonym:
        id: test-get-synonyms
        size: 2

  - match: { count: 3 }
  - length: { synonyms_set: 2 }
  - match: { synonyms_set.0.id: "test-id-1" }
  - match: { synonyms_set.1.id: "test-id-2" }
  - is_true: pit_id
  - is_true: next_search_after
  - set: { pit_id: pit_id }
  - set: { next_search_after: next_search_after }

  # Second page: resume with pit_id and search_after — returns remaining rule and closes PIT
  - do:
      synonyms.get_synonym:
        id: test-get-synonyms
        size: 2
        pit_id: $pit_id
        search_after: $next_search_after

  - match: { count: 3 }
  - length: { synonyms_set: 1 }
  - match: { synonyms_set.0.id: "test-id-3" }
  # PIT is closed; no cursor fields returned
  - not_exists: pit_id
  - not_exists: next_search_after

---
"Synonyms set with same IDs":
  - do:
      synonyms.put_synonym:
        id: test-get-synonyms-same-ids
        body:
          synonyms_set:
            - synonyms: "another, different"
              id: "test-id-1"
            - synonyms: "same => equal"
              id: "test-id-2"
            - synonyms: "work, hard"
              id: "test-id-3"

  - do:
      synonyms.get_synonym:
        id: test-get-synonyms

  - match:
      count: 3
  - match:
      synonyms_set:
        - synonyms: "hello, hi"
          id: "test-id-1"
        - synonyms: "bye => goodbye"
          id: "test-id-2"
        - synonyms: "test => check"
          id: "test-id-3"

  - do:
      synonyms.get_synonym:
        id: test-get-synonyms-same-ids

  - match:
      count: 3
  - match:
      synonyms_set:
        - synonyms: "another, different"
          id: "test-id-1"
        - synonyms: "same => equal"
          id: "test-id-2"
        - synonyms: "work, hard"
          id: "test-id-3"

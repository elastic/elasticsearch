setup:
  - requires:
      cluster_features: ["gte_v8.10.0"]
      reason: Introduced in 8.10.0
  - do:
      synonyms.put_synonym:
        id: test-synonyms
        body:
          synonyms_set:
            - synonyms: "hello, hi"
              id: "test-id-1"
            - synonyms: "bye => goodbye"
              id: "test-id-2"
            - synonyms: "test => check"
              id: "test-id-3"

---
teardown:
  - requires:
      cluster_features: ["synonyms.max_synonym_rules"]
      reason: "synonyms.max_synonym_rules setting added"
  - do:
      cluster.put_settings:
        body:
          persistent:
            synonyms.max_synonym_rules: null

---
"Update a synonyms rule":
  - do:
      synonyms.put_synonym_rule:
        set_id: "test-synonyms"
        rule_id: "test-id-2"
        body:
          synonyms: "bye, goodbye, seeya"

  - match: { result: "updated" }
  - match: { reload_analyzers_details._shards.total: 0 }
  - length: { reload_analyzers_details.reload_details: 0 }

  - do:
      synonyms.get_synonym:
        id: test-synonyms

  - match:
      synonyms_set:
        - synonyms: "hello, hi"
          id: "test-id-1"
        - synonyms: "bye, goodbye, seeya"
          id: "test-id-2"
        - synonyms: "test => check"
          id: "test-id-3"


---
"Create a new synonym rule":
  - do:
      synonyms.put_synonym_rule:
        set_id: "test-synonyms"
        rule_id: "test-id-0"
        body:
          synonyms: "i-phone, iphone"

  - match: { result: "created" }
  - match: { reload_analyzers_details._shards.total: 0 }
  - length: { reload_analyzers_details.reload_details: 0 }

  - do:
      synonyms.get_synonym:
        id: test-synonyms

  - match:
      synonyms_set:
        - synonyms: "i-phone, iphone"
          id: "test-id-0"
        - synonyms: "hello, hi"
          id: "test-id-1"
        - synonyms: "bye => goodbye"
          id: "test-id-2"
        - synonyms: "test => check"
          id: "test-id-3"

---
"Update synonym rule for non existing synonym set":

  - do:
      catch: missing
      synonyms.put_synonym_rule:
        set_id: "test-synonyms-non-existent"
        rule_id: "test-id-0"
        body:
          synonyms: "i-phone, iphone"

---
"Refresh can be specified":

  - requires:
      test_runner_features: [ capabilities ]
      capabilities:
        - method: PUT
          path: /_synonyms/{rule_id}
          capabilities: [ synonyms_refresh_param ]
      reason: "synonyms refresh param capability needed"

  - do:
      synonyms.put_synonym_rule:
        refresh: false
        set_id: "test-synonyms"
        rule_id: "test-id-2"
        body:
          synonyms: "bye, goodbye, seeya"

  - match: { result: "updated" }
  # Reload analyzers info is not included
  - not_exists: reload_analyzers_details

---
"Max synonym rules limit is enforced for single rule put":
  - requires:
      cluster_features: ["synonyms.max_synonym_rules"]
      reason: "synonyms.max_synonym_rules setting added"

  - do:
      cluster.put_settings:
        body:
          persistent:
            synonyms.max_synonym_rules: 3

  # setup already created 3 rules; adding a 4th should fail
  - do:
      catch: /cannot exceed 3/
      synonyms.put_synonym_rule:
        set_id: "test-synonyms"
        rule_id: "test-id-new"
        body:
          synonyms: "new, rule"

  # updating an existing rule at the limit should succeed
  - do:
      synonyms.put_synonym_rule:
        set_id: "test-synonyms"
        rule_id: "test-id-1"
        body:
          synonyms: "hello, hi, hey"

  - match: { result: "updated" }

---
"Validation failure tests":
  - do:
      catch: /\[synonyms\] field can't be empty/
      synonyms.put_synonym_rule:
        set_id: "test-synonyms"
        rule_id: "test-id-0"
        body:
          synonyms: ""

  - do:
      catch: /More than one explicit mapping specified in the same synonyms rule/
      synonyms.put_synonym_rule:
        set_id: "test-synonyms"
        rule_id: "test-id-0"
        body:
          synonyms: "bye => => goodbye"

  - do:
      catch: /Incorrect syntax for \[synonyms\]/
      synonyms.put_synonym_rule:
        set_id: "test-synonyms"
        rule_id: "test-id-0"
        body:
          synonyms: " => goodbye"

  - do:
      catch: /Incorrect syntax for \[synonyms\]/
      synonyms.put_synonym_rule:
        set_id: "test-synonyms"
        rule_id: "test-id-0"
        body:
          synonyms: "bye => "

  - do:
      catch: /Incorrect syntax for \[synonyms\]/
      synonyms.put_synonym_rule:
        set_id: "test-synonyms"
        rule_id: "test-id-0"
        body:
          synonyms: "bye, goodbye,  "

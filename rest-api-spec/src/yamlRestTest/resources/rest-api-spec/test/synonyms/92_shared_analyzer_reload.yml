setup:
  - requires:
      cluster_features: ["gte_v8.10.0"]
      test_runner_features: [ capabilities ]
      capabilities:
        - method: PUT
          path: /_synonyms/{rule_id}
          capabilities: [ synonyms_refresh_param ]
        - method: POST
          path: /{index}/_reload_search_analyzers
          capabilities: [ shared_analyzers ]
      reason: >
        Synonyms API with updateable synonym filters requires 8.10.0;
        synonyms_refresh_param lets us update synonyms without an immediate auto-reload
        so that the explicit reload order can be controlled. The shared_analyzers capability
        gates this test on nodes that share analyzer instances across indices with identical
        analysis recipes, which is the behaviour under test.

  - do:
      synonyms.put_synonym:
        id: shared_set
        body:
          synonyms_set:
            - synonyms: "hello, hi"
              id: "rule-1"

  # Two indices with a byte-for-byte identical analysis recipe, but each names its search analyzer
  # differently (my_search_analyzer_z vs my_search_analyzer_a). Analyzer sharing keys on the recipe,
  # not the name, so both indices end up backed by one shared ReloadableCustomAnalyzer instance.
  #
  # index_z_orig is created FIRST, so the shared instance carries its name (my_search_analyzer_z).
  # In a single-node cluster the node-level reload broadcast visits indices in creation order.
  - do:
      indices.create:
        index: index_z_orig
        body:
          settings:
            index:
              number_of_shards: 1
            analysis:
              filter:
                syn_filter:
                  type: synonym
                  synonyms_set: shared_set
                  updateable: true
              analyzer:
                my_search_analyzer_z:
                  type: custom
                  tokenizer: standard
                  filter: [ lowercase, syn_filter ]

  # index_a_shared is created SECOND and reuses the same shared instance, but refers to it under its
  # own local name my_search_analyzer_a.
  - do:
      indices.create:
        index: index_a_shared
        body:
          settings:
            index:
              number_of_shards: 1
            analysis:
              filter:
                syn_filter:
                  type: synonym
                  synonyms_set: shared_set
                  updateable: true
              analyzer:
                my_search_analyzer_a:
                  type: custom
                  tokenizer: standard
                  filter: [ lowercase, syn_filter ]

  - do:
      bulk:
        refresh: true
        body:
          - '{"index": {"_index": "index_z_orig", "_id": "1"}}'
          - '{"content": "hello"}'
          - '{"index": {"_index": "index_a_shared", "_id": "1"}}'
          - '{"content": "hello"}'

---
"Reloading shared indices refreshes both regardless of reload order":
  # Update synonyms without auto-reload so we control which index is reloaded first.
  - do:
      synonyms.put_synonym:
        id: shared_set
        refresh: false
        body:
          synonyms_set:
            - synonyms: "hello, hi, hey"

  - match: { result: "updated" }
  - not_exists: reload_analyzers_details

  # List index_a_shared FIRST so its shard is reloaded before index_z_orig's. index_a_shared owns a
  # slot named my_search_analyzer_a while the shared instance's embedded name is my_search_analyzer_z,
  # so the reload must locate the recipe by index_a_shared's own local name, not the embedded one.
  - do:
      indices.reload_search_analyzers:
        index: index_a_shared,index_z_orig

  # "hey" is now a synonym for "hello", so it must match the indexed "hello" document in both indices.
  - do:
      search:
        index: index_z_orig
        body:
          query:
            match:
              content:
                query: hey
                analyzer: my_search_analyzer_z
  - match: { hits.total.value: 1 }

  - do:
      search:
        index: index_a_shared
        body:
          query:
            match:
              content:
                query: hey
                analyzer: my_search_analyzer_a
  - match: { hits.total.value: 1 }

---
"Reloading a single shared index converges the other indices sharing the analyzer":
  - do:
      synonyms.put_synonym:
        id: shared_set
        refresh: false
        body:
          synonyms_set:
            - synonyms: "hello, hi, howdy"

  - match: { result: "updated" }
  - not_exists: reload_analyzers_details

  # Reload ONLY index_a_shared. Because the analyzer is shared and refreshed in place, index_z_orig —
  # which is not named in the request — converges on the same updated synonyms.
  - do:
      indices.reload_search_analyzers:
        index: index_a_shared

  - do:
      search:
        index: index_a_shared
        body:
          query:
            match:
              content:
                query: howdy
                analyzer: my_search_analyzer_a
  - match: { hits.total.value: 1 }

  # index_z_orig was never reloaded explicitly, yet it sees "howdy" because it shares the instance.
  - do:
      search:
        index: index_z_orig
        body:
          query:
            match:
              content:
                query: howdy
                analyzer: my_search_analyzer_z
  - match: { hits.total.value: 1 }

apply plugin: 'elasticsearch.internal-es-plugin'

esplugin {
  description = 'Test-only module that validates index.slice.enabled by setting the internal index.slice.validated flag. ' +
    'In production this is provided by the DiskBBQ x-pack plugin.'
  classname = 'org.elasticsearch.test.sliceindexing.SliceIndexingValidationPlugin'
}

tasks.named("test").configure {
  enabled = false
}

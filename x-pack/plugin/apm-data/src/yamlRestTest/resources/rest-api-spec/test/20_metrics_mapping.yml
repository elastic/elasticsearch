---
setup:
  - skip:
      features: allowed_warnings
  - do:
      cluster.health:
        wait_for_events: languid

---
"Test OTel SDK metrics fields are aggregatable":
  - do:
      allowed_warnings:
        - "Parameter [default_metric] is deprecated and will be removed in a future version"
      bulk:
        index: metrics-apm.app.otel-sdk-testing
        refresh: true
        body:
          - create: {}
          - "@timestamp": "2017-06-22"
            data_stream.type: metrics
            data_stream.dataset: apm.app.otel-sdk
            data_stream.namespace: testing
            otel.sdk.exporter.span.exported: 42
            otel.sdk.exporter.span.inflight: 7
            otel.sdk.processor.span.processed: 100
            otel.sdk.exporter.operation.duration:
              counts: [1, 2, 3]
              values: [0.5, 1.5, 5.0]
  - is_false: errors
  - do:
      cluster.health:
        wait_for_events: languid
  - do:
      search:
        index: metrics-apm.app.otel-sdk-testing
        body:
          size: 0
          aggs:
            exported_sum:
              sum:
                field: otel.sdk.exporter.span.exported
            inflight_sum:
              sum:
                field: otel.sdk.exporter.span.inflight
            processed_sum:
              sum:
                field: otel.sdk.processor.span.processed
            duration_histogram:
              histogram:
                field: otel.sdk.exporter.operation.duration
                interval: 1
  - match: { aggregations.exported_sum.value: 42 }
  - match: { aggregations.inflight_sum.value: 7 }
  - match: { aggregations.processed_sum.value: 100 }
  - is_true: aggregations.duration_histogram.buckets

---
"Test metrics-apm.app-* dynamic mapping":
  - do:
      allowed_warnings:
        - "Parameter [default_metric] is deprecated and will be removed in a future version"
      bulk:
        index: metrics-apm.app.svc1-testing
        refresh: true
        body:
          - create: {}
          - "@timestamp": "2017-06-22"
            data_stream.type: metrics
            data_stream.dataset: apm.app.svc1
            data_stream.namespace: testing
            metricset:
              name: app
              samples:
                - name: double_metric
                  type: gauge
                  value: 123
                - name: summary_metric
                  type: summary
                  value_count: 123
                  sum: 456.789
                - name: histogram_metric
                  type: histogram
                  counts: [1, 2, 3]
                  values: [1.5, 2.5, 3.5]
  - set:
      items.0.create._index: index
  - do:
      # Wait for cluster state changes to be applied before
      # querying field mappings.
      cluster.health:
        wait_for_events: languid
  - do:
      indices.get_field_mapping:
        index: metrics-apm.app.svc1-testing
        fields: [double_metric, summary_metric, histogram_metric]
  - match:
      $body:
        $index:
          mappings:
            double_metric:
              full_name: double_metric
              mapping:
                double_metric:
                  type: double
                  index: false
            summary_metric:
              full_name: summary_metric
              mapping:
                summary_metric:
                  type: aggregate_metric_double
                  metrics : [sum, value_count]
                  default_metric: value_count
            histogram_metric:
              full_name: histogram_metric
              mapping:
                histogram_metric:
                  type: histogram

apply plugin: 'elasticsearch.internal-test-artifact'
apply plugin: 'elasticsearch.internal-yaml-rest-test'
apply plugin: 'elasticsearch.yaml-rest-compat-test'

dependencies {
  testImplementation project(':test:test-clusters')
  yamlRestTestImplementation project(xpackModule('rollup'))

  clusterModules project(xpackModule('downsample'))
  clusterModules project(xpackModule('analytics'))
  clusterModules project(xpackModule('ilm'))
  clusterModules project(':modules:lang-painless')
  clusterModules project(':modules:mapper-extras')
  clusterModules project(':modules:data-streams')
  clusterModules project(':modules:aggregations')
  clusterModules project(':modules:ingest-common')
}

restResources {
  restApi {
    include '_common', 'bulk', 'cluster', 'indices', 'search', 'ingest.put_pipeline', 'ingest.delete_pipeline', 'capabilities'
  }
}

artifacts {
  restXpackTests(new File(projectDir, "src/yamlRestTest/resources/rest-api-spec/test"))
}

if (buildParams.inFipsJvm){
  // This test cluster is using a BASIC license and FIPS 140 mode is not supported in BASIC
  tasks.named("yamlRestTest").configure{enabled = false }
}

if (buildParams.snapshotBuild == false) {
  // The index.time_series.temporality_field setting is gated behind the time_series_temporality feature flag, which is disabled in
  // non-snapshot (release) builds, so the 110_downsample_temporality tests cannot run there. A single substring pattern leaks because
  // the randomized runner checks the bare method name and the parameterized name separately, so we must exclude both forms for each
  // suite class (the same handling MutedTestsBuildService applies). Remove this block once the feature flag is lifted.
  tasks.named("yamlRestTest").configure {
    filter {
      excludeTestsMatching "org.elasticsearch.xpack.downsample.DownsampleRestIT.test {p0=downsample/110_downsample_temporality/Downsample delta temporality counter}"
      excludeTestsMatching "org.elasticsearch.xpack.downsample.DownsampleRestIT.test {p0=downsample/110_downsample_temporality/Downsample mixed temporality counters}"
      excludeTestsMatching "org.elasticsearch.xpack.downsample.DownsampleRestIT.test"
      excludeTestsMatching "org.elasticsearch.xpack.downsample.DownsampleWithBasicRestIT.test {p0=downsample/110_downsample_temporality/Downsample delta temporality counter}"
      excludeTestsMatching "org.elasticsearch.xpack.downsample.DownsampleWithBasicRestIT.test {p0=downsample/110_downsample_temporality/Downsample mixed temporality counters}"
      excludeTestsMatching "org.elasticsearch.xpack.downsample.DownsampleWithBasicRestIT.test"
    }
  }
}

configurations {
  basicRestSpecs {
    attributes {
      attribute(ArtifactTypeDefinition.ARTIFACT_TYPE_ATTRIBUTE, ArtifactTypeDefinition.DIRECTORY_TYPE)
    }
  }
}

artifacts {
  basicRestSpecs(new File(projectDir, "src/yamlRestTest/resources/rest-api-spec/test"))
}

tasks.named("yamlRestCompatTestTransform").configure({ task ->
  // Expected deprecation warning to compat yaml tests:
  task.addAllowedWarningRegex("Parameter \\[default_metric\\] is deprecated and will be removed in a future version")
  task.skipTest("downsample/10_basic/Downsample a downsampled index", "Default metric has been removed")
  task.skipTest("downsample/10_basic/Downsample histogram as label", "Default metric has been removed")
  task.skipTest("downsample/10_basic/Downsample index", "Default metric has been removed")
  task.skipTest("downsample/10_basic/Downsample index with multi-value dimensions", "Counter downsampling has changed")
  task.skipTest("downsample-with-security/10_basic/Downsample index", "Default metric has been removed")
  task.skipTest("downsample/40_runtime_fields/Runtime fields accessing metric fields in downsample target index", "Using average as the value of an aggregate metric double")
  task.skipTest("downsample-with-security/40_runtime_fields/Runtime fields accessing metric fields in downsample target index", "Using average as the value of an aggregate metric double")
})

# TODO: guarded by IndexSettings.TIME_SERIES_TEMPORALITY_FEATURE_FLAG — add a cluster_features
# requirement and remove the excludeTestsMatching entry in build.gradle when the flag is lifted.

"Downsample delta temporality counter":

  - do:
      indices.create:
        index: test-temporality
        body:
          settings:
            number_of_shards: 1
            index:
              mode: time_series
              routing_path: [metricset, temporality]
              time_series:
                start_time: 2021-04-28T00:00:00Z
                end_time: 2021-04-29T00:00:00Z
                temporality_field: temporality
          mappings:
            properties:
              "@timestamp":
                type: date
              metricset:
                type: keyword
                time_series_dimension: true
              temporality:
                type: keyword
                time_series_dimension: true
              counter:
                type: long
                time_series_metric: counter

  - do:
      bulk:
        refresh: true
        index: test-temporality
        body:
          - '{"index": {}}'
          - '{"@timestamp": "2021-04-28T18:00:00.000Z", "metricset": "pod", "temporality": "delta", "counter": 5}'
          - '{"index": {}}'
          - '{"@timestamp": "2021-04-28T18:05:00.000Z", "metricset": "pod", "temporality": "delta", "counter": 3}'
          - '{"index": {}}'
          - '{"@timestamp": "2021-04-28T18:10:00.000Z", "metricset": "pod", "temporality": "delta", "counter": 8}'
          - '{"index": {}}'
          - '{"@timestamp": "2021-04-28T18:15:00.000Z", "metricset": "pod", "temporality": "delta", "counter": 2}'
          - '{"index": {}}'
          - '{"@timestamp": "2021-04-28T19:00:00.000Z", "metricset": "pod", "temporality": "delta", "counter": 10}'
          - '{"index": {}}'
          - '{"@timestamp": "2021-04-28T19:05:00.000Z", "metricset": "pod", "temporality": "delta", "counter": 1}'

  - do:
      indices.put_settings:
        index: test-temporality
        body:
          index.blocks.write: true

  - do:
      indices.downsample:
        index: test-temporality
        target_index: test-temporality-downsample
        body: >
          {
            "fixed_interval": "1h"
          }
  - is_true: acknowledged

  - do:
      search:
        index: test-temporality-downsample
        body:
          sort: [ "_tsid", "@timestamp" ]

  # Delta counters are summed within each bucket
  - length: { hits.hits: 2 }
  - match: { hits.hits.0._source._doc_count: 4 }
  - match: { hits.hits.0._source.@timestamp: "2021-04-28T18:00:00.000Z" }
  - match: { hits.hits.0._source.metricset: pod }
  - match: { hits.hits.0._source.temporality: delta }
  # Sum of 5 + 3 + 8 + 2 = 18
  - match: { hits.hits.0._source.counter: 18 }

  - match: { hits.hits.1._source._doc_count: 2 }
  - match: { hits.hits.1._source.@timestamp: "2021-04-28T19:00:00.000Z" }
  - match: { hits.hits.1._source.metricset: pod }
  - match: { hits.hits.1._source.temporality: delta }
  # Sum of 10 + 1 = 11
  - match: { hits.hits.1._source.counter: 11 }

---
"Downsample mixed temporality counters":

  - do:
      indices.create:
        index: test-mixed-temporality
        body:
          settings:
            number_of_shards: 1
            index:
              mode: time_series
              routing_path: [metricset, temporality]
              time_series:
                start_time: 2021-04-28T00:00:00Z
                end_time: 2021-04-29T00:00:00Z
                temporality_field: temporality
          mappings:
            properties:
              "@timestamp":
                type: date
              metricset:
                type: keyword
                time_series_dimension: true
              temporality:
                type: keyword
                time_series_dimension: true
              counter:
                type: long
                time_series_metric: counter

  - do:
      bulk:
        refresh: true
        index: test-mixed-temporality
        body:
          # Cumulative TSID: monotonically increasing counter
          - '{"index": {}}'
          - '{"@timestamp": "2021-04-28T18:00:00.000Z", "metricset": "pod", "temporality": "cumulative", "counter": 10}'
          - '{"index": {}}'
          - '{"@timestamp": "2021-04-28T18:10:00.000Z", "metricset": "pod", "temporality": "cumulative", "counter": 25}'
          - '{"index": {}}'
          - '{"@timestamp": "2021-04-28T18:20:00.000Z", "metricset": "pod", "temporality": "cumulative", "counter": 40}'
          # Delta TSID: per-interval increments
          - '{"index": {}}'
          - '{"@timestamp": "2021-04-28T18:00:00.000Z", "metricset": "pod", "temporality": "delta", "counter": 5}'
          - '{"index": {}}'
          - '{"@timestamp": "2021-04-28T18:10:00.000Z", "metricset": "pod", "temporality": "delta", "counter": 3}'
          - '{"index": {}}'
          - '{"@timestamp": "2021-04-28T18:20:00.000Z", "metricset": "pod", "temporality": "delta", "counter": 8}'

  - do:
      indices.put_settings:
        index: test-mixed-temporality
        body:
          index.blocks.write: true

  - do:
      indices.downsample:
        index: test-mixed-temporality
        target_index: test-mixed-temporality-downsample
        body: >
          {
            "fixed_interval": "1h"
          }
  - is_true: acknowledged

  - do:
      search:
        index: test-mixed-temporality-downsample
        body:
          sort: [ "_tsid", "@timestamp" ]

  - length: { hits.hits: 2 }

  # Cumulative: oldest value is kept (10)
  - match: { hits.hits.0._source.temporality: cumulative }
  - match: { hits.hits.0._source.counter: 10 }
  - match: { hits.hits.0._source._doc_count: 3 }

  # Delta: values are summed (5 + 3 + 8 = 16)
  - match: { hits.hits.1._source.temporality: delta }
  - match: { hits.hits.1._source.counter: 16 }
  - match: { hits.hits.1._source._doc_count: 3 }

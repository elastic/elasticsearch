setup:
  - requires:
      reason: "PromQL downsample coverage uses the ES|QL TSTEP-backed query path"
      test_runner_features: [ "capabilities" ]
      capabilities:
        - method: POST
          path: /_query
          capabilities: [ "tsdb_tstep" ]

  - do:
      indices.create:
        index: promql-downsample-source
        body:
          settings:
            number_of_shards: 1
            index:
              mode: time_series
              routing_path: [cluster, pod]
              time_series:
                start_time: 2024-05-10T00:00:00Z
                end_time: 2024-05-10T03:00:00Z
          mappings:
            properties:
              "@timestamp":
                type: date
              cluster:
                type: keyword
                time_series_dimension: true
              pod:
                type: keyword
                time_series_dimension: true
              network:
                properties:
                  eth0:
                    properties:
                      rx:
                        type: double
                        time_series_metric: gauge

  - do:
      bulk:
        refresh: true
        index: promql-downsample-source
        body:
          - '{"index": {}}'
          - '{"@timestamp": "2024-05-10T00:00:00Z", "cluster": "prod", "pod": "one", "network": {"eth0": {"rx": 10.0}}}'
          - '{"index": {}}'
          - '{"@timestamp": "2024-05-10T00:10:00Z", "cluster": "prod", "pod": "one", "network": {"eth0": {"rx": 20.0}}}'
          - '{"index": {}}'
          - '{"@timestamp": "2024-05-10T00:20:00Z", "cluster": "prod", "pod": "one", "network": {"eth0": {"rx": 30.0}}}'
          - '{"index": {}}'
          - '{"@timestamp": "2024-05-10T00:30:00Z", "cluster": "prod", "pod": "one", "network": {"eth0": {"rx": 40.0}}}'
          - '{"index": {}}'
          - '{"@timestamp": "2024-05-10T00:40:00Z", "cluster": "prod", "pod": "one", "network": {"eth0": {"rx": 50.0}}}'
          - '{"index": {}}'
          - '{"@timestamp": "2024-05-10T00:50:00Z", "cluster": "prod", "pod": "one", "network": {"eth0": {"rx": 60.0}}}'
          - '{"index": {}}'
          - '{"@timestamp": "2024-05-10T01:00:00Z", "cluster": "prod", "pod": "one", "network": {"eth0": {"rx": 70.0}}}'
          - '{"index": {}}'
          - '{"@timestamp": "2024-05-10T01:10:00Z", "cluster": "prod", "pod": "one", "network": {"eth0": {"rx": 80.0}}}'
          - '{"index": {}}'
          - '{"@timestamp": "2024-05-10T01:20:00Z", "cluster": "prod", "pod": "one", "network": {"eth0": {"rx": 90.0}}}'
          - '{"index": {}}'
          - '{"@timestamp": "2024-05-10T01:30:00Z", "cluster": "prod", "pod": "one", "network": {"eth0": {"rx": 100.0}}}'
          - '{"index": {}}'
          - '{"@timestamp": "2024-05-10T01:40:00Z", "cluster": "prod", "pod": "one", "network": {"eth0": {"rx": 110.0}}}'
          - '{"index": {}}'
          - '{"@timestamp": "2024-05-10T01:50:00Z", "cluster": "prod", "pod": "one", "network": {"eth0": {"rx": 120.0}}}'

  - do:
      indices.put_settings:
        index: promql-downsample-source
        body:
          index.blocks.write: true

  - do:
      indices.downsample:
        index: promql-downsample-source
        target_index: promql-downsample-30m
        body:
          fixed_interval: 30m
          sampling_method: aggregate

  - do:
      indices.downsample:
        index: promql-downsample-source
        target_index: promql-downsample-1h
        body:
          fixed_interval: 1h
          sampling_method: aggregate

---
"PromQL max_over_time over 30m downsample target":
  - do:
      esql.query:
        body:
          query: 'PROMQL index=promql-downsample-30m step=30m start="2024-05-10T00:00:00Z" end="2024-05-10T01:30:00Z" rx=(max_over_time(network.eth0.rx[30m]))'

  - match: {columns.0.name: "rx"}
  - match: {columns.0.type: "double"}
  - match: {columns.1.name: "step"}
  - match: {columns.1.type: "date"}
  - length: {values: 4}
  - match: {values.0.0: 30.0}
  - match: {values.0.1: "2024-05-10T00:00:00.000Z"}
  - match: {values.1.0: 60.0}
  - match: {values.1.1: "2024-05-10T00:30:00.000Z"}
  - match: {values.2.0: 90.0}
  - match: {values.2.1: "2024-05-10T01:00:00.000Z"}
  - match: {values.3.0: 120.0}
  - match: {values.3.1: "2024-05-10T01:30:00.000Z"}

---
"PromQL max_over_time over 1h downsample target":
  - do:
      esql.query:
        body:
          query: 'PROMQL index=promql-downsample-1h step=1h start="2024-05-10T00:00:00Z" end="2024-05-10T01:00:00Z" rx=(max_over_time(network.eth0.rx[1h]))'

  - match: {columns.0.name: "rx"}
  - match: {columns.0.type: "double"}
  - match: {columns.1.name: "step"}
  - match: {columns.1.type: "date"}
  - length: {values: 2}
  - match: {values.0.0: 60.0}
  - match: {values.0.1: "2024-05-10T00:00:00.000Z"}
  - match: {values.1.0: 120.0}
  - match: {values.1.1: "2024-05-10T01:00:00.000Z"}

---
"PromQL min_over_time over 30m downsample target":
  - do:
      esql.query:
        body:
          query: 'PROMQL index=promql-downsample-30m step=30m start="2024-05-10T00:00:00Z" end="2024-05-10T01:30:00Z" rx=(min_over_time(network.eth0.rx[30m]))'

  - match: {columns.0.name: "rx"}
  - match: {columns.0.type: "double"}
  - match: {columns.1.name: "step"}
  - match: {columns.1.type: "date"}
  - length: {values: 4}
  - match: {values.0.0: 10.0}
  - match: {values.0.1: "2024-05-10T00:00:00.000Z"}
  - match: {values.1.0: 40.0}
  - match: {values.1.1: "2024-05-10T00:30:00.000Z"}
  - match: {values.2.0: 70.0}
  - match: {values.2.1: "2024-05-10T01:00:00.000Z"}
  - match: {values.3.0: 100.0}
  - match: {values.3.1: "2024-05-10T01:30:00.000Z"}

---
"PromQL avg_over_time over 1h downsample target":
  - do:
      esql.query:
        body:
          query: 'PROMQL index=promql-downsample-1h step=1h start="2024-05-10T00:00:00Z" end="2024-05-10T01:00:00Z" rx=(avg_over_time(network.eth0.rx[1h]))'

  - match: {columns.0.name: "rx"}
  - match: {columns.0.type: "double"}
  - match: {columns.1.name: "step"}
  - match: {columns.1.type: "date"}
  - length: {values: 2}
  - match: {values.0.0: 35.0}
  - match: {values.0.1: "2024-05-10T00:00:00.000Z"}
  - match: {values.1.0: 95.0}
  - match: {values.1.1: "2024-05-10T01:00:00.000Z"}

---
"TSTEP max_over_time query over 1h downsample target":
  - do:
      esql.query:
        body:
          query: 'TS promql-downsample-1h | STATS rx = max(max_over_time(network.eth0.rx)) BY step = TSTEP(1 hour, "2024-05-10T00:00:00Z", "2024-05-10T02:00:00Z") | SORT step'

  - match: {columns.0.name: "rx"}
  - match: {columns.0.type: "double"}
  - match: {columns.1.name: "step"}
  - match: {columns.1.type: "date"}
  - length: {values: 2}
  - match: {values.0.0: 60.0}
  - match: {values.0.1: "2024-05-10T00:00:00.000Z"}
  - match: {values.1.0: 120.0}
  - match: {values.1.1: "2024-05-10T01:00:00.000Z"}

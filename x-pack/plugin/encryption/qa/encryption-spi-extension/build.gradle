apply plugin: 'elasticsearch.base-internal-es-plugin'
apply plugin: 'elasticsearch.internal-java-rest-test'

esplugin {
  name = 'test-encryption-spi-extension'
  description = 'A test plugin that contributes an EncryptedDataHandlerProvider via the encryption SPI'
  classname = 'org.elasticsearch.xpack.encryption.spi.test.TestEncryptionSpiPlugin'
  extendedPlugins = ['x-pack-encryption']
}

dependencies {
  compileOnly project(':x-pack:plugin:encryption:spi')
  clusterPlugins project(':x-pack:plugin:encryption:qa:encryption-spi-extension')

  javaRestTestImplementation project(':x-pack:plugin:core')
  javaRestTestImplementation project(':test:framework')
}

tasks.named("javaRestTest").configure {
  usesDefaultDistribution("encryption SPI test depends on security being enabled")
}

tasks.named("javadoc").configure { enabled = false }

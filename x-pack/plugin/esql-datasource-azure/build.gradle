    'com.sun.jna.Library',
    'com.sun.jna.Native',
    'com.sun.jna.Platform',
    'com.sun.jna.Pointer',
    'com.sun.jna.Structure',
    'com.sun.jna.Structure$ByReference',
    'com.sun.jna.platform.win32.Crypt32Util',
    'com.sun.jna.platform.win32.Kernel32',
    'com.sun.jna.platform.win32.Kernel32Util',
    'com.sun.jna.platform.win32.WinBase$FILETIME',
    'com.sun.jna.win32.StdCallLibrary',
    'com.sun.jna.win32.W32APIOptions',

    // from nimbus-jose-jwt (siv-mode is an optional AES-SIV provider)
    'org.cryptomator.siv.SivMode',

    // from net.minidev:accessors-smart (ASM is used for optional bytecode-gen accessor optimization)
    'org.objectweb.asm.ClassWriter',
    'org.objectweb.asm.Label',
    'org.objectweb.asm.MethodVisitor',
    'org.objectweb.asm.Type',

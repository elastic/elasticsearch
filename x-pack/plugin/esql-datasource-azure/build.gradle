apply plugin: 'elasticsearch.internal-es-plugin'
apply plugin: 'elasticsearch.publish'

esplugin {
  name = 'esql-datasource-azure'
  description = 'Azure Blob Storage provider for ESQL external data sources'
  classname = 'org.elasticsearch.xpack.esql.datasource.azure.AzureDataSourcePlugin'
  extendedPlugins = ['x-pack-esql', 'esql-datasource-netty-commons']
}

base {
  archivesName = 'esql-datasource-azure'
}

// Aligned with modules/repository-azure
versions << [
  'azureReactorNetty': '1.0.45',
]

dependencies {
  // SPI interfaces from ESQL core
  compileOnly project(path: xpackModule('esql'))
  compileOnly project(path: xpackModule('esql-core'))
  compileOnly project(path: xpackModule('core'))
  compileOnly project(':server')

  // Azure Blob Storage - minimal set, versions aligned with repository-azure
  implementation 'com.azure:azure-storage-blob:12.27.1'
  implementation 'com.azure:azure-storage-common:12.26.1'
  implementation 'com.azure:azure-core:1.51.0'
  implementation 'com.azure:azure-identity:1.13.2'
  implementation 'com.azure:azure-core-http-netty:1.15.3'
  // msal4j is required at runtime by azure-identity's DefaultAzureCredentialBuilder; it is
  // marked optional in azure-identity's POM, so we declare it (and the nimbus/oauth2-oidc-sdk
  // chain it pulls in) explicitly. Versions aligned with modules/repository-azure.
  implementation 'com.microsoft.azure:msal4j:1.16.2'
  implementation 'com.microsoft.azure:msal4j-persistence-extension:1.3.0'
  implementation 'com.nimbusds:content-type:2.3'
  implementation 'com.nimbusds:lang-tag:1.7'
  implementation('com.nimbusds:nimbus-jose-jwt:10.0.2') {
    exclude group: 'com.google.crypto.tink', module: 'tink' // optional dep we don't rely on
  }
  implementation('com.nimbusds:oauth2-oidc-sdk:11.22.2') {
    exclude group: 'com.google.crypto.tink', module: 'tink' // optional dep we don't rely on
  }
  implementation 'com.github.stephenc.jcip:jcip-annotations:1.0-1'
  implementation 'net.minidev:accessors-smart:2.5.2'
  implementation 'net.minidev:json-smart:2.5.2'
  implementation "io.projectreactor.netty:reactor-netty-core:${versions.azureReactorNetty}"
  implementation "io.projectreactor.netty:reactor-netty-http:${versions.azureReactorNetty}"
  implementation "io.projectreactor:reactor-core:3.4.38"
  // Netty jars provided by esql-datasource-netty-commons via extendedPlugins classloader delegation
  compileOnly project(path: xpackModule('esql-datasource-netty-commons'))
  implementation "com.fasterxml.jackson.dataformat:jackson-dataformat-xml:${versions.jackson}"
  implementation "com.fasterxml.jackson.datatype:jackson-datatype-jsr310:${versions.jackson}"
  // azure-core's listBlobs XML response is parsed by jackson-dataformat-xml, which requires
  // woodstox-core + stax2-api at runtime. Without them, deserialization fails inside azure-core
  // and is reported as a misleading "Package versions ..." LinkageError; the real cause is
  // NoClassDefFoundError: org/codehaus/stax2/XMLInputFactory2.
  implementation "com.fasterxml.woodstox:woodstox-core:6.7.0"
  implementation "org.codehaus.woodstox:stax2-api:4.2.2"
  implementation "org.reactivestreams:reactive-streams:${versions.reactive_streams}"

  testImplementation project(':test:framework')
  testImplementation(testArtifact(project(xpackModule('core'))))
}

tasks.named("dependencyLicenses").configure {
  mapping from: /azure-.*/, to: 'azure'
  mapping from: /reactor-netty-.*/, to: 'reactor-netty'
  mapping from: /reactor-core.*/, to: 'reactor-core'
  mapping from: /jackson-.*/, to: 'jackson'
  mapping from: /reactive-streams.*/, to: 'reactive-streams'
}


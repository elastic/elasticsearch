apply plugin: 'elasticsearch.internal-es-plugin'
apply plugin: 'elasticsearch.publish'
apply plugin: 'elasticsearch.esql-release'

subprojects {
  apply plugin: 'elasticsearch.esql-release'
}

esplugin {
  name = 'esql-datasource-csv'
  description = 'CSV format support for ESQL external data sources'
  classname = 'org.elasticsearch.xpack.esql.datasource.csv.CsvDataSourcePlugin'
  extendedPlugins = ['x-pack-esql']
}

base {
  archivesName = 'esql-datasource-csv'
}

// Pin a newer Jackson than the repo-wide versions.jackson (2.15.0) for this module only, mirroring
// libs/x-content/impl. The direct-to-block reader parses doubles straight from char ranges via
// NumberInput.parseDouble(char[], off, len, fastParser), an overload that only exists in jackson-core
// 2.18+; staying on 2.15.0 would force a String allocation per double. Scoped to this module to avoid
// a repo-wide upgrade.
String jacksonVersion = "2.21.2"

dependencies {
  // SPI interfaces from ESQL core
  compileOnly project(path: xpackModule('esql'))
  compileOnly project(path: xpackModule('esql-core'))
  compileOnly project(path: xpackModule('core'))
  compileOnly project(':server')
  compileOnly project(xpackModule('esql:compute'))

  // Jackson CSV for CSV format reader
  implementation "com.fasterxml.jackson.dataformat:jackson-dataformat-csv:${jacksonVersion}"

  testImplementation project(':test:framework')
  testImplementation(testArtifact(project(xpackModule('core'))))
  testImplementation project(xpackModule('esql:qa:testFixtures'))
}

tasks.named("dependencyLicenses").configure {
  mapping from: /jackson-.*/, to: 'jackson'
}

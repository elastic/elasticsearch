// Exclude grpc-context globally to avoid jar hell with grpc-api
// (grpc-api 1.70.0 absorbed grpc-context classes, but older transitive deps still pull grpc-context 1.49.2)
configurations.javaRestTestRuntimeClasspath {
  exclude group: 'io.grpc', module: 'grpc-context'
}

dependencies {
  // Test fixtures and spec reader infrastructure
  javaRestTestImplementation project(xpackModule('esql:qa:testFixtures'))
  javaRestTestImplementation project(xpackModule('esql:qa:server'))
  javaRestTestImplementation project(xpackModule('esql'))
  javaRestTestImplementation(project(path: xpackModule('esql'), configuration: 'testRuntimeElements'))

  // GCS fixture infrastructure for mocking GCS operations
  javaRestTestImplementation project(':test:fixtures:gcs-fixture')

  // GCS datasource provider for discovery tests
  javaRestTestImplementation project(xpackModule('esql-datasource-gcs'))

  // Google Cloud Storage client library (needed for GcsStorageProvider in tests)
  javaRestTestImplementation 'com.google.cloud:google-cloud-storage:2.50.0'
  javaRestTestImplementation 'com.google.cloud:google-cloud-core:2.53.1'
  javaRestTestImplementation 'com.google.cloud:google-cloud-core-http:2.53.1'
  javaRestTestImplementation 'com.google.auth:google-auth-library-credentials:1.33.1'
  javaRestTestImplementation 'com.google.auth:google-auth-library-oauth2-http:1.33.1'
  javaRestTestImplementation 'com.google.http-client:google-http-client:1.46.3'
  javaRestTestImplementation 'com.google.api:api-common:2.46.1'
  javaRestTestImplementation 'com.google.api:gax:2.63.1'

  // The DEFAULT distribution already bundles repository-gcs, workload-identity, and every
  // esql-datasource-* module needed by GcsManagedIdentityAuthIT. Mapper plugins are not in
  // DEFAULT and still need to be provisioned explicitly for the test cluster.
  clusterPlugins project(':plugins:mapper-size')
  clusterPlugins project(':plugins:mapper-murmur3')
}

tasks.named('javaRestTestTestingConventions').configure {
  baseClass 'org.elasticsearch.test.rest.ESRestTestCase'
  baseClass 'org.elasticsearch.test.ESTestCase'
}

tasks.named("forbiddenPatterns").configure {
  exclude '**/*.parquet'
}

tasks.named('javaRestTest') {
  usesDefaultDistribution('esql-datasource-gcs is bundled only in the default distribution')
  maxParallelForks = 1
  enabled = buildParams.snapshotBuild

  systemProperty 'tests.rest.client_timeout', '60'
  systemProperty 'tests.rest.socket_timeout', '60'

  testLogging {
    events = ["passed", "skipped", "failed"]
    exceptionFormat = "full"
    showStandardStreams = false
  }
}

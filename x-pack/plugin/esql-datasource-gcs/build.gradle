apply plugin: 'elasticsearch.internal-es-plugin'
apply plugin: 'elasticsearch.internal-java-rest-test'
apply plugin: 'elasticsearch.publish'
apply plugin: 'elasticsearch.esql-release'

subprojects {
  apply plugin: 'elasticsearch.esql-release'
}

esplugin {
  name = 'esql-datasource-gcs'
  description = 'Google Cloud Storage provider for ESQL external data sources'
  classname = 'org.elasticsearch.xpack.esql.datasource.gcs.GcsDataSourcePlugin'
  extendedPlugins = ['x-pack-esql', 'workload-identity']
}

base {
  archivesName = 'esql-datasource-gcs'
}

dependencies {
  // SPI interfaces from ESQL core
  compileOnly project(path: xpackModule('esql'))
  compileOnly project(path: xpackModule('esql-core'))
  compileOnly project(path: xpackModule('core'))
  compileOnly project(':server')
  // Apache Arrow BufferAllocator API for breaker-accounted direct memory in readBytesAsync.
  // Runtime classes are loaded via the x-pack-esql plugin's classloader (extendedPlugins).
  compileOnly project(':libs:arrow')

  // OIDC JWT issuer-client SPI, provided at runtime via the 'workload-identity' extended plugin.
  compileOnly project(':modules:workload-identity:spi')

  // Google Cloud Storage client library - versions consistent with repository-gcs module
  implementation 'com.google.cloud:google-cloud-storage:2.50.0'
  implementation 'com.google.cloud:google-cloud-core:2.53.1'
  implementation 'com.google.cloud:google-cloud-core-http:2.53.1'
  runtimeOnly 'com.google.guava:guava:33.4.0-jre'
  runtimeOnly 'com.google.guava:failureaccess:1.0.2'
  runtimeOnly "org.slf4j:slf4j-api:${versions.slf4j}"
  runtimeOnly "commons-codec:commons-codec:${versions.commonscodec}"
  implementation 'com.google.api:api-common:2.46.1'
  implementation 'com.google.api:gax:2.63.1'
  implementation 'org.threeten:threetenbp:1.7.0'
  runtimeOnly "com.google.protobuf:protobuf-java-util:${versions.protobuf}"
  runtimeOnly "com.google.protobuf:protobuf-java:${versions.protobuf}"
  runtimeOnly 'com.google.code.gson:gson:2.12.1'
  runtimeOnly 'com.google.api.grpc:proto-google-common-protos:2.54.1'
  runtimeOnly 'com.google.api.grpc:proto-google-iam-v1:1.49.1'
  implementation 'com.google.auth:google-auth-library-credentials:1.33.1'
  implementation 'com.google.auth:google-auth-library-oauth2-http:1.33.1'
  runtimeOnly "com.google.oauth-client:google-oauth-client:${versions.google_oauth_client}"
  implementation 'com.google.api-client:google-api-client:2.7.2'
  implementation 'com.google.http-client:google-http-client:1.46.3'
  runtimeOnly 'com.google.http-client:google-http-client-gson:1.46.3'
  runtimeOnly 'com.google.http-client:google-http-client-appengine:1.46.3'
  runtimeOnly 'com.google.http-client:google-http-client-jackson2:1.46.3'
  runtimeOnly "com.fasterxml.jackson.core:jackson-core:${versions.jackson}"
  runtimeOnly 'com.google.api:gax-httpjson:2.63.1'
  runtimeOnly 'io.opencensus:opencensus-api:0.31.1'
  runtimeOnly 'io.opencensus:opencensus-contrib-http-util:0.31.1'
  implementation 'com.google.apis:google-api-services-storage:v1-rev20250224-2.0.0'
  compileOnly 'org.checkerframework:checker-qual:3.49.0'
  runtimeOnly 'io.opentelemetry:opentelemetry-api:1.62.0'
  runtimeOnly 'io.opentelemetry:opentelemetry-common:1.62.0'
  runtimeOnly 'io.opentelemetry:opentelemetry-context:1.62.0'
  runtimeOnly 'com.google.api.grpc:proto-google-cloud-storage-v2:2.50.0'
  runtimeOnly 'io.grpc:grpc-api:1.70.0'

  testImplementation project(':test:framework')
  testImplementation project(xpackModule('esql:qa:testFixtures'))
  testImplementation(testArtifact(project(xpackModule('core'))))
  testImplementation project(':libs:arrow')
  testImplementation project(xpackModule('esql:compute'))
}

tasks.named("test").configure {
  // Needed for Arrow's direct memory access (UnsafeAllocationManager)
  jvmArgs('--add-opens=java.base/java.nio=ALL-UNNAMED')
  // Run the whole suite under Arrow's debug allocator so any use-after-free, double-free, or
  // unreleased ArrowBuf on the direct-memory read path fails deterministically with a stack
  // trace at the offending allocation instead of surfacing as a flaky native corruption later
  // in the same JVM.
  systemProperty 'arrow.memory.debug.allocator', 'true'
}

tasks.named("dependencyLicenses").configure {
  mapping from: /google-cloud-.*/, to: 'google-cloud'
  mapping from: /google-auth-.*/, to: 'google-auth'
  mapping from: /google-http-.*/, to: 'google-http'
  mapping from: /opencensus.*/, to: 'opencensus'
  mapping from: /protobuf.*/, to: 'protobuf'
  mapping from: /proto-google.*/, to: 'proto-google'
  mapping from: /jackson.*/, to: 'jackson'
}


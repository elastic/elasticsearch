apply plugin: 'elasticsearch.internal-java-rest-test'
apply plugin: org.elasticsearch.gradle.internal.precommit.CheckstylePrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.ForbiddenApisPrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.ForbiddenPatternsPrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.FilePermissionsPrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.LoggerUsagePrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.TestingConventionsPrecommitPlugin

dependencies {
  // Test fixtures and spec reader infrastructure
  javaRestTestImplementation project(xpackModule('esql:qa:testFixtures'))
  javaRestTestImplementation project(xpackModule('esql:qa:server'))
  javaRestTestImplementation project(xpackModule('esql'))
  javaRestTestImplementation(project(path: xpackModule('esql'), configuration: 'testRuntimeElements'))

  // S3 fixture infrastructure for mocking S3 operations
  javaRestTestImplementation project(':test:fixtures:s3-fixture')
  javaRestTestImplementation project(':test:fixtures:aws-fixture-utils')

  // GCS fixture infrastructure for mocking GCS operations
  javaRestTestImplementation project(':test:fixtures:gcs-fixture')

  // Repository S3 module for cluster
  clusterModules project(':modules:repository-s3')
  // Repository GCS module for cluster
  clusterModules project(':modules:repository-gcs')
  clusterPlugins project(':plugins:mapper-size')
  clusterPlugins project(':plugins:mapper-murmur3')
  clusterPlugins project(':x-pack:plugin:inference:qa:test-service-plugin')

  // The datasource plugin under test
  clusterPlugins project(xpackModule('esql-datasource-ndjson'))
  clusterPlugins project(xpackModule('esql-datasource-gzip'))
  clusterPlugins project(xpackModule('esql-datasource-zstd'))
  clusterPlugins project(xpackModule('esql-datasource-bzip2'))
  clusterPlugins project(xpackModule('esql-datasource-http'))
  clusterPlugins project(xpackModule('esql-datasource-s3'))
  // GCS datasource plugin for gs:// storage backend
  clusterPlugins project(xpackModule('esql-datasource-gcs'))
  // Azure Blob datasource plugin for wasbs:///wasb:// storage backend
  clusterPlugins project(xpackModule('esql-datasource-azure'))
}

// Standalone NDJSON under iceberg-fixtures/standalone/ is generated from esql:qa:testFixtures CSV basenames.
def testFixturesProject = project(xpackModule('esql:qa:testFixtures'))
def testFixturesDataDir = testFixturesProject.file('src/main/resources/data')
def serverProject = project(xpackModule('esql:qa:server'))
def ndjsonFixtureOutputRoot = file("${buildDir}/ndjson-iceberg-fixtures")
def standaloneNdjsonFromCsv = ['employees']

def generateStandaloneNdjsonTasks = []
standaloneNdjsonFromCsv.each { baseName ->
  def taskName = "generateStandaloneNdjson_${baseName}"
  def csvInput = new File(testFixturesDataDir, "${baseName}.csv")
  def ndjsonOut = file("${ndjsonFixtureOutputRoot}/iceberg-fixtures/standalone/${baseName}.ndjson")
  tasks.register(taskName, JavaExec) {
    dependsOn serverProject.tasks.named('compileNdjsonFixtureGeneratorJava')
    dependsOn testFixturesProject.tasks.named('processResources')
    classpath = serverProject.configurations.ndjsonFixtureGenerator + serverProject.sourceSets.ndjsonFixtureGenerator.output
    mainClass = 'org.elasticsearch.xpack.esql.datasources.NdJsonFixtureGenerator'
    args = [csvInput.path, ndjsonOut.path]
    inputs.file(csvInput)
    outputs.file(ndjsonOut)
    systemProperty 'slf4j.provider', 'org.slf4j.nop.NOPServiceProvider'
  }
  generateStandaloneNdjsonTasks.add(tasks.named(taskName))
}

tasks.register('generateStandaloneNdjsonFixtures') {
  dependsOn generateStandaloneNdjsonTasks
}

sourceSets.javaRestTest.resources.srcDir ndjsonFixtureOutputRoot

tasks.named('processJavaRestTestResources').configure {
  dependsOn 'generateStandaloneNdjsonFixtures'
}

tasks.named('javaRestTest') {
  dependsOn 'generateStandaloneNdjsonFixtures'
  usesDefaultDistribution("to be triaged")
  maxParallelForks = 1
  enabled = buildParams.snapshotBuild

  // Increase timeouts for S3 operations which may take longer than standard queries
  systemProperty 'tests.rest.client_timeout', '60'
  systemProperty 'tests.rest.socket_timeout', '60'

  // Enable more verbose logging for debugging
  testLogging {
    events = ["passed", "skipped", "failed"]
    exceptionFormat = "full"
    showStandardStreams = false
  }
}

restResources {
  restApi {
    include '_common', 'bulk', 'get', 'indices', 'esql', 'xpack', 'cluster', 'capabilities', 'index'
  }
  restTests {
    includeXpack 'esql'
  }
}


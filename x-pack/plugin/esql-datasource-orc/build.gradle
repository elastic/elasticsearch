apply plugin: 'elasticsearch.internal-es-plugin'
apply plugin: 'elasticsearch.publish'

versions << [
  'hadoop' : '3.4.3',
]

esplugin {
  name = 'esql-datasource-orc'
  description = 'ORC format support for ESQL external data sources'
  classname = 'org.elasticsearch.xpack.esql.datasource.orc.OrcDataSourcePlugin'
  extendedPlugins = ['x-pack-esql', 'esql-datasource-compression-libs']
}

base {
  archivesName = 'esql-datasource-orc'
}

dependencies {
  compileOnly project(path: xpackModule('esql'))
  compileOnly project(path: xpackModule('esql-core'))
  compileOnly project(path: xpackModule('core'))
  compileOnly project(':server')
  compileOnly project(xpackModule('esql:compute'))

  implementation("org.apache.orc:orc-core:${versions.orc}") {
    exclude group: 'org.slf4j', module: 'slf4j-api'
    // Compression libraries provided by esql-datasource-compression-libs parent plugin or server
    exclude group: 'io.airlift', module: 'aircompressor'
    exclude group: 'com.github.luben', module: 'zstd-jni'
    exclude group: 'org.xerial.snappy', module: 'snappy-java'
    // lz4-java is provided by the server (libs/lz4); exclude to prevent jar hell
    exclude group: 'at.yawk.lz4', module: 'lz4-java'
    exclude group: 'com.aayushatharva.brotli4j', module: 'brotli4j'
  }

  // Hive storage API - provides VectorizedRowBatch and ColumnVector classes used by ORC's
  // reader API. ORC shades this during its Maven build but the published jar still references
  // these classes in its public API (TypeDescription.createRowBatch(), Reader.rows(), etc.)
  implementation('org.apache.hive:hive-storage-api:2.8.1')

  // Protobuf - required by orc-format's generated classes (OrcProto) which reference
  // com.google.protobuf.MessageOrBuilder at runtime
  implementation('com.google.protobuf:protobuf-java:3.25.8')

  // Hadoop dependencies — required because ORC's Reader API uses Configuration,
  // Path, and FileSystem in its public interfaces. Unlike Parquet/Iceberg,
  // hadoop-client-runtime is also needed at runtime: FileSystem's static
  // initializer references shaded Woodstox classes from the runtime jar.
  implementation("org.apache.hadoop:hadoop-client-api:${versions.hadoop}") {
    exclude group: 'org.slf4j', module: 'slf4j-api'
  }
  implementation("org.apache.hadoop:hadoop-client-runtime:${versions.hadoop}") {
    exclude group: 'org.slf4j', module: 'slf4j-api'
  }

  // Re-add slf4j-api at the platform version to avoid jar hell with x-pack-core
  runtimeOnly "org.slf4j:slf4j-api:${versions.slf4j}"

  testImplementation project(':test:framework')
  testImplementation(testArtifact(project(xpackModule('core'))))
  // At runtime these are provided by esql-datasource-compression-libs parent plugin;
  // at test time we need them explicitly since there's no parent plugin classloader.
  // lz4-java is already on the test classpath via server → libs/lz4.
  testImplementation "io.airlift:aircompressor:${versions.aircompressor}"
  testImplementation "com.github.luben:zstd-jni:${versions.zstdJni}"
  testImplementation "org.xerial.snappy:snappy-java:${versions.snappyJava}"
}

// Compression libraries (aircompressor, zstd-jni, snappy-java) are provided by
// esql-datasource-compression-libs parent plugin; lz4-java by the server (libs/lz4).

tasks.named("javadoc").configure {
  // ORC/Hadoop dependency tree causes javadoc issues (unnamed vs named module conflicts)
  enabled = false
}

tasks.withType(org.elasticsearch.gradle.internal.AbstractDependenciesTask).configureEach {
  mapping from: /lucene-.*/, to: 'lucene'
  mapping from: /orc-.*/, to: 'orc'
  mapping from: /hadoop-.*/, to: 'hadoop'
  mapping from: /hive-.*/, to: 'orc'
  mapping from: /threeten-extra-.*/, to: 'orc'
  mapping from: /protobuf-.*/, to: 'orc'
  mapping from: /jts-core-.*/, to: 'orc'
}


apply plugin: 'elasticsearch.internal-es-plugin'
apply plugin: 'elasticsearch.publish'

esplugin {
  name = 'esql-datasource-parquet-native'
  description = 'DataFusion-backed native Parquet reader for ESQL external data sources'
  classname = 'org.elasticsearch.xpack.esql.datasource.parquet.datafusion.DataFusionParquetPlugin'
  extendedPlugins = ['x-pack-esql']
}

base {
  archivesName = 'esql-datasource-parquet-native'
}

dependencies {
  compileOnly project(path: xpackModule('esql'))
  compileOnly project(path: xpackModule('esql-core'))
  compileOnly project(path: xpackModule('core'))
  compileOnly project(':server')
  compileOnly project(xpackModule('esql:compute'))

  // Arrow C Data Interface for zero-copy FFI transfer from Rust
  implementation("org.apache.arrow:arrow-c-data:18.3.0")
  // Arrow core (vectors, memory) - already in compute transitively, needed at compile time
  implementation project(':libs:arrow')

  // parquet-mr used only in tests to create Parquet test files
  testImplementation("org.apache.parquet:parquet-hadoop-bundle:${versions.parquet}")
  testImplementation("org.apache.hadoop:hadoop-client-api:3.4.3")
  testImplementation("org.apache.hadoop:hadoop-client-runtime:3.4.3")

  testImplementation project(':test:framework')
  testImplementation(testArtifact(project(xpackModule('core'))))
}

tasks.named("test").configure {
  def nativeLib = "${project.projectDir}/native/target/release/libesql_parquet_native.dylib"
  if (new File(nativeLib).exists()) {
    systemProperty 'tests.native.lib.path', nativeLib
  }
  jvmArgs('--add-opens=java.base/java.nio=ALL-UNNAMED')
}

tasks.named("dependencyLicenses").configure {
  mapping from: /parquet-.*/, to: 'parquet'
  mapping from: /hadoop-.*/, to: 'hadoop'
}

tasks.named("thirdPartyAudit").configure {
  ignoreMissingClasses()
}

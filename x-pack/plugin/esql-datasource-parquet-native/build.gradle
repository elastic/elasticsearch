apply plugin: 'elasticsearch.internal-es-plugin'
apply plugin: 'elasticsearch.publish'

esplugin {
  name = 'esql-datasource-parquet-native'
  description = 'DataFusion-backed native Parquet reader for ESQL external data sources'
  classname = 'org.elasticsearch.xpack.esql.datasource.parquet.datafusion.DataFusionParquetPlugin'
  extendedPlugins = ['x-pack-esql']
}

base {
  archivesName = 'esql-datasource-parquet-native'
}

dependencies {
  compileOnly project(path: xpackModule('esql'))
  compileOnly project(path: xpackModule('esql-core'))
  compileOnly project(path: xpackModule('core'))
  compileOnly project(':server')
  compileOnly project(xpackModule('esql:compute'))

  // Arrow C Data Interface for zero-copy FFI transfer from Rust
  implementation("org.apache.arrow:arrow-c-data:18.3.0") {
    exclude group: 'org.slf4j'
  }
  // Arrow core (vectors, memory) - already in compute transitively, needed at compile time
  implementation(project(':libs:arrow')) {
    exclude group: 'org.slf4j'
  }

  // parquet-mr used only in tests to create Parquet test files
  testImplementation("org.apache.parquet:parquet-hadoop-bundle:${versions.parquet}")
  testImplementation("org.apache.hadoop:hadoop-client-api:3.4.3")
  testImplementation("org.apache.hadoop:hadoop-client-runtime:3.4.3")

  testImplementation project(':test:framework')
  testImplementation(testArtifact(project(xpackModule('core'))))
}

// ---------------------------------------------------------------------------
// Native Rust library build (requires cargo on PATH; skips gracefully if absent)
// ---------------------------------------------------------------------------
def nativeDir = "${project.projectDir}/native"
def cargoAvailable = {
  try {
    def proc = "cargo --version".execute()
    proc.waitFor()
    return proc.exitValue() == 0
  } catch (Exception e) {
    return false
  }
}

if (cargoAvailable()) {
  def os = System.getProperty("os.name", "").toLowerCase()
  def arch = System.getProperty("os.arch", "").toLowerCase()

  String libFileName
  String platformDir
  if (os.contains("mac") || os.contains("darwin")) {
    libFileName = "libesql_parquet_native.dylib"
    platformDir = arch.contains("aarch64") || arch.contains("arm64") ? "darwin-aarch64" : "darwin-x86_64"
  } else if (os.contains("linux")) {
    libFileName = "libesql_parquet_native.so"
    platformDir = arch.contains("aarch64") || arch.contains("arm64") ? "linux-aarch64" : "linux-x86_64"
  } else {
    throw new GradleException("Unsupported OS for native build: ${os}")
  }

  def cargoOutputDir = "${nativeDir}/target/release"
  def resourceTarget = "${project.projectDir}/src/main/resources/platform/${platformDir}"

  tasks.register("cargoBuild", Exec) {
    description = "Build the native DataFusion library with cargo (release mode)"
    workingDir nativeDir
    commandLine "cargo", "build", "--release"

    inputs.dir("${nativeDir}/src")
    inputs.file("${nativeDir}/Cargo.toml")
    inputs.file("${nativeDir}/Cargo.lock")
    outputs.file("${cargoOutputDir}/${libFileName}")
  }

  tasks.register("copyNativeLib", Copy) {
    description = "Copy the built native library to the platform resources directory"
    dependsOn "cargoBuild"
    from "${cargoOutputDir}/${libFileName}"
    into resourceTarget
  }

  tasks.named("processResources").configure {
    dependsOn "copyNativeLib"
  }
} else {
  logger.warn("cargo not found on PATH — skipping native library build. Using pre-built library from resources.")
}

tasks.named("test").configure {
  def nativeLib = "${project.projectDir}/native/target/release/libesql_parquet_native.dylib"
  if (new File(nativeLib).exists()) {
    systemProperty 'tests.native.lib.path', nativeLib
  }
  jvmArgs('--add-opens=java.base/java.nio=ALL-UNNAMED')
}

tasks.named("dependencyLicenses").configure {
  mapping from: /parquet-.*/, to: 'parquet'
  mapping from: /hadoop-.*/, to: 'hadoop'
}

tasks.named("thirdPartyAudit").configure {
  ignoreMissingClasses()
}

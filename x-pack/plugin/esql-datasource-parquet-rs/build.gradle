import org.elasticsearch.gradle.transform.UnzipTransform

apply plugin: 'elasticsearch.internal-es-plugin'
apply plugin: 'elasticsearch.publish'

esplugin {
  name = 'esql-datasource-parquet-rs'
  description = 'parquet-rs backed native Parquet reader for ESQL external data sources'
  classname = 'org.elasticsearch.xpack.esql.datasource.parquet.parquetrs.ParquetRsPlugin'
  extendedPlugins = ['x-pack-esql']
}

base {
  archivesName = 'esql-datasource-parquet-rs'
}

def nativeLib="libesql_parquet_rs"
def nativeDir = "${project.projectDir}/native"

// Build locally if not in CI and if the "native/target" directory exists.
// This ensures only people actively working on native code will incur the build cost.
//
// To force a local build, export LOCAL_NATIVE_BUILD=true. Useful in particular for
// the first build, when "native/target" doesn't yet exist.
//
// To build and publish multi-platform libraries, see "native/Makefile"
def buildLocally = {
  def envValue = System.getenv("LOCAL_NATIVE_BUILD")
  if (gradle.startParameter.taskNames.any { it.matches("build.*DockerImage") }) {
    // Never build locally if we're building a docker image.
    false
  } else if (envValue != null) {
    Boolean.valueOf(envValue)
  } else {
    buildParams.ci == false && file("${nativeDir}/target").isDirectory()
  }
}()

configurations {
  libs {
    attributes.attribute(ArtifactTypeDefinition.ARTIFACT_TYPE_ATTRIBUTE, ArtifactTypeDefinition.DIRECTORY_TYPE)
    canBeConsumed = false
  }
}


def nativeVersion = buildLocally ? "local" : providers.exec {
  commandLine "${project.projectDir}/native/build-tools/src-sha1.sh"
}.standardOutput.asText.get().trim()

dependencies {
  compileOnly project(path: xpackModule('esql'))
  compileOnly project(path: xpackModule('esql-core'))
  compileOnly project(path: xpackModule('core'))
  compileOnly project(':server')
  compileOnly project(xpackModule('esql:compute'))
  compileOnly project(xpackModule('esql:arrow'))

  // Arrow C Data Interface for zero-copy FFI transfer from Rust
  implementation("org.apache.arrow:arrow-c-data:18.3.0") {
    exclude group: 'org.slf4j'
  }
  implementation(project(':libs:arrow')) {
    exclude group: 'org.slf4j'
  }

  testImplementation("org.apache.parquet:parquet-hadoop-bundle:${versions.parquet}")
  testImplementation("org.apache.hadoop:hadoop-client-api:3.4.3")
  testImplementation("org.apache.hadoop:hadoop-client-runtime:3.4.3")
  // jts-core is needed at test time: parquet-hadoop-bundle's ColumnChunkPageWriteStore
  // references GeospatialStatistics which requires JTS. Normally resolved transitively
  // via esql-core, but this module does not depend on esql-core.
  testImplementation("org.locationtech.jts:jts-core:1.20.0")

  testImplementation project(':test:framework')
  testImplementation(testArtifact(project(xpackModule('core'))))

  if (buildLocally == false) {
    registerTransform(UnzipTransform, transformSpec -> {
      transformSpec.getFrom().attribute(ArtifactTypeDefinition.ARTIFACT_TYPE_ATTRIBUTE, ArtifactTypeDefinition.ZIP_TYPE);
      transformSpec.getTo().attribute(ArtifactTypeDefinition.ARTIFACT_TYPE_ATTRIBUTE, ArtifactTypeDefinition.DIRECTORY_TYPE);
    });
    libs "org.elasticsearch:${nativeLib}:${nativeVersion}@zip"
  }
}

repositories {
  exclusiveContent {
    forRepository {
      maven {
        url = "https://artifactory.elastic.dev/artifactory/elasticsearch-native"
        metadataSources {
          artifact()
        }
      }
    }
    filter {
      includeModule("org.elasticsearch", nativeLib)
    }
  }
}

// ---------------------------------------------------------------------------
// Native Rust library build
// ---------------------------------------------------------------------------

def os = System.getProperty("os.name", "").toLowerCase()

String libFileName
if (os.contains("mac") || os.contains("darwin")) {
  libFileName = "${nativeLib}.dylib"
} else if (os.contains("linux")) {
  libFileName = "${nativeLib}.so"
} else {
  throw new GradleException("Unsupported platform: " + os)
}

def cargoOutputDir = "${nativeDir}/target/release"

tasks.register("cargoBuild", Exec) {
  description = "Build the ${nativeLib} library locally (release mode)"
  workingDir nativeDir

  def cargoPath = org.gradle.internal.os.OperatingSystem.current().findInPath("cargo")
  commandLine cargoPath.absolutePath, "build", "--release"

  inputs.dir("${nativeDir}/src")
  inputs.file("${nativeDir}/Cargo.toml")
  inputs.file("${nativeDir}/Cargo.lock")
  outputs.file("${cargoOutputDir}/${libFileName}")

  onlyIf {
    buildLocally
  }
}

sourceSets {
  main {
    resources {
      srcDir(layout.buildDirectory.dir("native-libs/${nativeVersion}"))
    }
  }
}

def extractNativeLibs = tasks.register('extractNativeLibs', Copy) {
  if (buildLocally) {
    dependsOn("cargoBuild")
    from "${cargoOutputDir}/${libFileName}"
  } else {
    from configurations.libs
  }
  into layout.buildDirectory.dir("native-libs/${nativeVersion}/platform")
}

tasks.named("processResources").configure {
  dependsOn extractNativeLibs
}

tasks.named("test").configure {
  jvmArgs('--add-opens=java.base/java.nio=ALL-UNNAMED')
}

tasks.named("dependencyLicenses").configure {
  mapping from: /arrow-.*/, to: 'arrow'
  mapping from: /parquet-.*/, to: 'parquet'
  mapping from: /hadoop-.*/, to: 'hadoop'
}

tasks.named("thirdPartyAudit").configure {
  ignoreMissingClasses()
}

tasks.named("forbiddenPatterns").configure {
  exclude '**/*.dylib'
  exclude '**/*.so'
}

apply plugin: 'elasticsearch.internal-es-plugin'
apply plugin: 'elasticsearch.publish'

versions << [
  'hadoop' : '3.4.3',
]

esplugin {
  name = 'esql-datasource-parquet'
  description = 'Parquet format support for ESQL external data sources'
  classname = 'org.elasticsearch.xpack.esql.datasource.parquet.ParquetDataSourcePlugin'
  extendedPlugins = ['x-pack-esql', 'esql-datasource-compression-libs']
}

base {
  archivesName = 'esql-datasource-parquet'
}

dependencies {
  // SPI interfaces from ESQL core
  compileOnly project(path: xpackModule('esql'))
  compileOnly project(path: xpackModule('esql-core'))
  compileOnly project(path: xpackModule('core'))
  compileOnly project(':server')
  compileOnly project(xpackModule('esql:compute'))

  // Parquet format support - using parquet-hadoop-bundle to avoid jar hell from duplicate shaded classes
  implementation("org.apache.parquet:parquet-hadoop-bundle:${versions.parquet}")

  // hadoop-client-api is needed at compile time because parquet-hadoop-bundle's public API
  // (e.g. ParquetFileReader) references Hadoop types. At runtime these code paths are never
  // reached: PlainParquetConfiguration replaces HadoopParquetConfiguration and
  // PlainCompressionCodecFactory replaces the Hadoop-backed CodecFactory.
  compileOnly("org.apache.hadoop:hadoop-client-api:${versions.hadoop}")

  // Compression libraries — inherited at runtime via extendedPlugins from
  // esql-datasource-compression-libs; declared compileOnly so PlainCompressionCodecFactory
  // can reference their classes at compile time.
  compileOnly "io.airlift:aircompressor:${versions.aircompressor}"
  compileOnly "com.github.luben:zstd-jni:${versions.zstdJni}"
  compileOnly "org.xerial.snappy:snappy-java:${versions.snappyJava}"

  // hadoop-client-runtime is needed at test time because ParquetWriter.Builder.build()
  // creates HadoopParquetConfiguration which requires shaded Woodstox classes.
  testImplementation("org.apache.hadoop:hadoop-client-api:${versions.hadoop}")
  testImplementation("org.apache.hadoop:hadoop-client-runtime:${versions.hadoop}")

  testImplementation project(':test:framework')
  testImplementation(testArtifact(project(xpackModule('core'))))
}

tasks.named("dependencyLicenses").configure {
  mapping from: /lucene-.*/, to: 'lucene'
  mapping from: /parquet-.*/, to: 'parquet'
}

tasks.named("thirdPartyAudit").configure {
  ignoreMissingClasses()
  ignoreViolations(
    // Parquet shaded hashing uses sun.misc.Unsafe
    'shaded.parquet.net.openhft.hashing.HotSpotPrior7u6StringHash',
    'shaded.parquet.net.openhft.hashing.LongHashFunction',
    'shaded.parquet.net.openhft.hashing.LongTupleHashFunction',
    'shaded.parquet.net.openhft.hashing.ModernCompactStringHash',
    'shaded.parquet.net.openhft.hashing.ModernHotSpotStringHash',
    'shaded.parquet.net.openhft.hashing.UnsafeAccess',
    'shaded.parquet.net.openhft.hashing.UnsafeAccess$OldUnsafeAccessBigEndian',
    'shaded.parquet.net.openhft.hashing.UnsafeAccess$OldUnsafeAccessLittleEndian',
    'shaded.parquet.net.openhft.hashing.Util',
  )
}

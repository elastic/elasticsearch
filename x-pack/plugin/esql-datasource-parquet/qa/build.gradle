apply plugin: 'elasticsearch.internal-java-rest-test'
apply plugin: org.elasticsearch.gradle.internal.precommit.CheckstylePrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.ForbiddenApisPrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.ForbiddenPatternsPrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.FilePermissionsPrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.LoggerUsagePrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.TestingConventionsPrecommitPlugin

dependencies {
  // Test fixtures and spec reader infrastructure
  javaRestTestImplementation project(xpackModule('esql:qa:testFixtures'))
  javaRestTestImplementation project(xpackModule('esql:qa:server'))
  javaRestTestImplementation project(xpackModule('esql'))
  javaRestTestImplementation(project(path: xpackModule('esql'), configuration: 'testRuntimeElements'))
  
  // S3 fixture infrastructure for mocking S3 operations
  javaRestTestImplementation project(':test:fixtures:s3-fixture')
  javaRestTestImplementation project(':test:fixtures:aws-fixture-utils')

  // GCS fixture infrastructure for mocking GCS operations
  javaRestTestImplementation project(':test:fixtures:gcs-fixture')

  // Parquet support - needed for reading test fixtures
  javaRestTestImplementation("org.apache.parquet:parquet-hadoop-bundle:${versions.parquet}")
  
  // Repository S3 module for cluster
  clusterModules project(':modules:repository-s3')
  // Repository GCS module for cluster
  clusterModules project(':modules:repository-gcs')
  clusterPlugins project(':plugins:mapper-size')
  clusterPlugins project(':plugins:mapper-murmur3')
  clusterPlugins project(':x-pack:plugin:inference:qa:test-service-plugin')

  // The parquet datasource plugin under test
  clusterPlugins project(xpackModule('esql-datasource-parquet'))
  clusterPlugins project(xpackModule('esql-datasource-http'))
  clusterPlugins project(xpackModule('esql-datasource-s3'))
  // GCS datasource plugin for gs:// storage backend
  clusterPlugins project(xpackModule('esql-datasource-gcs'))
  // Azure Blob datasource plugin for wasbs:///wasb:// storage backend
  clusterPlugins project(xpackModule('esql-datasource-azure'))
}

// Generate Parquet fixtures at build time from CSV.
// Uses shared ParquetFixtureGenerator from esql:qa:server.
ext.serverProject = project(xpackModule('esql:qa:server'))
ext.parquetFixtureOutputDir = file("${buildDir}/parquet-fixtures/iceberg-fixtures")
def parquetFixtureDir = file("${ext.parquetFixtureOutputDir}/standalone")
ext.testFixturesProject = project(xpackModule('esql:qa:testFixtures'))
ext.testFixturesDataDir = ext.testFixturesProject.file('src/main/resources/data')
ext.csvToParquetFixtures = ['employees', 'web_logs', 'books']

tasks.register('syncIcebergFixtures', Sync) {
  dependsOn testFixturesProject.tasks.named('processResources')
  duplicatesStrategy = DuplicatesStrategy.FAIL
  from(testFixturesDataDir) {
    include csvToParquetFixtures.collect { "${it}.csv" }
  }
  into parquetFixtureDir
}

ext.generateParquetTasks = []
csvToParquetFixtures.each { baseName ->
  def taskName = "generateParquet_${baseName}"
  def csvInput = new File(testFixturesDataDir, "${baseName}.csv")
  def parquetFile = file("${parquetFixtureDir}/${baseName}.parquet")
  tasks.register(taskName, JavaExec) {
    dependsOn serverProject.tasks.named('compileParquetFixtureGeneratorJava'), syncIcebergFixtures
    dependsOn testFixturesProject.tasks.named('processResources')
    classpath = serverProject.configurations.parquetFixtureGenerator + serverProject.sourceSets.parquetFixtureGenerator.output
    mainClass = 'org.elasticsearch.xpack.esql.datasources.ParquetFixtureGenerator'
    args = [csvInput.path, parquetFile.path]
    inputs.file(csvInput)
    outputs.file(parquetFile)
    systemProperty 'slf4j.provider', 'org.slf4j.nop.NOPServiceProvider'
  }
  generateParquetTasks.add(tasks.named(taskName))
}

// Generate multifile fixtures by splitting employees.csv into 3 parts.
def multifileDir = file("${parquetFixtureOutputDir}/multifile")
def multifileEmployeesCsv = new File(testFixturesDataDir, "employees.csv")
tasks.register('generateMultifileParquet_employees', JavaExec) {
  dependsOn serverProject.tasks.named('compileParquetFixtureGeneratorJava')
  dependsOn testFixturesProject.tasks.named('processResources')
  classpath = serverProject.configurations.parquetFixtureGenerator + serverProject.sourceSets.parquetFixtureGenerator.output
  mainClass = 'org.elasticsearch.xpack.esql.datasources.ParquetFixtureGenerator'
  args = [multifileEmployeesCsv.path, multifileDir.path, '3']
  inputs.file(multifileEmployeesCsv)
  outputs.dir(multifileDir)
  systemProperty 'slf4j.provider', 'org.slf4j.nop.NOPServiceProvider'
}
generateParquetTasks.add(tasks.named('generateMultifileParquet_employees'))

// Generate compressed Parquet fixtures for each supported internal codec.
// Each codec gets its own directory: standalone-snappy/, standalone-gzip/, etc.
apply from: serverProject.file('compressed-parquet-fixtures.gradle')

tasks.register('generateParquetFixtures') {
  dependsOn generateParquetTasks
}

sourceSets.javaRestTest.resources.srcDir file("${buildDir}/parquet-fixtures")
tasks.named('processJavaRestTestResources').configure {
  dependsOn generateParquetFixtures
}

// S3GlobDiscoveryIT extends ESTestCase (not ESRestTestCase) since it tests S3StorageProvider
// directly against the S3HttpFixture without needing an Elasticsearch cluster.
tasks.named('javaRestTestTestingConventions').configure {
  baseClass 'org.elasticsearch.test.rest.ESRestTestCase'
  baseClass 'org.elasticsearch.test.ESTestCase'
}

tasks.named("forbiddenPatterns").configure {
  exclude '**/*.parquet'
}

tasks.named('javaRestTest') {
  dependsOn generateParquetFixtures
  usesDefaultDistribution("to be triaged")
  maxParallelForks = 1
  enabled = buildParams.snapshotBuild
  
  // Increase timeouts for S3/Parquet operations which may take longer than standard queries
  systemProperty 'tests.rest.client_timeout', '60'
  systemProperty 'tests.rest.socket_timeout', '60'
  
  // Enable more verbose logging for debugging
  testLogging {
    events = ["passed", "skipped", "failed"]
    exceptionFormat = "full"
    showStandardStreams = false
  }
}

restResources {
  restApi {
    include '_common', 'bulk', 'get', 'indices', 'esql', 'xpack', 'cluster', 'capabilities', 'index'
  }
  restTests {
    includeXpack 'esql'
  }
}

apply plugin: 'elasticsearch.internal-es-plugin'
apply plugin: 'elasticsearch.internal-java-rest-test'

esplugin {
    name = 'esql-test-functions'
    description = 'Test functions for ES|QL runtime bytecode generation'
    classname = 'org.elasticsearch.xpack.esql.functions.test.TestFunctionsPlugin'
    extendedPlugins = ['x-pack-esql']
}

base {
    archivesName = 'x-pack-esql-test-functions'
}

dependencies {
    compileOnly project(':server')
    compileOnly project(':x-pack:plugin:esql')
    compileOnly project(':x-pack:plugin:esql:compute')
    compileOnly project(':x-pack:plugin:esql:compute:ann')
    implementation project(':x-pack:plugin:esql:compute:runtime')
    compileOnly project(':x-pack:plugin:esql-core')
    
    // Test dependencies for unit tests extending AbstractFunctionTestCase
    testImplementation project(':test:framework')
    testImplementation project(':x-pack:plugin:esql')
    testImplementation(testArtifact(project(':x-pack:plugin:esql')))
    testImplementation project(':x-pack:plugin:esql:compute')
    testImplementation project(':x-pack:plugin:esql:compute:runtime')
    testImplementation project(':x-pack:plugin:esql-core')
    testImplementation project(xpackModule('esql:compute:test'))
    
    // Required for AbstractFunctionTestCase and doc generation
    testImplementation project(xpackModule('esql:qa:testFixtures'))
    
    // REST test dependencies
    javaRestTestImplementation project(':test:framework')
    
    // Include this plugin in the test cluster
    clusterPlugins project(':x-pack:plugin:esql-test-functions')
}

tasks.named("javadoc").configure {
    enabled = false
}

// Configure the REST test cluster to include this plugin
tasks.named('javaRestTest').configure {
    usesDefaultDistribution("esql-test-functions plugin requires ES|QL plugin which is part of default distribution")
}

// Configure doc generation for unit tests
tasks.named('test').configure {
    if (buildParams.ci) {
        systemProperty 'generateDocs', 'assert'
    } else {
        systemProperty 'generateDocs', 'write'
    }
}

apply plugin: 'elasticsearch.internal-es-plugin'
apply plugin: 'elasticsearch.internal-java-rest-test'

esplugin {
    name = 'esql-test-functions'
    description = 'Test functions for ES|QL runtime bytecode generation'
    classname = 'org.elasticsearch.xpack.esql.functions.test.TestFunctionsPlugin'
    extendedPlugins = ['x-pack-esql']
}

base {
    archivesName = 'x-pack-esql-test-functions'
}

dependencies {
    compileOnly project(':server')
    compileOnly project(':x-pack:plugin:esql')
    compileOnly project(':x-pack:plugin:esql:compute')
    compileOnly project(':x-pack:plugin:esql:compute:ann')
    implementation project(':x-pack:plugin:esql:compute:runtime')
    compileOnly project(':x-pack:plugin:esql-core')
    
    // Test dependencies for unit tests extending AbstractFunctionTestCase
    testImplementation project(':test:framework')
    testImplementation project(':x-pack:plugin:esql')
    testImplementation(testArtifact(project(':x-pack:plugin:esql')))
    testImplementation project(':x-pack:plugin:esql:compute')
    testImplementation project(':x-pack:plugin:esql:compute:runtime')
    testImplementation project(':x-pack:plugin:esql-core')
    testImplementation project(xpackModule('esql:compute:test'))
    
    // Required for AbstractFunctionTestCase and doc generation
    testImplementation project(xpackModule('esql:qa:testFixtures'))
    
    // REST test dependencies
    javaRestTestImplementation project(':test:framework')
    
    // Include this plugin in the test cluster
    clusterPlugins project(':x-pack:plugin:esql-test-functions')
}

tasks.named("javadoc").configure {
    enabled = false
}

// Configure the REST test cluster to include this plugin
tasks.named('javaRestTest').configure {
    usesDefaultDistribution("esql-test-functions plugin requires ES|QL plugin which is part of default distribution")
}

// Interface for injecting FileSystemOperations
interface Injected {
    @javax.inject.Inject
    FileSystemOperations getFs()
}

// Configure doc generation for unit tests
tasks.named('test').configure {
    def injected = project.objects.newInstance(Injected)
    def folder = 'esql'
    def docFolder = file("${rootDir}/docs/reference/query-languages/${folder}").toPath()
    def imagesDocFolder = file("${docFolder}/images")
    def snippetsDocFolder = file("${docFolder}/_snippets")
    def kibanaDocFolder = file("${docFolder}/kibana")
    File imagesFolder = file("build/testrun/test/temp/${folder}/images")
    File snippetsFolder = file("build/testrun/test/temp/${folder}/_snippets")
    File kibanaFolder = file("build/testrun/test/temp/${folder}/kibana")

    if (buildParams.ci) {
        systemProperty 'generateDocs', 'assert'
        doFirst {
            injected.fs.sync {
                from snippetsDocFolder
                into snippetsFolder
            }
            injected.fs.sync {
                from imagesDocFolder
                into imagesFolder
            }
            injected.fs.sync {
                from kibanaDocFolder
                into kibanaFolder
            }
        }
    } else {
        systemProperty 'generateDocs', 'write'
        def snippetsTree = fileTree(snippetsFolder).matching {
            include "**/types/*.md"
        }
        def imagesTree = fileTree(imagesFolder).matching {
            include "**/*.svg"
        }
        def kibanaTree = fileTree(kibanaFolder).matching {
            include "**/*.md", "**/*.json"
        }

        doLast {
            def snippets = snippetsTree.files.collect { it.name }
            int countSnippets = snippets.size()
            def images = imagesTree.files.collect { it.name }
            int countImages = images.size()
            def kibana = kibanaTree.files.collect { it.name }
            int countKibana = kibana.size()

            if (countSnippets == 0) {
                logger.quiet("ESQL-TEST-FUNCTIONS Docs: No function snippets created. Skipping sync.")
            } else {
                logger.quiet("ESQL-TEST-FUNCTIONS Docs: Found $countSnippets generated function snippets to patch into docs")
                injected.fs.sync {
                    from snippetsFolder
                    into snippetsDocFolder
                    include '**/*.md'
                    preserve {
                        include '**/*.md'
                    }
                }
            }
            if (countImages == 0) {
                logger.quiet("ESQL-TEST-FUNCTIONS Docs: No function signatures created. Skipping sync.")
            } else {
                logger.quiet("ESQL-TEST-FUNCTIONS Docs: Found $countImages generated SVG files to patch into docs")
                injected.fs.sync {
                    from imagesFolder
                    into imagesDocFolder
                    include '**/*.svg'
                    preserve {
                        include '**/*.svg'
                    }
                }
            }
            if (countKibana == 0) {
                logger.quiet("ESQL-TEST-FUNCTIONS Docs: No kibana docs created. Skipping sync.")
            } else {
                logger.quiet("ESQL-TEST-FUNCTIONS Docs: Found $countKibana generated kibana files to patch into docs")
                injected.fs.sync {
                    from kibanaFolder
                    into kibanaDocFolder
                    include '**/*.md', '**/*.json'
                    preserve {
                        include '**/*.md', '**/*.json'
                    }
                }
            }
        }
    }
}

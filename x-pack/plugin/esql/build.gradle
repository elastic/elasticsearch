tasks.register("analyzePromqlQueries", JavaExec) {
  mainClass = 'org.elasticsearch.xpack.esql.optimizer.promql.PromqlCoverageAnalyzer'
  classpath = sourceSets.test.runtimeClasspath
  def arguments = [
    "--input", project.findProperty("queriesFile") ?: "",
    "--output", project.findProperty("outputFile") ?: ""
  ]
  if (project.hasProperty("outputFormat")) {
    arguments += ["--format", project.findProperty("outputFormat")]
  }
  if (project.hasProperty("verbose")) {
    arguments += ["--verbose", project.findProperty("verbose")]
  }
  args arguments as List<String>
}


plugins {
  id 'idea'
}

apply plugin: 'elasticsearch.internal-es-plugin'
apply plugin: 'elasticsearch.publish'
apply plugin: 'elasticsearch.esql-function'

esplugin {
  name = 'x-pack-esql-function-math'
  description = 'Math functions for esql'
  classname = 'org.elasticsearch.xpack.esql.function.math.EsqlFunctionMathPlugin'
  extendedPlugins = ['x-pack-esql']
}

base {
  archivesName = 'x-pack-esql-function-math'
}

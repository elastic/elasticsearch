import org.elasticsearch.gradle.Version
import org.elasticsearch.gradle.VersionProperties
import org.elasticsearch.gradle.util.GradleUtils
import org.elasticsearch.gradle.testclusters.StandaloneRestIntegTestTask

apply plugin: 'elasticsearch.internal-test-artifact'
apply plugin: 'elasticsearch.internal-java-rest-test'
apply plugin: 'elasticsearch.esql-csv-spec-tests'
apply plugin: 'elasticsearch.internal-yaml-rest-test'
apply plugin: 'elasticsearch.bwc-test'
apply plugin: 'elasticsearch.bc-upgrade-test'
apply plugin: org.elasticsearch.gradle.internal.precommit.CheckstylePrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.ForbiddenApisPrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.ForbiddenPatternsPrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.FilePermissionsPrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.LoggerUsagePrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.TestingConventionsPrecommitPlugin

restResources {
  restApi {
    include '_common', 'bulk', 'get', 'indices', 'esql', 'xpack', 'enrich', 'cluster', 'capabilities', 'index', 'search'
  }
  restTests {
    includeXpack 'esql'
  }
}

dependencies {
  javaRestTestImplementation project(xpackModule('esql:qa:testFixtures'))
  javaRestTestImplementation project(xpackModule('esql:qa:server'))
  javaRestTestImplementation project(xpackModule('esql'))
  javaRestTestImplementation(testArtifact(project(":modules:ip-location")))

  clusterPlugins project(xpackModule('esql-datasource-csv'))
  clusterPlugins project(xpackModule('esql-datasource-ndjson'))
  clusterPlugins project(xpackModule('esql-datasource-http'))
}

GradleUtils.extendSourceSet(project, "javaRestTest", "yamlRestTest")

esqlCsvSpecTests {
    specFilesDir = project(xpackModule('esql:qa:testFixtures')).file('src/main/resources')
    packageName = 'org.elasticsearch.xpack.esql.qa.mixed'
    variant 'MixedClusterEsqlSpec', 'AbstractMixedClusterEsqlSpecIT'
}

// ESQL is available in 8.11 or later
def supportedVersion = bwcVersion -> {
  return bwcVersion.onOrAfter(Version.fromString("8.11.0")) && bwcVersion != VersionProperties.elasticsearchVersion
}

// Note: applying 'elasticsearch.internal-java-rest-test' also registers a base (unversioned)
// 'javaRestTest' task. That task has an empty javaRestTest source set here — the csv-spec
// test class (AbstractMixedClusterEsqlSpecIT) lives in the csvSpecTest source set and requires
// tests.old_cluster_version to be set, so it cannot run without a BWC version. The base task
// is harmless (it runs nothing) and is not wired to 'check' or 'bwcTest'.
buildParams.bwcVersions.withWireCompatible(supportedVersion) { bwcVersion, baseName ->
  def javaRestTest = tasks.register("v${bwcVersion}#javaRestTest", StandaloneRestIntegTestTask) {
    usesBwcDistribution(bwcVersion)
    systemProperty("tests.old_cluster_version", bwcVersion)
    maxParallelForks = 1
  }

  def csvSpecTest = tasks.register("v${bwcVersion}#csvSpecTests", StandaloneRestIntegTestTask) {
    usesBwcDistribution(bwcVersion)
    systemProperty("tests.old_cluster_version", bwcVersion)
    maxParallelForks = 1
    testClassesDirs = sourceSets.csvSpecTest.output.classesDirs
    classpath = sourceSets.csvSpecTest.runtimeClasspath
    dependsOn generateEsqlSpecTests
  }

  def yamlRestTest = tasks.register("v${bwcVersion}#yamlRestTest", StandaloneRestIntegTestTask) {
    usesBwcDistribution(bwcVersion)
    systemProperty("tests.old_cluster_version", bwcVersion)
    testClassesDirs = sourceSets.yamlRestTest.output.classesDirs
    classpath = sourceSets.yamlRestTest.runtimeClasspath
  }

  tasks.register(bwcTaskName(bwcVersion)) {
    dependsOn javaRestTest, csvSpecTest, yamlRestTest
  }
}

tasks.named("yamlRestTest") {
  enabled = false
}

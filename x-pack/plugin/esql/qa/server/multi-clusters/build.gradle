import org.elasticsearch.gradle.Version
import org.elasticsearch.gradle.testclusters.StandaloneRestIntegTestTask

apply plugin: 'elasticsearch.internal-java-rest-test'
apply plugin: 'elasticsearch.esql-csv-spec-tests'
apply plugin: 'elasticsearch.bwc-test'
apply plugin: org.elasticsearch.gradle.internal.precommit.CheckstylePrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.ForbiddenApisPrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.ForbiddenPatternsPrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.FilePermissionsPrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.LoggerUsagePrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.TestingConventionsPrecommitPlugin

dependencies {
  javaRestTestImplementation project(xpackModule('esql:qa:testFixtures'))
  javaRestTestImplementation project(xpackModule('esql:qa:server'))
  javaRestTestImplementation project(xpackModule('esql'))

  javaRestTestImplementation(testArtifact(project(":modules:ip-location")))
  clusterPlugins project(':x-pack:plugin:inference:qa:test-service-plugin')
  clusterPlugins project(xpackModule('esql-datasource-csv'))
  clusterPlugins project(xpackModule('esql-datasource-ndjson'))
  clusterPlugins project(xpackModule('esql-datasource-http'))
}

esqlCsvSpecTests {
    specFilesDir = project(xpackModule('esql:qa:testFixtures')).file('src/main/resources')
    packageName = 'org.elasticsearch.xpack.esql.ccq'
    variant 'MultiClusterSpec', 'AbstractMultiClusterSpecIT'
}

def currentVersion = buildParams.bwcVersions.currentVersion

def currentToCurrent = tasks.register("v${currentVersion}#csvSpecTests", StandaloneRestIntegTestTask) {
  systemProperty("tests.version.remote_cluster", currentVersion)
  systemProperty("tests.version.local_cluster", currentVersion)
  maxParallelForks = 1
  testClassesDirs = sourceSets.csvSpecTest.output.classesDirs
  classpath = sourceSets.csvSpecTest.runtimeClasspath
  dependsOn generateEsqlSpecTests
}

tasks.named("bwcTest").configure {
  if (project.bwc_tests_enabled) {
    dependsOn currentToCurrent
  }
}

def supportedVersion = bwcVersion -> {
  // CCS in ES|QL available in 8.13
  return bwcVersion.onOrAfter(Version.fromString("8.13.0")) && bwcVersion != currentVersion
}

buildParams.bwcVersions.withWireCompatible(supportedVersion) { bwcVersion, baseName ->
  def newToOld = tasks.register("${baseName}#newToOld", StandaloneRestIntegTestTask) {
    usesBwcDistribution(bwcVersion)
    systemProperty("tests.version.remote_cluster", bwcVersion)
    systemProperty("tests.version.local_cluster", currentVersion)
    maxParallelForks = 1
  }

  def oldToNew = tasks.register("${baseName}#oldToNew", StandaloneRestIntegTestTask) {
    usesBwcDistribution(bwcVersion)
    systemProperty("tests.version.local_cluster", bwcVersion)
    systemProperty("tests.version.remote_cluster", currentVersion)
    maxParallelForks = 1
  }

  def csvSpecTestsNewToOld = tasks.register("v${bwcVersion}#csvSpecTests#newToOld", StandaloneRestIntegTestTask) {
    usesBwcDistribution(bwcVersion)
    systemProperty("tests.version.remote_cluster", bwcVersion)
    systemProperty("tests.version.local_cluster", currentVersion)
    maxParallelForks = 1
    testClassesDirs = sourceSets.csvSpecTest.output.classesDirs
    classpath = sourceSets.csvSpecTest.runtimeClasspath
    dependsOn generateEsqlSpecTests
  }

  def csvSpecTestsOldToNew = tasks.register("v${bwcVersion}#csvSpecTests#oldToNew", StandaloneRestIntegTestTask) {
    usesBwcDistribution(bwcVersion)
    systemProperty("tests.version.local_cluster", bwcVersion)
    systemProperty("tests.version.remote_cluster", currentVersion)
    maxParallelForks = 1
    testClassesDirs = sourceSets.csvSpecTest.output.classesDirs
    classpath = sourceSets.csvSpecTest.runtimeClasspath
    dependsOn generateEsqlSpecTests
  }

  // One csvSpecTests per version; both cross-cluster directions run under it.
  def csvSpecTests = tasks.register("v${bwcVersion}#csvSpecTests") {
    dependsOn csvSpecTestsNewToOld, csvSpecTestsOldToNew
  }

  tasks.register(bwcTaskName(bwcVersion)) {
    dependsOn tasks.named("${baseName}#oldToNew")
    dependsOn tasks.named("${baseName}#newToOld")
    dependsOn csvSpecTests
  }
}

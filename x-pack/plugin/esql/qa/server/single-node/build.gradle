import org.elasticsearch.gradle.testclusters.StandaloneRestIntegTestTask

apply plugin: 'java'
apply plugin: 'elasticsearch.internal-java-rest-test'
apply plugin: 'elasticsearch.internal-yaml-rest-test'
// Necessary to use tests in Serverless
apply plugin: 'elasticsearch.internal-test-artifact'
apply plugin: org.elasticsearch.gradle.internal.precommit.CheckstylePrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.ForbiddenApisPrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.ForbiddenPatternsPrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.FilePermissionsPrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.LoggerUsagePrecommitPlugin
apply plugin: org.elasticsearch.gradle.internal.precommit.TestingConventionsPrecommitPlugin

dependencies {
  javaRestTestImplementation project(xpackModule('esql:qa:testFixtures'))
  javaRestTestImplementation project(xpackModule('esql:qa:server'))
  javaRestTestImplementation project(xpackModule('esql:tools'))
  javaRestTestImplementation project(xpackModule('esql'))
  yamlRestTestImplementation project(xpackModule('esql:qa:server'))

  javaRestTestImplementation project(':libs:arrow')

  clusterPlugins project(':plugins:mapper-size')
  clusterPlugins project(':plugins:mapper-murmur3')
  clusterPlugins project(':x-pack:plugin:inference:qa:test-service-plugin')
  clusterPlugins project(xpackModule('esql-datasource-csv'))
  clusterPlugins project(xpackModule('esql-datasource-ndjson'))
  clusterPlugins project(xpackModule('esql-datasource-http'))
}

restResources {
  restApi {
    include '_common', 'bulk', 'get', 'indices', 'esql', 'xpack', 'enrich', 'cluster', 'capabilities', 'index', 'search'
  }
  restTests {
    includeXpack 'esql'
  }
}

tasks.named('javaRestTest') {
  usesDefaultDistribution("to be triaged")
  maxParallelForks = 1
  jvmArgs('--add-opens=java.base/java.nio=ALL-UNNAMED')
}

// Second rest-test variant: runs EsqlSpecIT against a cluster with xpack security enabled and
// the REST client authenticated as a superuser. The cluster reads the tests.cluster.security.enabled
// system property (see Clusters.java); ESRestTestCase.restClientSettings() reads the two auth
// system properties. No test classes are modified.
tasks.register('javaRestTestSecure', StandaloneRestIntegTestTask) {
  usesDefaultDistribution("to be triaged")
  maxParallelForks = 1
  jvmArgs('--add-opens=java.base/java.nio=ALL-UNNAMED')
  testClassesDirs = sourceSets.javaRestTest.output.classesDirs
  classpath = sourceSets.javaRestTest.runtimeClasspath
  filter {
    // We can expand this task to support more test classes by removing this filter
    includeTestsMatching 'org.elasticsearch.xpack.esql.qa.single_node.EsqlSpecIT'
  }
  systemProperty 'tests.cluster.security.enabled', 'true'
  systemProperty 'tests.rest.cluster.username', 'test-admin'
  systemProperty 'tests.rest.cluster.password', 'x-pack-test-password'
}

tasks.named('yamlRestTest') {
  usesDefaultDistribution("to be triaged")
  maxParallelForks = 1
}


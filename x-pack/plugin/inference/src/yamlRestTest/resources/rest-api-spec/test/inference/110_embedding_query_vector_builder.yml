---
"inference service uses incorrect task type":
  - do:
      catch: bad_request
      search:
        index: test-embedding-index
        body:
          query:
            knn:
              field: embedding
              k: 10
              num_candidates: 100
              query_vector_builder:
                embedding:
                  inference_id: text-embedding-inference-id
                  input: "test query"

  - match: { error.type: "status_exception" }
  - match: { error.reason: "Incompatible task_type for embedding API, the inference endpoint
                            [text-embedding-inference-id] has task type [text_embedding], expected [embedding]" }

  - do:
      catch: bad_request
      search:
        index: test-embedding-index
        body:
          retriever:
            knn:
              field: embedding
              k: 10
              num_candidates: 100
              query_vector_builder:

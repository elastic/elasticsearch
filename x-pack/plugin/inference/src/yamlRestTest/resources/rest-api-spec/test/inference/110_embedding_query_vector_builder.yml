              query_vector_builder:
                embedding:
                  input: "test query"

  - match: { error.type: "illegal_argument_exception" }
  - match: { error.reason: "[inference_id] must be specified" }

  - do:
      catch: bad_request
      search:
        index: test-embedding-index
        body:
          retriever:
            knn:
              field: embedding
              k: 10
              num_candidates: 100
              query_vector_builder:
                embedding:
                  input: "test query"

  - match: { error.type: "illegal_argument_exception" }
  - match: { error.reason: "[inference_id] must be specified" }

  - do:
      catch: bad_request
      search:
        index: test-embedding-index
        body:
          query:
            knn:
              field: embedding
              k: 10
              num_candidates: 100
              query_vector_builder:
                embedding:
                  inference_id: embedding-inference-id

  - match: { error.caused_by.caused_by.type: "illegal_argument_exception" }
  - match: { error.caused_by.caused_by.reason: "Required [input]" }

  - do:
      catch: bad_request
      search:
        index: test-embedding-index
        body:
          retriever:
            knn:
              field: embedding
              k: 10
              num_candidates: 100
              query_vector_builder:
                embedding:

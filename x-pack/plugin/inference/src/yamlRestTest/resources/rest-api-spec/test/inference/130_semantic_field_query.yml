setup:
  - requires:
      cluster_features: "semantic_field.semantic_field_mapper"
      reason: "semantic field needs to be available"

  - do:
      inference.put:
        task_type: embedding
        inference_id: embedding-inference-id
        body: >
          {
            "service": "text_embedding_test_service",
            "service_settings": {
              "model": "my_model",
              "dimensions": 4,
              "similarity": "cosine",
              "api_key": "abc64"
            },
            "task_settings": {
            }
          }

  - do:
      inference.put:
        task_type: embedding
        inference_id: byte-embedding-inference-id
        body: >
          {
            "service": "text_embedding_test_service",
            "service_settings": {
              "model": "my_model",
              "dimensions": 10,
              "api_key": "abc64",
              "similarity": "COSINE",
              "element_type": "byte"
            },
            "task_settings": {
            }
          }

  - do:
      indices.create:
        index: test-semantic-field-index
        body:
          mappings:
            properties:
              my_field:
                type: semantic
                inference_id: embedding-inference-id

---
"KNN search on semantic field":
  - skip:
      features: [ "headers", "close_to" ]

  - do:
      index:
        index: test-semantic-field-index
        id: "1"
        body:
          my_field: "the quick brown fox"
        refresh: true

  - do:
      headers:
        # Force JSON content type so that we use a parser that interprets the floating-point score as a double
        Content-Type: application/json
      search:
        index: test-semantic-field-index
        body:
          query:
            knn:
              field: my_field
              k: 1
              num_candidates: 10
              query_vector_builder:
                embedding:
                  inference_id: embedding-inference-id
                  input: "the quick brown fox"

  - match: { hits.total.value: 1 }
  - match: { hits.hits.0._id: "1" }
  - close_to: { hits.hits.0._score: { value: 1.0, error: 0.0001 } }

---
"Match query on semantic field with image content":

  - do:
      index:
        index: test-semantic-field-index
        id: "img_1"
        body:
          my_field:
            type: image
            value: "data:image/jpeg;base64,Y2F0IG9uIGEgd2luZG93c2lsbA=="
        refresh: true

  - do:
      index:
        index: test-semantic-field-index
        id: "img_2"
        body:
          my_field:
            type: image
            value: "data:image/jpeg;base64,ZG9nIHJ1bm5pbmcgaW4gYSBwYXJr"
        refresh: true

  - do:
      search:
        index: test-semantic-field-index
        body:
          query:
            match:
              my_field:
                query: "cat on a windowsill"

  - match: { hits.total.value: 2 }

---
"Semantic query on semantic field":
  - skip:
      features: [ "headers", "close_to" ]

  - do:
      index:
        index: test-semantic-field-index
        id: "1"
        body:
          my_field: "the quick brown fox"
        refresh: true

  - do:
      index:
        index: test-semantic-field-index
        id: "2"
        body:
          my_field: "the slow green turtle"
        refresh: true

  - do:
      headers:
        # Force JSON content type so that we use a parser that interprets the floating-point score as a double
        Content-Type: application/json
      search:
        index: test-semantic-field-index
        body:
          query:
            semantic:
              field: my_field
              query: "the quick brown fox"

  - match: { hits.total.value: 2 }
  - match: { hits.hits.0._id: "1" }
  - close_to: { hits.hits.0._score: { value: 1.0, error: 0.0001 } }

---
"Match query on semantic field using a byte embedding model":
  - skip:
      features: [ "headers", "close_to" ]

  - do:
      indices.create:
        index: test-semantic-field-byte-index
        body:
          mappings:
            properties:
              my_field:
                type: semantic
                inference_id: byte-embedding-inference-id

  - do:
      index:
        index: test-semantic-field-byte-index
        id: "1"
        body:
          my_field: "the quick brown fox"
        refresh: true

  - do:
      headers:
        # Force JSON content type so that we use a parser that interprets the floating-point score as a double
        Content-Type: application/json
      search:
        index: test-semantic-field-byte-index
        body:
          query:
            match:
              my_field:
                query: "the quick brown fox"

  - match: { hits.total.value: 1 }
  - match: { hits.hits.0._id: "1" }
  - close_to: { hits.hits.0._score: { value: 1.0, error: 0.0001 } }

setup:
  - requires:
      cluster_features: "semantic_field.semantic_field_mapper"
      reason: "semantic field needs to be available"

  - do:
      inference.put:
        task_type: embedding
        inference_id: embedding-inference-id
        body: >
          {
            "service": "text_embedding_test_service",
            "service_settings": {
              "model": "my_model",
              "dimensions": 4,
              "similarity": "cosine",
              "api_key": "abc64"
            },
            "task_settings": {
            }
          }

  - do:
      indices.create:
        index: test-semantic-field-highlight-index
        body:
          mappings:
            properties:
              semantic_field:
                type: semantic
                inference_id: embedding-inference-id

---
"Highlighting image values":
  - do:
      index:
        index: test-semantic-field-highlight-index
        id: doc_1
        body:
          semantic_field:
            - type: image
              value: "data:image/jpeg;base64,Y2F0IG9uIGEgd2luZG93c2lsbA=="
            - type: image
              value: "data:image/jpeg;base64,ZG9nIHJ1bm5pbmcgaW4gYSBwYXJr"
        refresh: true

  - do:
      search:
        index: test-semantic-field-highlight-index
        body:
          query:
            match_all: { }
          highlight:
            fields:
              semantic_field:
                type: "semantic"
                number_of_fragments: 2

  - match: { hits.total.value: 1 }
  - match: { hits.hits.0._id: "doc_1" }
  - length: { hits.hits.0.highlight.semantic_field: 2 }
  - match: { hits.hits.0.highlight.semantic_field.0: "data:image/jpeg;base64,Y2F0IG9uIGEgd2luZG93c2lsbA==" }
  - match: { hits.hits.0.highlight.semantic_field.1: "data:image/jpeg;base64,ZG9nIHJ1bm5pbmcgaW4gYSBwYXJr" }

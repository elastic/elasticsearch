---
teardown:
  - do:
      indices.delete_data_stream:
        name: logs-fs-test
        ignore: 404

  - do:
      indices.delete_index_template:
        name: my-template
        ignore: 404

  - do:
      indices.delete_data_stream:
        name: logs-db-test
        ignore: 404
  - do:
      indices.delete_index_template:
        name: my-template2
        ignore: 404

---
Test failure store with logsdb:
  - requires:
      test_runner_features: [ capabilities, allowed_warnings ]
      capabilities:
        - method: PUT
          path: /{index}
          capabilities: [ logsdb_index_mode ]
        - method: POST
          path: /_bulk
          capabilities: [ 'failure_store_status' ]
        - method: PUT
          path: /_bulk
          capabilities: [ 'failure_store_status' ]
        - method: POST
          path: /_index_template/{template}
          capabilities: [ 'data_stream_options.failure_store' ]
      reason: "Support for 'logsdb' index mode & failure status config in templates"

  - do:
      allowed_warnings:
        - "index template [my-template] has index patterns [logs-fs-*] matching patterns from existing older templates [global] with patterns (global => [*]); this template [my-template] will take precedence during new index creation"
      indices.put_index_template:
        name: my-template
        body:
          index_patterns: ["logs-fs-*"]
          priority: 1000
          data_stream: {}
          template:
            settings:
              index:
                mode: logsdb
                number_of_replicas: 1
                number_of_shards: 2
            data_stream_options:
              failure_store:
                enabled: true
  - do:
      allowed_warnings:
        - "index template [my-template2] has index patterns [logs-db-*] matching patterns from existing older templates [global] with patterns (global => [*]); this template [my-template2] will take precedence during new index creation"
      indices.put_index_template:
        name: my-template2
        body:
          index_patterns: [ "logs-db-*" ]
          priority: 1000
          data_stream: {}
          template:
            settings:
              index:
                mode: logsdb
                number_of_replicas: 1
                number_of_shards: 2

  - do:
      bulk:
        refresh: true
        body:
          - '{ "create": { "_index": "logs-fs-test"} }'
          - '{"@timestamp":"2019-08-06T12:09:12.375Z", "log.level": "INFO", "message":"Tomcat started on port(s): 8080 (http) with context path ''", "service.name":"spring-petclinic","process.thread.name":"restartedMain","log.logger":"org.springframework.boot.web.embedded.tomcat.TomcatWebServer"}'
          - '{ "create": { "_index": "logs-db-test"} }'
          - '{ "@timestamp": "2022-01-01", "log.level": "INFO", "message":"Tomcat started on port(s): 8080 (http) with context path ''", "service.name":"spring-petclinic","process.thread.name":"restartedMain","log.logger":"org.springframework.boot.web.embedded.tomcat.TomcatWebServer" }'
          - '{ "create": { "_index": "logs-fs-test"} }'
          - '{"log.level": "INFO", "message":"Tomcat started on port(s): 8080 (http) with context path ''", "service.name":"spring-petclinic","process.thread.name":"restartedMain","log.logger":"org.springframework.boot.web.embedded.tomcat.TomcatWebServer"}'
          - '{ "create": { "_index": "logs-db-test"} }'
          - '{"log.level": "INFO", "message":"Tomcat started on port(s): 8080 (http) with context path ''", "service.name":"spring-petclinic","process.thread.name":"restartedMain","log.logger":"org.springframework.boot.web.embedded.tomcat.TomcatWebServer"}'
  - is_true: errors

  # Successfully indexed to backing index
  - match: { items.0.create._index: '/\.ds-logs-fs-test-(\d{4}\.\d{2}\.\d{2}-)?000001/' }
  - match: { items.0.create.status: 201 }
  - is_false: items.0.create.failure_store
  - match: { items.1.create._index: '/\.ds-logs-db-test-(\d{4}\.\d{2}\.\d{2}-)?000001/' }
  - match: { items.1.create.status: 201 }
  - is_false: items.1.create.failure_store

  # Successfully indexed to failure store
  - match: { items.2.create._index: '/\.fs-logs-fs-test-(\d{4}\.\d{2}\.\d{2}-)?000002/' }
  - match: { items.2.create.status: 201 }
  - match: { items.2.create.failure_store: used }

  # Rejected, eligible to go to failure store, but failure store not enabled
  - match: { items.3.create._index: '/\.ds-logs-db-test-(\d{4}\.\d{2}\.\d{2}-)?000001/' }
  - match: { items.3.create.status: 400 }
  - match: { items.3.create.error.type: document_parsing_exception }
  - match: { items.3.create.failure_store: not_enabled }

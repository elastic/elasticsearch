          index_patterns: [ logs-cl-http-prod ]
          priority: 10000
          template:
            settings:
              index:
                sort.field: [ agent.id ]
                sort.order: [ desc ]
                mode: logsdb_columnar
            mappings:
              properties:
                agent.id:
                  type: keyword
                host.hostname:
                  type: keyword
          data_stream: { }
      allowed_warnings:
        - "index template [cl-logs-template] has index patterns [logs-cl-http-prod] matching patterns from existing older templates [global] with patterns (global => [*]); this template [cl-logs-template] will take precedence during new index creation"

  - do:
      indices.create_data_stream:
        name: logs-cl-http-prod
  - is_true: acknowledged

  - do:
      indices.get_data_stream:
        name: logs-cl-http-prod

  - set: { data_streams.0.indices.0.index_name: backing_index }
  - do:
      indices.get_mapping:
        index: $backing_index

  - match: { .$backing_index.mappings.properties.@timestamp.type: date }
  - match: { .$backing_index.mappings.properties.agent\.id.type: keyword }
  - match: { .$backing_index.mappings.properties.host\.hostname.type: keyword }
  - match: { .$backing_index.mappings.properties.host\.name: null }


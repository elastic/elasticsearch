create logsdb_columnar data stream with host.name as alias and sorting on it:
  - do:
      indices.put_index_template:
        name: cl-logsdb-index-template-alias
        body:
          index_patterns: [ logs-cl-logsdb-alias ]
          priority: 1000
          template:
            settings:
              index:
                sort.field: [ host.name ]
                sort.order: [ desc ]
                mode: logsdb_columnar
            mappings:
              properties:
                host.name:
                  type: alias
                  path: host.hostname
                host.hostname:
                  type:
                    keyword
          data_stream: {}
  - do:
      catch: bad_request
      indices.create_data_stream:
        name: logs-cl-logsdb-alias

  - match: { error.type: "illegal_argument_exception" }
  - match: { error.reason: "Cannot use alias [host.name] as an index sort field" }


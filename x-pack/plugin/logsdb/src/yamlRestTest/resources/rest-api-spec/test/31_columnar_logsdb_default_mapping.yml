---
create logsdb_columnar data stream with timestamp mixed date_nanos and date fields:
  - do:
      cluster.put_component_template:
        name: "cl-logsdb-mappings"
        body:
          template:
            settings:
              mode: "logsdb_columnar"
            mappings:
              properties:
                host.name:
                  type: "keyword"
                "@timestamp":
                  type: "date"

  - do:
      indices.put_index_template:
        name: "cl-logsdb-index-template"
        body:
          index_patterns: ["logs-cl-logsdb-test"]
          priority: 1000
          data_stream: {}
          composed_of: ["cl-logsdb-mappings"]
      allowed_warnings:
        - "index template [cl-logsdb-index-template] has index patterns [logs-cl-logsdb-test] matching patterns from existing older templates [global] with patterns (global => [*]); this template [cl-logsdb-index-template] will take precedence during new index creation"

  - do:
      indices.create_data_stream:
        name: "logs-cl-logsdb-test"

  - is_true: acknowledged
  - do:
      bulk:
        index: logs-cl-logsdb-test
        refresh: true
        body:
          - create: {}
          - "@timestamp": 2025-09-09T14:00:00Z
            host.name: localhost
  - is_false: errors

  - do:
      cluster.put_component_template:
        name: "cl-logsdb-mappings"
        body:
          template:
            settings:
              mode: "logsdb_columnar"
            mappings:
              properties:
                host.name:
                  type: "keyword"
                "@timestamp":
                  type: "date_nanos"
  - do:
      indices.rollover:
        alias: logs-cl-logsdb-test
        wait_for_active_shards: 1
  - match: { rolled_over: true }
  - do:
      bulk:
        index: logs-cl-logsdb-test
        refresh: true
        body:
          - create: {}
          - "@timestamp": 2025-09-09T14:00:01Z
            host.name: localhost
  - is_false: errors
  - do:
      search:
        index: logs-cl-logsdb-test
        body:
          query:
            range:
              "@timestamp":
                gte: "2025-09-09"
          aggs:
            timestamp_histo:
              date_histogram:
                field: "@timestamp"
                calendar_interval: "day"
  - length: { hits.hits: 2 }
  - length: { aggregations.timestamp_histo.buckets: 1 }
  - match: { aggregations.timestamp_histo.buckets.0.key_as_string: "2025-09-09T00:00:00.000Z" }
  - do:
      esql.query:
        body:
          query: 'FROM logs-cl-logsdb-test | WHERE @timestamp >= "2025-09-09" | STATS min = min(@timestamp) BY day = BUCKET(@timestamp, 1 day) | LIMIT 10'
  - match: { columns.0.name: "min" }
  - match: { columns.0.type: "date_nanos" }
  - match: { columns.1.name: "day" }
  - match: { columns.1.type: "date_nanos" }
  - length: { values: 1 }
  - match: { values.0: [ "2025-09-09T14:00:00.000Z", "2025-09-09T00:00:00.000Z" ] }

---
rollover logsdb_columnar data stream with host as keyword:
  - do:
      indices.put_index_template:
        name: "logs-cl-example-template"
        body:
          "index_patterns": [ "logs-cl-example-*" ]
          "template":
            "settings":
              "mode": "logsdb_columnar"
            "mappings":
              "properties":
                "host":
                  "type": "text"
                "@timestamp":
                  "type": "date"
          "composed_of": []
          "priority": 500
          "data_stream": {}
      allowed_warnings:
        - "index template [logs-cl-example-template] has index patterns [logs-cl-example-*] matching patterns from existing older templates [global] with patterns (global => [*]); this template [logs-cl-example-template] will take precedence during new index creation"

  - do:
      index:
        index: "logs-cl-example-test"
        body:
          "@timestamp": "2025-01-01T00:00:00.000Z"
          "host": "test-host"

  - do:
      indices.rollover:
        alias: "logs-cl-example-test"
  - match: { rolled_over: true }

  - do:
      indices.get_data_stream:
        name: "logs-cl-example-test"
        expand_wildcards: hidden
  - length: { data_streams: 1 }
  - set: { data_streams.0.indices.0.index_name: backing_index_0 }
  - set: { data_streams.0.indices.1.index_name: backing_index_1 }

  - do:
      indices.get_settings:
        index: $backing_index_0
  - is_true: .$backing_index_0.settings.index.logsdb.add_host_name_field

  - do:
      indices.get_mapping:
        index: $backing_index_0
  - match: { .$backing_index_0.mappings.properties.host.properties: null }

  - do:
      indices.get_settings:
        index: $backing_index_1
  - is_true: .$backing_index_1.settings.index.logsdb.add_host_name_field

  - do:
      indices.get_mapping:
        index: $backing_index_1
  - match: { .$backing_index_1.mappings.properties.host.properties: null }

---
"Columnar index rejects dynamic runtime at root":
  - requires:
      cluster_features: ["mapper.columnar_rejects_runtime_dynamic"]
      reason: "strict columnar modes reject dynamic:runtime only from this version"
  - do:
      catch: bad_request
      indices.create:
        index: test_columnar_dynamic_runtime
        body:
          settings:
            index.mode: columnar
          mappings:
            dynamic: runtime

  - match: { error.type: "mapper_parsing_exception" }
  - match: { error.reason: "Failed to parse mapping: dynamic [runtime] is not supported in strict columnar mode" }

---
"Logsdb columnar index rejects dynamic runtime at root":
  - requires:
      cluster_features: ["mapper.columnar_rejects_runtime_dynamic"]
      reason: "strict columnar modes reject dynamic:runtime only from this version"
  - do:
      catch: bad_request
      indices.create:
        index: test_logsdb_columnar_dynamic_runtime
        body:
          settings:
            index.mode: logsdb_columnar
          mappings:
            dynamic: runtime

  - match: { error.type: "mapper_parsing_exception" }
  - match: { error.reason: "Failed to parse mapping: dynamic [runtime] is not supported in strict columnar mode" }

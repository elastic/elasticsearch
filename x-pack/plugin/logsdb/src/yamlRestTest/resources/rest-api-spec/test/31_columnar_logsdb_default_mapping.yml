---
create logsdb_columnar data stream with host.name field without doc values is rejected:
  # In columnar modes _source is rebuilt from doc-value columns, so a field that cannot be reconstructed from doc values
  # (here doc_values:false) is rejected at mapping validation rather than producing a lossy field.
  - do:
      catch: bad_request
      indices.put_index_template:
        name: cl-logs-template
        body:
          index_patterns: [ logs-cl-http-dev ]
          priority: 10000
          template:
            settings:
              index:
                sort.field: [ "host.name", "@timestamp" ]
                sort.order: [ desc, desc ]
                mode: logsdb_columnar
            mappings:
              properties:
                host:
                  type: object
                  properties:
                    name:
                      type: keyword
                      doc_values: false

          data_stream: { }

  - match: { error.type: "illegal_argument_exception" }
  - match: { error.reason: "composable template [cl-logs-template] template after composition is invalid" }
  # Assert the underlying cause, not just the composable-template wrapper.
  - match:
      error.caused_by.caused_by.reason: "field [host.name] cannot reconstruct _source from doc values; every field must be reconstructable from doc values in index using [logsdb_columnar] index mode"

---
create logsdb_columnar data stream with incompatible ignore_above on host.name:
  - do:
      indices.put_index_template:
        name: cl-logsdb-index-template-ignore-above
        body:
          index_patterns: [ logs-cl-logsdb-ignore-above ]
          priority: 10000
          template:
            settings:
              index:
                sort.field: [ host.name ]
                sort.order: [ desc ]
                mode: logsdb_columnar
            mappings:
              properties:
                host.name:
                  type: keyword
                  ignore_above: 128
          data_stream: {}
      allowed_warnings:
        - "index template [cl-logsdb-index-template-ignore-above] has index patterns [logs-cl-logsdb-ignore-above] matching patterns from existing older templates [global] with patterns (global => [*]); this template [cl-logsdb-index-template-ignore-above] will take precedence during new index creation"
  - is_true: acknowledged

  - do:
      indices.create_data_stream:
        name: logs-cl-logsdb-ignore-above
  - is_true: acknowledged

  - do:
      indices.get_data_stream:
        name: logs-cl-logsdb-ignore-above

  - set: { data_streams.0.indices.0.index_name: backing_index }
  - do:
      indices.get_mapping:
        index: $backing_index

  - match: { .$backing_index.mappings.properties.@timestamp.type: date }
  - match: { .$backing_index.mappings.properties.host\.name.type: keyword }
  - match: { .$backing_index.mappings.properties.host\.name.ignore_above: 128 }


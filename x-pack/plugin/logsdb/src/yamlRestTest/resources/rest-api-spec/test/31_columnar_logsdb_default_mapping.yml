      indices.create_data_stream:
        name: "logs-cl-logsdb-test"

  - is_true: acknowledged

---
create logsdb_columnar data stream with host.name as integer and timestamp as date:
  - do:
      cluster.put_component_template:
        name: "cl-logsdb-mappings"
        body:
          template:
            settings:
              mode: "logsdb_columnar"
            mappings:
              properties:
                host.name:
                  type: "integer"
                "@timestamp":
                  type: "date"

  - do:
      indices.put_index_template:
        name: "cl-logsdb-index-template"
        body:
          index_patterns: ["logs-cl-logsdb-test"]
          priority: 1000
          data_stream: {}
          composed_of: ["cl-logsdb-mappings"]
      allowed_warnings:
        - "index template [cl-logsdb-index-template] has index patterns [logs-cl-logsdb-test] matching patterns from existing older templates [global] with patterns (global => [*]); this template [cl-logsdb-index-template] will take precedence during new index creation"

  - do:
      indices.create_data_stream:
        name: "logs-cl-logsdb-test"
  - is_true: acknowledged

  - do:
      indices.get_data_stream:
        name: "logs-cl-logsdb-test"
        expand_wildcards: hidden
  - length: { data_streams: 1 }
  - set: { data_streams.0.indices.0.index_name: backing_index }

  - do:
      indices.get_settings:
        index: $backing_index
  - match: { .$backing_index.settings.index.mode: '/^logsdb(_columnar)?$/' }
  - is_false: .$backing_index.settings.index.logsdb.add_host_name_field
  - match: { .$backing_index.settings.index.logsdb.sort_on_host_name: "true" }


---
setup:
  - requires:
      test_runner_features: [ capabilities, allowed_warnings ]
      capabilities:
        - method: PUT
          path: /{index}
          capabilities: [ columnar_index_modes ]
      reason: "Support for columnar index modes required"

---
"passthrough aliases resolve at root level in columnar logsdb mode":
  - do:
      cluster.put_component_template:
        name: "cl-passthrough-mappings"
        body:
          template:
            settings:
              mode: "logsdb_columnar"
            mappings:
              properties:
                attributes:
                  type: passthrough
                  priority: 1
                  dynamic: true
                  properties:
                    env:
                      type: keyword
                    service:
                      type: keyword

  - do:
      indices.put_index_template:
        name: "cl-passthrough-index-template"
        body:
          index_patterns: ["logs-cl-passthrough-test"]
          priority: 1000
          data_stream: {}
          composed_of: ["cl-passthrough-mappings"]
      allowed_warnings:
        - "index template [cl-passthrough-index-template] has index patterns [logs-cl-passthrough-test] matching patterns from existing older templates [global] with patterns (global => [*]); this template [cl-passthrough-index-template] will take precedence during new index creation"

  - do:
      indices.create_data_stream:
        name: "logs-cl-passthrough-test"

  - is_true: acknowledged

  # Index a document with passthrough-prefixed fields
  - do:
      index:
        index: "logs-cl-passthrough-test"
        refresh: true
        body:
          "@timestamp": "2024-01-01T00:00:00Z"
          "attributes.env": "prod"
          "attributes.service": "web"

  # Root-level alias "env" must resolve to the same field type as "attributes.env"
  - do:
      search:
        index: "logs-cl-passthrough-test"
        body:
          query:
            term:
              env: "prod"
  - match: { hits.total.value: 1 }

  # Root-level alias "service" must also resolve
  - do:
      search:
        index: "logs-cl-passthrough-test"
        body:
          query:
            term:
              service: "web"
  - match: { hits.total.value: 1 }

  # The stored mapping must contain prefix_properties.passthrough
  - do:
      indices.get_data_stream:
        name: "logs-cl-passthrough-test"
  - set: { data_streams.0.indices.0.index_name: backing_index }

  - do:
      indices.get_mapping:
        index: $backing_index

  - match: { .$backing_index.mappings.properties.@timestamp.type: date }
  - match: { .$backing_index.mappings.prefix_properties.passthrough.attributes: 1 }

---
"higher-priority passthrough wins alias conflict in columnar logsdb mode":
  - do:
      cluster.put_component_template:
        name: "cl-passthrough-priority-mappings"
        body:
          template:
            settings:
              mode: "logsdb_columnar"
            mappings:
              properties:
                attributes:
                  type: passthrough
                  priority: 1
                  dynamic: true
                  properties:
                    region:
                      type: keyword
                resource:
                  type: passthrough
                  priority: 2
                  dynamic: true
                  properties:
                    region:
                      type: keyword

  - do:
      indices.put_index_template:
        name: "cl-passthrough-priority-index-template"
        body:
          index_patterns: ["logs-cl-passthrough-priority-test"]
          priority: 1000
          data_stream: {}
          composed_of: ["cl-passthrough-priority-mappings"]
      allowed_warnings:
        - "index template [cl-passthrough-priority-index-template] has index patterns [logs-cl-passthrough-priority-test] matching patterns from existing older templates [global] with patterns (global => [*]); this template [cl-passthrough-priority-index-template] will take precedence during new index creation"

  - do:
      indices.create_data_stream:
        name: "logs-cl-passthrough-priority-test"

  - is_true: acknowledged

  - do:
      index:
        index: "logs-cl-passthrough-priority-test"
        refresh: true
        body:
          "@timestamp": "2024-01-01T00:00:00Z"
          "attributes.region": "us-east"
          "resource.region": "eu-west"

  # Root alias "region" must resolve to resource.region (priority 2 > 1)
  - do:
      search:
        index: "logs-cl-passthrough-priority-test"
        body:
          query:
            term:
              region: "eu-west"
  - match: { hits.total.value: 1 }

  # "attributes.region" must still be directly queryable
  - do:
      search:
        index: "logs-cl-passthrough-priority-test"
        body:
          query:
            term:
              attributes.region: "us-east"
  - match: { hits.total.value: 1 }

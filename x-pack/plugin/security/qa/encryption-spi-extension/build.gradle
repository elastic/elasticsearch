apply plugin: 'elasticsearch.base-internal-es-plugin'
apply plugin: 'elasticsearch.internal-java-rest-test'

esplugin {
  name = 'test-encryption-spi-extension'
  description = 'A test plugin that contributes an EncryptedDataHandlerProvider via the security encryption SPI'
  classname = 'org.elasticsearch.xpack.security.encryption.spi.test.TestEncryptionSpiPlugin'
  extendedPlugins = ['x-pack-core', 'x-pack-security']
}

dependencies {
  compileOnly project(':x-pack:plugin:security:spi-encryption')
  clusterPlugins project(':x-pack:plugin:security:qa:encryption-spi-extension')

  javaRestTestImplementation project(':x-pack:plugin:core')
  javaRestTestImplementation project(':test:framework')
}

tasks.named("javaRestTest").configure {
  usesDefaultDistribution("security features require default distribution")
}

tasks.named("javadoc").configure { enabled = false }

import org.elasticsearch.gradle.testclusters.StandaloneRestIntegTestTask

apply plugin: 'elasticsearch.internal-java-rest-test'
apply plugin: 'elasticsearch.rest-resources'
apply plugin: 'elasticsearch.bwc-test'
apply plugin: 'elasticsearch.bc-upgrade-test'

dependencies {
  javaRestTestImplementation project(':x-pack:plugin:core')
  javaRestTestImplementation project(':x-pack:plugin:security')
  javaRestTestImplementation project(':x-pack:plugin:ccr')
  clusterModules(project(":modules:analysis-common"))
  clusterModules project(':x-pack:plugin:ccr')
  clusterModules(project(":modules:reindex")) // need for deleting transform jobs
  clusterModules(project(":x-pack:plugin:transform"))
  // esql with enrich
  clusterModules project(':x-pack:plugin:esql')
  clusterModules project(':x-pack:plugin:enrich')
  clusterModules project(':x-pack:plugin:autoscaling')
  clusterModules project(':x-pack:plugin:ml')
  clusterModules project(xpackModule('ilm'))
  clusterModules(project(":modules:ingest-common"))
  // dependencies for inference tests
  clusterModules project(':x-pack:plugin:ilm')
  clusterModules project(':x-pack:plugin:ml')
  clusterModules project(':x-pack:plugin:inference')
  clusterPlugins project(':x-pack:plugin:inference:qa:test-service-plugin')
  // exposes /_flush_telemetry for RemoteClusterSecurityWithApmTracingRestIT
  clusterModules project(':test:external-modules:test-apm-integration')
}

// Tests that consume a BWC distribution. Run only in BWC-aware tasks; excluded from regular javaRestTest.
def bwcAwareTests = [
  '**/RemoteClusterSecurityBWCToRCS1ClusterRestIT.class',
  '**/RemoteClusterSecurityBWCToRCS2ClusterRestIT.class'
]

tasks.named("javaRestTest") {
  enabled = true
  bwcAwareTests.each { exclude it }
}

tasks.named("bcUpgradeTest") {
  // Other tests in this module build their own current-version clusters and would just rerun
  // javaRestTest under bcUpgradeTest, doubling the failure surface for no extra coverage.
  bwcAwareTests.each { include it }
}

buildParams.bwcVersions.withWireCompatible() { bwcVersion, baseName ->
  tasks.register(bwcTaskName(bwcVersion), StandaloneRestIntegTestTask) {
    usesBwcDistribution(bwcVersion)
    systemProperty("tests.old_cluster_version", bwcVersion)
    bwcAwareTests.each { include it }
  }
}

apply plugin: 'elasticsearch.internal-yaml-rest-test'

dependencies {
  yamlRestTestImplementation project(':test:yaml-rest-runner')
  yamlRestTestImplementation(testArtifact(project(xpackModule('core'))))
}

restResources {
  restApi {
    include '*'
  }
}

artifacts {
  restXpackTests(new File(projectDir, "src/yamlRestTest/resources/rest-api-spec/test"))
}

tasks.named('yamlRestTest') {
  usesDefaultDistribution("security yaml rest tests require the default distribution")
  systemProperty 'es.queryable_built_in_roles_enabled', 'false'

  // TODO: These tests include new privileges only available under feature flags which
  // require snapshot builds. Re-enable in non-snapshot runs when the underlying features ship.
  if (buildParams.snapshotBuild == false) {
    systemProperty 'tests.rest.blacklist', 'privileges/11_builtin/Test get builtin privileges'
  }
}


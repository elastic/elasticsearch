---
setup:
  - requires:
      test_runner_features: [ capabilities, allowed_warnings_regex, contains ]
      capabilities:
        - method: POST
          path: /_query
          parameters: [ ]
          capabilities: [ optional_fields_v5 ]
      reason: "Loading a partially unmapped non-keyword field must fail when unmapped_fields=load"
  - do:
      indices.create:
        index: partial_load_yaml_1
        body:
          mappings:
            dynamic: false
            properties:
              partial_x:
                type: long
              tag:
                type: keyword
  - do:
      indices.create:
        index: partial_load_yaml_2
        body:
          mappings:
            dynamic: false
            properties:
              tag:
                type: keyword

---
"load rejects use of partially mapped non-KEYWORD field":
  - do:
      catch: bad_request
      allowed_warnings_regex:
        - "No limit defined, adding default limit of \\[.*\\]"
      esql.query:
        body:
          query: 'SET unmapped_fields="load"; FROM partial_load_yaml_* | WHERE partial_x > 0 | KEEP tag'
  - match: { status: 400 }
  - match: { error.type: verification_exception }
  - contains: { error.reason: 'Found 1 problem' }
  - contains: { error.reason: 'line 1:62: Cannot use field [partial_x] due to ambiguities being mapped as [2] incompatible types: [keyword] due to loading from _source, [long] in [partial_load_yaml_1]' }

---
"load allows query when partially mapped non-KEYWORD field is unused":
  - do:
      allowed_warnings_regex:
        - "No limit defined, adding default limit of \\[.*\\]"
      esql.query:
        body:
          query: 'SET unmapped_fields="load"; FROM partial_load_yaml_* | KEEP tag'
  - match: { columns.0.name: "tag" }
  - length: { values: 0 }

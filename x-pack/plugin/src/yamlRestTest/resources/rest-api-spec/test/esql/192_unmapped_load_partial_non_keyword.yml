---
setup:
  - requires:
      test_runner_features: [ capabilities, allowed_warnings_regex ]
      capabilities:
        - method: POST
          path: /_query
          parameters: [ ]
          capabilities: [ optional_fields_v2 ]
      reason: "SET unmapped_fields=load requires OPTIONAL_FIELDS_V2"
  - do:
      indices.create:
        index: partial_load_yaml_1
        body:
          mappings:
            dynamic: false
            properties:
              partial_x:
                type: long
              tag:
                type: keyword
  - do:
      indices.create:
        index: partial_load_yaml_2
        body:
          mappings:
            dynamic: false
            properties:
              tag:
                type: keyword

---
"load rejects use of partially mapped non-KEYWORD field":
  - do:
      catch: bad_request
      allowed_warnings_regex:
        - "No limit defined, adding default limit of \\[.*\\]"
      esql.query:
        body:
          query: 'SET unmapped_fields="load"; FROM partial_load_yaml_* | KEEP partial_x'

  - match: { status: 400 }
  - match: { error.type: verification_exception }
  - match:
      error.reason: "Found 1 problem\nline 1:56: Loading partially mapped non-KEYWORD fields is not yet supported. unmapped_fields=\"load\" is not supported when the query involves partially mapped fields that are not KEYWORD: partial_x. Use unmapped_fields=\"nullify\" or unmapped_fields=\"fail\", or ensure the field is mapped as KEYWORD in all indices."

---
"load allows query when partially mapped non-KEYWORD field is unused":
  - do:
      allowed_warnings_regex:
        - "No limit defined, adding default limit of \\[.*\\]"
      esql.query:
        body:
          query: 'SET unmapped_fields="load"; FROM partial_load_yaml_* | KEEP tag'

  - match: { columns.0.name: "tag" }
  - length: { values: 0 }

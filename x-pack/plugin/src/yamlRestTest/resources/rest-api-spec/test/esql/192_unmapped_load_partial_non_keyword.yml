---
setup:
  - requires:
      test_runner_features: [ capabilities, allowed_warnings_regex, contains ]
      capabilities:
        - method: POST
          path: /_query
          parameters: [ ]
          capabilities: [ optional_fields_v5 ]
      reason: 'When unmapped_fields="load", loading a partially unmapped non-keyword field must fail, unless used in KEEP, or DROP, or a conversion function that can convert all types it is mapped as to a common type'
  #
  # The table below represents the field mappings for the three indices created in this test.
  #
  # | Field      | index1  |   index2   | index3  |
  # |------------|---------|------------|---------|
  # | alpha      | long    | integer    | -       |
  # | lambda     | keyword | keyword    | -       |
  # | tau        | date    | date_nanos | -       |
  # | beta       | -       | double     | -       |
  # | gamma      | -       | -          | boolean |
  #
  - do:
      indices.create:
        index: index1
        body:
          mappings:
            dynamic: false
            properties:
              alpha:
                type: long
              lambda:
                type: keyword
              tau:
                type: date
  - do:
      indices.create:
        index: index2
        body:
          mappings:
            dynamic: false
            properties:
              alpha:
                type: integer
              lambda:
                type: keyword
              tau:
                type: date_nanos
              beta:
                type: double
  - do:
      indices.create:
        index: index3
        body:
          mappings:
            dynamic: false
            properties:
              gamma:
                type: boolean

---
"test 10":
  - do:
      allowed_warnings_regex:
        - "No limit defined, adding default limit of \\[.*\\]"
      esql.query:
        body:
          # [beta] is double in index2
          # [gamma] is boolean in index3
          # PUNKs should not be rejected in DROP
          query: 'SET unmapped_fields="load"; FROM index2,index3 | DROP beta, gamma'
  - length: { values: 0 }

---
"test 20":
  - do:
      allowed_warnings_regex:
        - "No limit defined, adding default limit of \\[.*\\]"
      esql.query:
        body:
          # [beta] is double in index2
          # [gamma] is boolean in index3
          # PUNKs should not be rejected in wildcard DROP
          query: 'SET unmapped_fields="load"; FROM index2,index3 | DROP bet*, gam*'


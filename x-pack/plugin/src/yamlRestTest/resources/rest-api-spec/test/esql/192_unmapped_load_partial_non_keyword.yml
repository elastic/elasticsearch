---
setup:
  - requires:
      test_runner_features: [ capabilities, allowed_warnings_regex, contains ]
      capabilities:
        - method: POST
          path: /_query
          parameters: [ ]
          capabilities: [ optional_fields_fix_load_partially_mapped ]
      reason: 'requires SET unmapped_fields="load" support for partially mapped non-keyword fields'
  #
  # The table below represents the field mappings for the three indices created in this test.
  # In `FROM index*`, all the fields except lambda are PUNKs: partially unmapped non-keyword fields.
  #
  # | Field      | index1  |   index2   | index3  |
  # |------------|---------|------------|---------|
  # | alpha      | long    | integer    | -       |
  # | lambda     | keyword | keyword    | -       |
  # | tau        | date    | date_nanos | -       |
  # | beta       | -       | double     | -       |
  # | a.b.c.d    | -       | -          | boolean |
  #
  - do:
      indices.create:
        index: index1
        body:
          mappings:
            dynamic: false
            properties:
              alpha:
                type: long
              lambda:
                type: keyword
              tau:
                type: date
  - do:
      indices.create:
        index: index2
        body:
          mappings:
            dynamic: false
            properties:
              alpha:
                type: integer
              lambda:
                type: keyword
              tau:
                type: date_nanos
              beta:
                type: double
  - do:
      indices.create:
        index: index3
        body:
          mappings:
            dynamic: false
            properties:
              a:
                properties:
                   b:
                     properties:
                       c:
                         properties:
                            d:
                              type: boolean
  - do:
      bulk:
        refresh: true
        body:
          - { "index": { "_index": "index2" } }
          - { "alpha": 7, "lambda": "l", "tau": "2026-04-07T00:00:00Z", "beta": 2.5 }
          - { "index": { "_index": "index3" } }
          - { "a": { "b": { "c": { "d": true } } } }

---
rename-punks:
  - requires:
      capabilities:
        - method: POST
          path: /_query
          parameters: [ ]
          capabilities: [ optional_fields_unmapped_load_auto_cast_two_legged_punks ]
      reason: "requires auto-casting of two-legged PUNKs"
  - do:
      allowed_warnings_regex:
        - "No limit defined, adding default limit of \\[.*\\]"
      esql.query:
        body:
          # [beta] is double in index2
          query: 'SET unmapped_fields="load"; FROM index1,index2,index3 | RENAME beta AS mu'
  # auto-cast of the two-legged PUNK into the mapped type
  - match: { columns.0.name: "a.b.c.d" }
  - match: { columns.0.type: "boolean" }
  # no auto-cast: three-legged PUNK with two mapped types (long and integer)
  - match: { columns.1.name: "alpha" }
  - match: { columns.1.type: "unsupported" }
  # auto-cast of the two-legged PUNK resolved to the mapped type
  - match: { columns.2.name: "mu" }
  - match: { columns.2.type: "double" }
  # same type everywhere
  - match: { columns.3.name: "lambda" }
  - match: { columns.3.type: "keyword" }
  # no auto-cast: three-legged PUNK with two mapped types (date and date_nanos).
  - match: { columns.4.name: "tau" }
  - match: { columns.4.type: "unsupported" }

---
date-nanos-punks:
  - do:
      catch: bad_request
      esql.query:
        body:
          # [tau] is date index1
          # [tau] is date_nanos index2
          # [tau] is unmapped in index3
          query: 'SET unmapped_fields="load"; FROM index* | WHERE tau > "2026-04-07"::date'
  - match: { status: 400 }
  - match: { error.type: verification_exception }
  - contains: { error.reason: 'Found 1 problem' }
  - contains: { error.reason: 'line 1:49: Cannot use field [tau] due to ambiguities being mapped as [3] incompatible types: [keyword] due to loading from _source, [date_nanos] in [index2], [datetime] in [index1]' }

---
date-nanos-punks-2:
  - do:
      catch: bad_request
      esql.query:
        body:
          # [tau] is date index1
          # [tau] is date_nanos index2
          # [tau] is unmapped in index3
          query: 'SET unmapped_fields="load"; FROM index* | WHERE tau > "2026-04-07"::date_nanos'
  - match: { status: 400 }
  - match: { error.type: verification_exception }
  - contains: { error.reason: 'Found 1 problem' }
  - contains: { error.reason: 'line 1:49: Cannot use field [tau] due to ambiguities being mapped as [3] incompatible types: [keyword] due to loading from _source, [date_nanos] in [index2], [datetime] in [index1]' }

---
sort-punks:
  - do:
      catch: bad_request
      esql.query:
        body:
          query: 'SET unmapped_fields="load"; FROM index1,index2 | SORT alpha DESC'
  - match: { status: 400 }
  - match: { error.type: verification_exception }
  - contains: { error.reason: 'Found 1 problem' }
  - contains: { error.reason: 'line 1:55: Cannot use field [alpha] due to ambiguities being mapped as [2] incompatible types: [integer] in [index2], [long] in [index1]' }

---
where-punks:
  - do:
      catch: bad_request
      esql.query:
        body:
          query: 'SET unmapped_fields="load"; FROM index1,index2 | WHERE alpha > 0'
  - match: { status: 400 }
  - match: { error.type: verification_exception }
  - contains: { error.reason: 'Found 1 problem' }
  - contains: { error.reason: 'line 1:56: Cannot use field [alpha] due to ambiguities being mapped as [2] incompatible types: [integer] in [index2], [long] in [index1]' }

---
where-punks-nullified-per-index:
  - requires:
      capabilities:
        - method: POST
          path: /_query
          parameters: [ ]
          capabilities: [ optional_fields_unmapped_load_null_fallback ]
      reason: 'requires null-fallback for single-type non-keyword PUNKs under unmapped_fields="load"'
  - do:
      allowed_warnings_regex:
        - "No limit defined, adding default limit of \\[.*\\]"
      esql.query:
        body:
          query: 'SET unmapped_fields="load"; FROM index2,index3 | WHERE beta > 0 | STATS c = COUNT(*)'
  - length: { columns: 1 }
  - match: { columns.0.name: "c" }
  - length: { values: 1 }
  - match: { values.0: [ 1 ] }

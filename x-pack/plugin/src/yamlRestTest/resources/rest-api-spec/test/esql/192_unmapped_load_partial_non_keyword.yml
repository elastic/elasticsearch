---
"test 60":
  - do:
      allowed_warnings_regex:
        - "No limit defined, adding default limit of \\[.*\\]"
      esql.query:
        body:
          # [beta] is double in index2
          # [gamma] is boolean in index3
          # PUNKs should not be rejected in conversion functions (e.g.: punk::TYPE or TO_TYPE(punk))
          query: 'SET unmapped_fields="load"; FROM index1,index2,index3 | EVAL x = beta::long, y = gamma::boolean, m = TO_LONG(beta), n = TO_BOOLEAN(gamma) | SORT x ASC | KEEP y'

---
"test 70":
  - do:
      allowed_warnings_regex:
        - "No limit defined, adding default limit of \\[.*\\]"
      esql.query:
        body:
          # [tau] is date index1
          # [tau] is date_nanos index2
          # Field is mapped differently in both indices. DATE/DATE_NANOS types shouldn't fail.
          query: 'SET unmapped_fields="load"; FROM index1,index2 | WHERE tau > 0::date'

---
"test 80":
  - do:
      catch: bad_request
      esql.query:
        body:
          # [tau] is date index1
          # [tau] is date_nanos index2
          # [tau] is unmapped in index3
          query: 'SET unmapped_fields="load"; FROM index* | WHERE tau > 0::date'
  - match: { status: 400 }
  - match: { error.type: verification_exception }
  - contains: { error.reason: 'Found 1 problem' }
  - contains: { error.reason: 'line 1:49: Cannot use field [tau] due to ambiguities being mapped as [3] incompatible types: [keyword] due to loading from _source, [date_nanos] in [index2], [datetime] in [index1]' }

---
"test 90":
  - do:
      catch: bad_request
      esql.query:
        body:
          query: 'SET unmapped_fields="load"; FROM index1,index2 | SORT alpha DESC | WHERE alpha > 0'
  - match: { status: 400 }
  - match: { error.type: verification_exception }
  - contains: { error.reason: 'Found 1 problem' }
  - contains: { error.reason: 'line 1:55: Cannot use field [alpha] due to ambiguities being mapped as [2] incompatible types: [integer] in [index2], [long] in [index1]' }

---
"test 100":
  - do:
      catch: bad_request
      esql.query:
        body:
          query: 'SET unmapped_fields="load"; FROM index2,index3 | STATS x = AVG(beta::double), y = MIN(gamma)'
  - match: { status: 400 }
  - match: { error.type: verification_exception }
  - contains: { error.reason: 'Found 1 problem' }
  - contains: { error.reason: 'line 1:87: Cannot use field [gamma] due to ambiguities being mapped as [2] incompatible types: [keyword] due to loading from _source, [boolean] in [index3]' }


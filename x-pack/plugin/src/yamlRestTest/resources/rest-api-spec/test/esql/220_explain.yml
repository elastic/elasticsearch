---
setup:
  - requires:
      test_runner_features: [capabilities, contains, allowed_warnings_regex]
      capabilities:
        - method: POST
          path: /_query
          parameters: []
          capabilities: [explain, no_brackets_in_unquoted_index_names, explain_with_remote_plans]
      reason: "EXPLAIN with remote plans"
  - do:
      indices.create:
        index: test
        body:
          mappings:
            properties:
              color:
                type: text
                fields:
                  keyword:
                    type: keyword
              description:
                type: text
                fields:
                  keyword:
                    type: keyword

  - do:
      bulk:
        index: "test"
        refresh: true
        body:
          - { "index": { } }
          - { "color": "red", "description": "The color Red" }
          - { "index": { } }
          - { "color": "blue", "description": "The color Blue" }
          - { "index": { } }
          - { "color": "green", "description": "The color Green" }

---
explainRow:
  - do:
      allowed_warnings_regex:
        - "No limit defined, adding default limit of \\[.*\\]"
      esql.query:
        body:
          query: 'EXPLAIN (row a = 1)'

  - length: { columns: 5 }
  - match: {columns.0.name: "cluster"}
  - match: {columns.0.type: "keyword"}
  - match: {columns.1.name: "node"}
  - match: {columns.1.type: "keyword"}
  - match: {columns.2.name: "role"}
  - match: {columns.2.type: "keyword"}
  - match: {columns.3.name: "type"}
  - match: {columns.3.type: "keyword"}
  - match: {columns.4.name: "plan"}
  - match: {columns.4.type: "keyword"}
  - length: { values: 3 }
  - match: { values.0.2: "coordinator" }
  - match: { values.0.3: "parsedPlan" }
  - match: { values.1.2: "coordinator" }
  - match: { values.1.3: "optimizedLogicalPlan" }
  - match: { values.2.2: "coordinator" }
  - match: { values.2.3: "optimizedPhysicalPlan" }


---
explainQuery:
  - do:
      allowed_warnings_regex:
        - "No limit defined, adding default limit of \\[.*\\]"
      esql.query:
        body:
          query: 'EXPLAIN (from test | where color == "red" | eval b = 20)'

  - length: { columns: 5 }
  - match: {columns.0.name: "cluster"}
  - match: {columns.0.type: "keyword"}
  - match: {columns.1.name: "node"}
  - match: {columns.1.type: "keyword"}
  - match: {columns.2.name: "role"}
  - match: {columns.2.type: "keyword"}
  - match: {columns.3.name: "type"}
  - match: {columns.3.type: "keyword"}
  - match: {columns.4.name: "plan"}
  - match: {columns.4.type: "keyword"}
  # Verify coordinator plans (first 3 rows); data node plans may follow
  - match: { values.0.2: "coordinator" }
  - match: { values.0.3: "parsedPlan" }
  - match: { values.1.2: "coordinator" }
  - match: { values.1.3: "optimizedLogicalPlan" }
  - match: { values.2.2: "coordinator" }
  - match: { values.2.3: "optimizedPhysicalPlan" }

---
explainFrom:
  - do:
      allowed_warnings_regex:
        - "No limit defined, adding default limit of \\[.*\\]"
      esql.query:
        body:
          query: 'EXPLAIN (from test)'

  - length: { columns: 5 }
  - match: {columns.0.name: "cluster"}
  - match: {columns.0.type: "keyword"}
  - match: {columns.1.name: "node"}
  - match: {columns.1.type: "keyword"}
  - match: {columns.2.name: "role"}
  - match: {columns.2.type: "keyword"}
  - match: {columns.3.name: "type"}
  - match: {columns.3.type: "keyword"}
  - match: {columns.4.name: "plan"}
  - match: {columns.4.type: "keyword"}
  # Verify coordinator plans (first 3 rows); data node plans may follow
  - match: { values.0.2: "coordinator" }
  - match: { values.0.3: "parsedPlan" }
  - match: { values.1.2: "coordinator" }
  - match: { values.1.3: "optimizedLogicalPlan" }
  - match: { values.2.2: "coordinator" }
  - match: { values.2.3: "optimizedPhysicalPlan" }

---
explainDownstream:
  - do:
      allowed_warnings_regex:
        - "No limit defined, adding default limit of \\[.*\\]"
      esql.query:
        body:
          query: 'EXPLAIN (row a = 1) | eval b = 2'
      catch: "bad_request"

  - match: { error.type: "parsing_exception" }
  - contains: { error.reason: "EXPLAIN does not support downstream commands" }

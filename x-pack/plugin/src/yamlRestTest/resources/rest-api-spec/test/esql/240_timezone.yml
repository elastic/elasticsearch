---
SET overrides settings.time_zone:
  # In-query SET wins over the nested settings.time_zone (in-query SET is the most-specific scope).
  - requires:
      capabilities:
        - method: POST
          path: /_query
          parameters: [ ]
          capabilities: [ query_settings_request_body ]
      test_runner_features: [ capabilities ]
      reason: "Requires the settings request body block"
  - do:
      esql.query:
        body:
          settings:
            time_zone: "Europe/Paris"
          query: |
            SET time_zone="+04:00";
            FROM tzs
            | EVAL
                hour=DATE_EXTRACT("hour_of_day", @timestamp),
                day_name=DAY_NAME(@timestamp),
                month_name=MONTH_NAME(@timestamp)
            | SORT @timestamp ASC
            | LIMIT 5

  - length: { values: 4 }
  - match: { values.0.0: "2025-05-31T04:00:00.000+04:00" }
  - match: { values.0.1: 4 }
  - match: { values.1.0: "2025-05-31T05:00:00.000+04:00" }
  - match: { values.1.1: 5 }
  - match: { values.2.0: "2025-06-01T02:00:00.000+04:00" }
  - match: { values.2.1: 2 }
  - match: { values.3.0: "2025-06-01T03:00:00.000+04:00" }
  - match: { values.3.1: 3 }

---
settings.time_zone wins over legacy top-level time_zone:
  # When the same setting is supplied via both the canonical settings.{} block and the legacy top-level
  # field, the canonical path wins silently regardless of JSON field order.
  - requires:
      capabilities:
        - method: POST
          path: /_query
          parameters: [ ]
          capabilities: [ query_settings_request_body ]
      test_runner_features: [ capabilities ]
      reason: "Requires the settings request body block"
  - do:
      esql.query:
        body:
          time_zone: "+04:00"
          settings:
            time_zone: "Europe/Paris"
          query: |
            FROM tzs
            | EVAL hour=DATE_EXTRACT("hour_of_day", @timestamp)
            | SORT @timestamp ASC
            | LIMIT 1

  - length: { values: 1 }
  - match: { values.0.0: "2025-05-31T02:00:00.000+02:00" }
  - match: { values.0.1: 2 }

---
settings.time_zone wins regardless of JSON field order:
  # Same as above but with the legacy field appearing AFTER settings in the JSON. Canonical still wins —
  # precedence does not depend on parse order.
  - requires:
      capabilities:
        - method: POST
          path: /_query
          parameters: [ ]
          capabilities: [ query_settings_request_body ]
      test_runner_features: [ capabilities ]
      reason: "Requires the settings request body block"
  - do:
      esql.query:
        body:
          settings:
            time_zone: "Europe/Paris"
          time_zone: "+04:00"
          query: |
            FROM tzs
            | EVAL hour=DATE_EXTRACT("hour_of_day", @timestamp)
            | SORT @timestamp ASC
            | LIMIT 1

  - length: { values: 1 }
  - match: { values.0.0: "2025-05-31T02:00:00.000+02:00" }
  - match: { values.0.1: 2 }

---
Unknown key under settings is rejected:
  - requires:
      capabilities:
        - method: POST
          path: /_query
          parameters: [ ]
          capabilities: [ query_settings_request_body ]
      test_runner_features: [ capabilities ]
      reason: "Requires the settings request body block"
  - do:
      catch: bad_request
      esql.query:
        body:
          settings:
            no_such_setting: "x"
          query: "FROM tzs | LIMIT 1"
  - match: { error.root_cause.0.reason: "/.*Unknown.setting..no_such_setting..under..settings./" }

---
SET-only setting under settings is rejected:
  # unmapped_fields exists in the registry but opted out of body exposure. It must be set via in-query SET,
  # not via the request body.
  - requires:
      capabilities:
        - method: POST
          path: /_query
          parameters: [ ]
          capabilities: [ query_settings_request_body ]
      test_runner_features: [ capabilities ]
      reason: "Requires the settings request body block"
  - do:
      catch: bad_request
      esql.query:
        body:
          settings:
            unmapped_fields: "NULLIFY"
          query: "FROM tzs | LIMIT 1"
  - match: { error.root_cause.0.reason: "/.*Setting..unmapped_fields..is.not.exposed.as.a.request.body.parameter.*/" }

---
Function parameter with SET:
  - do:
      esql.query:
        body:
          time_zone: "Europe/Paris"
          query: |
            SET time_zone="+04:00";
            ROW @timestamp = DATE_PARSE("2025-05-31T04:00:00.000", { "time_zone": "+08:00" })
            | EVAL
                hour=DATE_EXTRACT("hour_of_day", @timestamp),
                day_name=DAY_NAME(@timestamp),
                month_name=MONTH_NAME(@timestamp)
            | SORT @timestamp ASC
            | LIMIT 5

  - length: { columns: 4 }
  - match: { columns.0.name: "@timestamp" }
  - match: { columns.1.name: "hour" }
  - match: { columns.2.name: "day_name" }
  - match: { columns.3.name: "month_name" }

  - length: { values: 1 }
  - match: { values.0.0: "2025-05-31T00:00:00.000+04:00" }
  - match: { values.0.1: 0 }
  - match: { values.0.2: "Saturday" }
  - match: { values.0.3: "May" }

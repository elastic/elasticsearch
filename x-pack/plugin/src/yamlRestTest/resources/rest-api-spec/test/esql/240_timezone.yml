  - length: { columns: 4 }
  - match: { columns.0.name: "@timestamp" }
  - match: { columns.1.name: "hour" }
  - match: { columns.2.name: "day_name" }
  - match: { columns.3.name: "month_name" }

  - length: { values: 4 }
  - match: { values.0.0: "2025-05-31T02:00:00.000+02:00" }
  - match: { values.0.1: 2 }
  - match: { values.0.2: "Saturday" }
  - match: { values.0.3: "May" }
  - match: { values.1.0: "2025-05-31T03:00:00.000+02:00" }
  - match: { values.1.1: 3 }
  - match: { values.1.2: "Saturday" }
  - match: { values.1.3: "May" }
  - match: { values.2.0: "2025-06-01T00:00:00.000+02:00" }

---
setup:
  - requires:
      cluster_features: ["gte_v8.11.0"]
      reason: "ESQL is available in 8.11+"
  - do:
      indices.create:
        index: async_pagination_test
        body:
          settings:
            number_of_shards: 1
          mappings:
            properties:
              value:
                type: long
              name:
                type: keyword
  - do:
      bulk:
        index: async_pagination_test
        refresh: true
        body:
          - { "index": { } }
          - { "value": 1, "name": "a" }
          - { "index": { } }
          - { "value": 2, "name": "b" }
          - { "index": { } }
          - { "value": 3, "name": "c" }
          - { "index": { } }
          - { "value": 4, "name": "d" }
          - { "index": { } }
          - { "value": 5, "name": "e" }
  - do:
      indices.create:
        index: async_pagination_test_many
        body:
          settings:
            number_of_shards: 1
          mappings:
            properties:
              value:
                type: long
              name:
                type: keyword
  - do:
      bulk:
        index: async_pagination_test_many
        refresh: true
        body:
          - { "index": { } }
          - { "value": 1, "name": "a" }
          - { "index": { } }
          - { "value": 2, "name": "b" }
          - { "index": { } }

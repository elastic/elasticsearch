---
setup:
  - requires:
      test_runner_features: [ capabilities, contains ]
      capabilities:
        - method: POST
          path: /_query
          parameters: []
          capabilities: [ flattened_datatype ]
      reason: "Requires flattened datatype support"
  - do:
      indices.create:
        index: test
        body:
          mappings:
            properties:
              attr:
                type: flattened
  - do:
      indices.create:
        index: test-lookup
        body:
          settings:
            index:
              mode: lookup
          mappings:
            properties:
              attr:
                type: flattened
              host:
                properties:
                  name:
                    type: keyword
  - do:
      index:
        index: test
        refresh: true
        body:
          attr:
            a: foo

---
'lookup join on flattened field is unsupported':
  - requires:
      capabilities:
        - method: POST
          path: /_query
          parameters: []
          capabilities: [ join_lookup_v12 ]
      reason: "uses LOOKUP JOIN"
  - do:
      catch: bad_request
      esql.query:
        body:
          query: 'FROM test | LOOKUP JOIN test-lookup ON attr'
  - match: { status: 400 }
  - match: { error.type: verification_exception }
  - contains: { error.reason: 'JOIN with right field [attr] of type [FLATTENED] is not supported' }

---
'lookup join on expression with FIELD_EXTRACT is unsupported':
  - requires:
      capabilities:
        - method: POST
          path: /_query
          parameters: []
          capabilities: [ join_lookup_v12, lookup_join_on_boolean_expression, fn_field_extract ]
      reason: "uses LOOKUP JOIN with expression and field_extract"
  - do:
      catch: bad_request
      esql.query:
        body:
          query: 'FROM test | LOOKUP JOIN test-lookup ON FIELD_EXTRACT(attr, "a") == host.name'
  - match: { status: 400 }
  - contains: { error.reason: 'JOIN ON clause with expressions must contain at least one condition relating the left index and the lookup index' }

---
'sort by flattened field':
  - do:
      catch: bad_request
      esql.query:
        body:
          query: 'FROM test | SORT attr | LIMIT 3'
  - match: { status: 400 }
  - match: { error.type: verification_exception }
  - contains: { error.reason: 'cannot sort on flattened' }

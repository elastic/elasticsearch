          capabilities: [bucket_inclusive_upper_bound]
      reason: "BUCKET auto mode now generates different bucket sizes"
  - do:
      indices.create:
        index: test_bucket
        body:
          mappings:
            properties:
              ts :
                type : date

  - do:
      bulk:
        refresh: true
        body:
          - { "index": { "_index": "test_bucket" } }
          - { "ts": "2024-06-16" }
          - { "index": { "_index": "test_bucket" } }
          - { "ts": "2024-07-16" }

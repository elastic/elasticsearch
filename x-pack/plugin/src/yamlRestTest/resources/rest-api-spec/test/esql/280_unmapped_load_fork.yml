---
setup:
  - requires:
      test_runner_features: [ capabilities, allowed_warnings_regex, contains ]
      capabilities:
        - method: POST
          path: /_query
          parameters: [ ]
          capabilities: [ optional_fields_v5, optional_fields_fix_unmapped_load_multi_index_pattern, optional_fields_load_with_fork ]
      reason: 'requires SET unmapped_fields="load" support for FORK across single and multiple index patterns'
  #
  # The table below represents the field mappings for the three indices created in this test.
  #
  # | Field      | index1  |   index2   | index3  |
  # |------------|---------|------------|---------|
  # | alpha      | long    | integer    | -       |
  # | lambda     | keyword | keyword    | -       |
  # | tau        | date    | date_nanos | -       |
  # | beta       | -       | double     | -       |
  # | a.b.c.d    | -       | -          | boolean |
  #
  # lambda is mapped as keyword in index1/index2 and unmapped in index3; under unmapped_fields="load"
  # it is loaded from _source where unmapped, so it can be referenced inside FORK branches in every case.
  #
  - do:
      indices.create:
        index: index1
        body:
          mappings:
            dynamic: false
            properties:
              alpha:
                type: long
              lambda:
                type: keyword
              tau:
                type: date
  - do:
      indices.create:
        index: index2
        body:
          mappings:
            dynamic: false
            properties:
              alpha:
                type: integer
              lambda:
                type: keyword
              tau:
                type: date_nanos
              beta:
                type: double
  - do:
      indices.create:
        index: index3
        body:
          mappings:
            dynamic: false
            properties:
              a:
                properties:
                   b:
                     properties:
                       c:
                         properties:
                            d:
                              type: boolean

---
two-branches-one-index:
  - do:
      esql.query:
        body:
          query: 'SET unmapped_fields="load"; FROM index1 | FORK (WHERE NOT BYTE_LENGTH(lambda) < 11) (WHERE true) | KEEP lambda, _fork'
  - match: { columns.0.name: lambda }
  - match: { columns.0.type: keyword }
  - match: { columns.1.name: _fork }
  - length: { values: 0 }

---
one-branch-one-index:
  - do:
      esql.query:
        body:
          query: 'SET unmapped_fields="load"; FROM index2 | FORK (WHERE NOT BYTE_LENGTH(lambda) < 11) | KEEP lambda, _fork'
  - match: { columns.0.name: lambda }
  - match: { columns.0.type: keyword }
  - match: { columns.1.name: _fork }
  - length: { values: 0 }

---
two-branches-one-index-wildcard:
  - do:
      esql.query:
        body:
          query: 'SET unmapped_fields="load"; FROM index3* | FORK (WHERE NOT BYTE_LENGTH(lambda) < 11) (WHERE true) | KEEP lambda, _fork'
  - match: { columns.0.name: lambda }
  - match: { columns.0.type: keyword }
  - match: { columns.1.name: _fork }
  - length: { values: 0 }

---
one-branch-multi-index:
  - do:
      esql.query:
        body:
          query: 'SET unmapped_fields="load"; FROM index1,index2 | FORK (WHERE NOT BYTE_LENGTH(lambda) < 11) | KEEP lambda, _fork'
  - match: { columns.0.name: lambda }
  - match: { columns.0.type: keyword }
  - match: { columns.1.name: _fork }
  - length: { values: 0 }

---
two-branches-multi-index:
  - do:
      esql.query:
        body:
          query: 'SET unmapped_fields="load"; FROM index1,index2 | FORK (WHERE NOT BYTE_LENGTH(lambda) < 11) (WHERE true) | KEEP lambda, _fork'
  - match: { columns.0.name: lambda }
  - match: { columns.0.type: keyword }
  - match: { columns.1.name: _fork }
  - length: { values: 0 }

---
two-branches-multi-index-wildcard:
  - do:
      esql.query:
        body:
          query: 'SET unmapped_fields="load"; FROM ind* | FORK (WHERE NOT BYTE_LENGTH(lambda) < 11) (WHERE true) | KEEP lambda, _fork'
  - match: { columns.0.name: lambda }
  - match: { columns.0.type: keyword }
  - match: { columns.1.name: _fork }
  - length: { values: 0 }

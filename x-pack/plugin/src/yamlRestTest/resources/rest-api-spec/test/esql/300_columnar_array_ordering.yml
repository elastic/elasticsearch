  - do:
      indices.create:
        index: test_columnar
        body:
          settings:
            index.mode: logsdb_columnar
          mappings:
            properties:
              "@timestamp": { type: date }
              val: { type: ip }
  - do:
      indices.create:
        index: test_logsdb
        body:
          settings:
            index.mode: logsdb
          mappings:
            properties:
              "@timestamp": { type: date }
              val: { type: ip }
  - do:
      bulk:
        refresh: true
        body:
          - { "index": { "_index": "test_columnar" } }
          - { "@timestamp": "2024-05-10T00:00:00.000Z", "val": ["10.0.0.5", "10.0.0.1", "10.0.0.3"] }
          - { "index": { "_index": "test_logsdb" } }
          - { "@timestamp": "2024-05-10T00:00:00.000Z", "val": ["10.0.0.5", "10.0.0.1", "10.0.0.3"] }

  - do:
      allowed_warnings:
        - "No limit defined, adding default limit of [1000]"
      esql.query:
        body:

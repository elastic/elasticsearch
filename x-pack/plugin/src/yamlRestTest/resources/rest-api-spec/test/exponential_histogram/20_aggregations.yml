---
"Percentiles aggregation":
  - requires:
      cluster_features: [ "search.exponential_histogram_upscaling_removed" ]
      reason: exponential_histogram percentile computation changed after upscaling removal
  - do:
      search:
        index: test_exponential_histogram
        size: 0
        body:
          aggs:
            percentiles_agg:
              percentiles:
                field: histo
                percents: [5, 25, 50, 75, 95]

  - match: { hits.total.value: 5 }
  # Use range comparisons to handle small numeric errors across different machines
  - gte: { aggregations.percentiles_agg.values.5\.0: -409.7 }
  - lte: { aggregations.percentiles_agg.values.5\.0: -409.5 }
  - gte: { aggregations.percentiles_agg.values.25\.0: -0.01 }
  - lte: { aggregations.percentiles_agg.values.25\.0: 0.01 }
  - gte: { aggregations.percentiles_agg.values.50\.0: 6.39 }
  - lte: { aggregations.percentiles_agg.values.50\.0: 6.41 }
  - gte: { aggregations.percentiles_agg.values.75\.0: 1638.3 }
  - lte: { aggregations.percentiles_agg.values.75\.0: 1638.5 }
  - gte: { aggregations.percentiles_agg.values.95\.0: 6553.5 }
  - lte: { aggregations.percentiles_agg.values.95\.0: 6553.7 }

---
"Percentile ranks aggregation":

  - match: { hits.total.value: 5 }
  - gte: { aggregations.percentile_ranks_agg.values.0\.0: 26.7 }
  - lte: { aggregations.percentile_ranks_agg.values.0\.0: 26.9 }
  - gte: { aggregations.percentile_ranks_agg.values.100\.0: 65.8 }
  - lte: { aggregations.percentile_ranks_agg.values.100\.0: 65.9 }
  - gte: { aggregations.percentile_ranks_agg.values.1000\.0: 70.7 }
  - lte: { aggregations.percentile_ranks_agg.values.1000\.0: 70.8 }
  - gte: { aggregations.percentile_ranks_agg.values.5000\.0: 77.9 }
  - lte: { aggregations.percentile_ranks_agg.values.5000\.0: 78.1 }

---
"Boxplot aggregation":
  - requires:
      cluster_features: [ "search.exponential_histogram_upscaling_removed" ]
      reason: exponential_histogram percentile computation changed after upscaling removal
  - do:
      search:
        index: test_exponential_histogram
        size: 0
        body:
          aggs:
            boxplot_agg:
              boxplot:

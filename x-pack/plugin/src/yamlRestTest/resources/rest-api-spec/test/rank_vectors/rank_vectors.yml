setup:
  - requires:
      cluster_features: [ "rank_vectors" ]
      reason: "requires rank_vectors feature"
---
"Test create multi-vector field":
  - do:
      indices.create:
        index: test
        body:
          mappings:
            properties:
              vector1:
                type: rank_vectors
                dims: 3
  - do:
      index:
        index: test
        id: "1"
        body:
          vector1: [[2, -1, 1]]
  - do:
      index:
        index: test
        id: "2"
        body:
          vector1: [[2, -1, 1], [3, 4, 5]]
  - do:
      index:
        index: test
        id: "3"
        body:
          vector1: [[2, -1, 1], [3, 4, 5], [6, 7, 8]]
  - do:
      indices.refresh: {}
---
"Test create dynamic dim multi-vector field":
  - do:
      indices.create:
        index: test
        body:
          mappings:
            properties:
              name:
                type: keyword
              vector1:
                type: rank_vectors
  - do:
      index:
        index: test
        id: "1"
        body:
          vector1: [[2, -1, 1]]
  - do:
      index:
        index: test
        id: "2"
        body:
          vector1: [[2, -1, 1], [3, 4, 5]]
  - do:
      index:
        index: test
        id: "3"
        body:
          vector1: [[2, -1, 1], [3, 4, 5], [6, 7, 8]]
  - do:
      cluster.health:
        wait_for_events: languid

  # verify some other dimension will fail
  - do:
      catch: bad_request
      index:
        index: test
        id: "4"
        body:
          vector1: [[2, -1, 1], [3, 4, 5], [6, 7, 8, 9]]
---
"Test dynamic dim mismatch fails multi-vector field":
  - do:
      indices.create:
        index: test
        body:
          mappings:
            properties:
              vector1:
                type: rank_vectors
  - do:
      catch: bad_request
      index:
        index: test
        id: "1"
        body:
          vector1: [[2, -1, 1], [2]]
---
"Test static dim mismatch fails multi-vector field":
  - do:
      indices.create:
        index: test
        body:
          mappings:
            properties:
              vector1:
                type: rank_vectors
                dims: 3
  - do:
      catch: bad_request
      index:
        index: test
        id: "1"
        body:
          vector1: [[2, -1, 1], [2]]
---
"Test poorly formatted multi-vector field":
  - do:
      indices.create:
        index: poorly_formatted_vector
        body:
          mappings:
            properties:
              vector1:
                type: rank_vectors
                dims: 3
  - do:
      catch: bad_request
      index:
        index: poorly_formatted_vector
        id: "1"
        body:
          vector1: [[[2, -1, 1]]]
  - do:
      catch: bad_request
      index:
        index: poorly_formatted_vector
        id: "1"
        body:
          vector1: [[2, -1, 1], [[2, -1, 1]]]
---
"Updating dim to null is not allowed":
  - requires:
      cluster_features: "mapper.npe_on_dims_update_fix"
      reason: "dims update fix"
  - do:
      indices.create:
        index: test_index

  - do:
      indices.put_mapping:
        index: test_index
        body:
          properties:
            embedding:
              type: rank_vectors
              dims: 4
  - do:
      catch: bad_request
      indices.put_mapping:
        index: test_index
        body:
          properties:
            embedding:
              type: rank_vectors

---
"Rank vectors dynamic template with dotted field name and intermediate object":
  - requires:
      cluster_features: "mapper.rank_vectors.dynamic_template_dotted_field_fix"
      reason: "fix for dynamic template with dotted field names"
  - do:
      indices.put_template:
        name: rank-vectors-dotted-template
        body:
          index_patterns: ["rank-vectors-dotted-*"]
          settings:
            number_of_shards: 1
            number_of_replicas: 0
          mappings:
            dynamic_templates:
              - rank_vectors_template:
                  path_match: "my_vectors.*"
                  mapping:
                    type: rank_vectors

  - do:
      index:
        index: rank-vectors-dotted-test
        id: "1"
        refresh: true
        body:
          my_vectors.vector1: [[0.12, -0.34, 0.56], [0.78, -0.91, 0.23]]

  - do:
      cluster.health:
        wait_for_events: languid

  - do:
      indices.get_mapping:
        index: rank-vectors-dotted-test

  - match: { rank-vectors-dotted-test.mappings.properties.my_vectors.properties.vector1.type: rank_vectors }
  - match: { rank-vectors-dotted-test.mappings.properties.my_vectors.properties.vector1.dims: 3 }

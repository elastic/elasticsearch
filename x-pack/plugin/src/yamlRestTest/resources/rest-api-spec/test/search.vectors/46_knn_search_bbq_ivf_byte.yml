  - do:
      search:
        index: bbq_disk_byte
        body:
          knn:
            field: vector
            query_vector: [16,   9, -10,  51, -14, -33,  60, -50,
                           37,  73, -63,  57, -37,  25, -44,   2,
                           30,  11,  29,  19, -17,  30, -35, -33,
                          -28,  46, -26,  45, -18,  25,  -8, -22,
                          -44,  24, -28,  41, -39, -13,   1,  30,
                          -44,  17,  32,  20, -17, -31,  25,  -4,
                          -15, -25, -13,  32, -24, -21, -74,  74,
                          -55, 126,  27,  26,   4, -35, -54, -20]
            k: 3
            visit_percentage: 1.0

  - match: { hits.hits.0._id: "1" }
  - match: { hits.hits.1._id: "3" }

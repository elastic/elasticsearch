  - is_false: "hits.hits.0._source.catch_all"

---
Fields with copy_to and skip_ignored_source_read workaround:
  # Setting skip_ignored_source_read skips _ignored_source during synthetic source reconstruction
  - do:
      indices.create:
        index: test-fls-copy-to-skip-ignored
        body:
          settings:
            index:
              mapping.source.mode: synthetic
              mapping.synthetic_source.skip_ignored_source_read: true
          mappings:
            properties:
              user:
                type: keyword
                copy_to: catch_all
              domain:
                type: keyword
                copy_to: catch_all
              catch_all:
                type: keyword

  - do:
      bulk:
        index: test-fls-copy-to-skip-ignored
        refresh: true
        body:
          - '{"create": { }}'
          - '{"user": "luke.skywalker", "domain": "tatooine.org"}'
  - match: { errors: false }

  - do:
      security.create_api_key:
        body:
          name: "test-fls-skip-ignored"
          expiration: "1d"
          role_descriptors:
            index_access:
              indices:
                - names: [ "test-fls-copy-to-skip-ignored" ]
                  privileges: [ "read" ]
                  field_security:
                    grant: [ "*" ]
                    except: [ "catch_all" ]
  - match: { name: "test-fls-skip-ignored" }
  - is_true: id
  - set:
      id: api_key_id
      encoded: credentials

  # With superuser: search succeeds but source may be incomplete since _ignored_source is skipped
  - do:
      search:
        index: test-fls-copy-to-skip-ignored
  - match: { hits.total.value: 1 }

  # With FLS API Key: search succeeds without crash since _ignored_source VOID entries are not loaded
  - do:
      headers:
        Authorization: "ApiKey ${credentials}"
      search:
        index: test-fls-copy-to-skip-ignored
  - match: { hits.total.value: 1 }

---
METRICS_INFO with field level security granting specific fields:
  - requires:
      test_runner_features: [ capabilities, headers, allowed_warnings_regex ]
      capabilities:
        - method: POST
          path: /_query
          parameters: [ ]
          capabilities: [ ts_command_v0, metrics_info_command ]
      reason: "METRICS_INFO with FLS on time series index"

  - do:
      indices.create:
        index: ts_fls_mi_grant
        body:
          settings:
            index:
              mode: time_series
              routing_path: [ host ]
              time_series:
                start_time: 2021-04-28T00:00:00Z
                end_time: 2021-04-29T00:00:00Z
          mappings:
            properties:
              "@timestamp":
                type: date
              host:
                type: keyword
                time_series_dimension: true
              cpu:
                type: long
                time_series_metric: gauge
              memory:
                type: long
                time_series_metric: gauge
              network_in:
                type: long
                time_series_metric: counter

  - do:
      bulk:
        index: ts_fls_mi_grant
        refresh: true
        body:
          - '{"index": {}}'
          - '{"@timestamp": "2021-04-28T18:50:04.467Z", "host": "server1", "cpu": 80, "memory": 4096, "network_in": 1000}'
          - '{"index": {}}'
          - '{"@timestamp": "2021-04-28T18:50:24.467Z", "host": "server1", "cpu": 85, "memory": 4100, "network_in": 2000}'
          - '{"index": {}}'
          - '{"@timestamp": "2021-04-28T18:50:04.467Z", "host": "server2", "cpu": 60, "memory": 8192, "network_in": 500}'
  - match: { errors: false }

  - do:
      security.create_api_key:
        body:
          name: "test-fls-metrics-info"
          expiration: "1d"
          role_descriptors:
            index_access:
              indices:
                - names: [ "ts_fls_mi_grant" ]
                  privileges: [ "read" ]
                  field_security:
                    grant: [ "@timestamp", "host", "cpu" ]
  - match: { name: "test-fls-metrics-info" }
  - is_true: id
  - set:
      id: api_key_id
      encoded: credentials

  # With superuser: should see all 3 metrics
  - do:
      allowed_warnings_regex:
        - "No limit defined, adding default limit of \\[.*\\]"
      esql.query:
        body:
          query: 'TS ts_fls_mi_grant | METRICS_INFO | SORT metric_name'
  - match: {columns.0.name: "metric_name"}
  - match: {columns.0.type: "keyword"}
  - match: {columns.1.name: "data_stream"}
  - match: {columns.1.type: "keyword"}
  - match: {columns.2.name: "unit"}
  - match: {columns.2.type: "keyword"}
  - match: {columns.3.name: "metric_type"}
  - match: {columns.3.type: "keyword"}
  - match: {columns.4.name: "field_type"}
  - match: {columns.4.type: "keyword"}
  - match: {columns.5.name: "dimension_fields"}
  - match: {columns.5.type: "keyword"}
  - length: {values: 3}
  - match: {values.0.0: "cpu"}
  - match: {values.0.3: "gauge"}
  - match: {values.0.4: "long"}
  - match: {values.1.0: "memory"}
  - match: {values.1.3: "gauge"}
  - match: {values.1.4: "long"}

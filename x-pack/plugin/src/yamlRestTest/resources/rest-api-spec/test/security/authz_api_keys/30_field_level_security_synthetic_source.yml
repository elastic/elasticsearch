---
setup:
  - skip:
      features: headers
  - requires:
      cluster_features: [ "mapper.source.mode_from_index_setting" ]
      reason: "Source mode configured through index setting"

  - do:
      cluster.health:
        wait_for_status: yellow

---
Filter single field:
  - do:
      indices.create:
        index: index_fls
        body:
          settings:
            index:
              mapping.source.mode: synthetic
          mappings:
            properties:
              name:
                type: keyword
              secret:
                type: match_only_text

  - do:
      bulk:
        index: index_fls
        refresh: true
        body:
          - '{"create": { }}'
          - '{"name": "A", "secret":"squirrel"}'
  - match: { errors: false }

  - do:
      security.create_api_key:
        body:
          name: "test-fls"
          expiration: "1d"
          role_descriptors:
            index_access:
              indices:
                - names: [ "index_fls" ]
                  privileges: [ "read" ]
                  field_security:
                    grant: [ "name" ]
  - match: { name: "test-fls" }
  - is_true: id
  - set:
      id: api_key_id
      encoded: credentials

  # With superuser...
  - do:
      search:
        index: index_fls
  - match: { hits.total.value: 1 }
  - match: { hits.total.relation: "eq" }
  - match: { hits.hits.0._source.name: A }
  - match: { hits.hits.0._source.secret: squirrel }

  # With FLS API Key
  - do:
      headers:
        Authorization: "ApiKey ${credentials}"
      search:
        index: index_fls
  - match: { hits.total.value: 1 }
  - match: { hits.total.relation: "eq" }
  - match: { hits.hits.0._source.name: A }
  - is_false: "hits.hits.0._source.secret"


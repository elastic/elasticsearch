apply plugin: 'elasticsearch.internal-es-plugin'
apply plugin: 'elasticsearch.internal-cluster-test'
apply plugin: 'elasticsearch.internal-java-rest-test'
apply plugin: 'elasticsearch.stateless'

esplugin {
    name = 'stateless-sigterm'
    description = 'Sigterm shutdown module for stateless Elasticsearch'
    classname = 'org.elasticsearch.xpack.stateless.shutdown.StatelessSigtermPlugin'
    extendedPlugins = ['x-pack-core']
}

dependencies {
    compileOnly project(':x-pack:plugin:core')
    implementation project(xpackModule('shutdown'))
    javaRestTestImplementation testArtifact(project(xpackModule('core')))
    javaRestTestImplementation project(':x-pack:test:stateless-test-framework')
    clusterModules project(':x-pack:plugin:stateless')
}

---
"Cancel reindex works with only reindex/cancel permission":
  - requires:
      test_runner_features: [capabilities]
      reason: Dedicated reindex cancel requires reindex management API
      capabilities:
        - method: POST
          path: /_reindex/{task_id}/_cancel
          capabilities: [reindex_management_api]

  - do:
      bulk:
        refresh: true
        body:
          - '{ "create": { "_index": "source"} }'
          - '{ "text": "test" }'
          - '{ "create": { "_index": "source"} }'
          - '{ "text": "test" }'
          - '{ "create": { "_index": "source"} }'
          - '{ "text": "test" }'
          - '{ "create": { "_index": "source"} }'
          - '{ "text": "test" }'
          - '{ "create": { "_index": "source"} }'
          - '{ "text": "test" }'

  - do:
      headers: {es-security-runas-user: minimal_with_reindex_cancel_user}
      reindex:
        wait_for_completion: false
        # throttle so the reindex stays running long enough for us to cancel it
        requests_per_second: 0.000001
        body:
          source:
            index: source
            size: 1
          dest:
            index: dest
  - set: {task: task}

  - do:
      headers: {es-security-runas-user: minimal_with_reindex_cancel_user}
      reindex_cancel:
        task_id: $task
  - match: { completed: true }
  - match: { id: $task }
  - match: { cancelled: true }
  - match: { status.canceled: "by user request" }

---
"Cancel reindex forbidden without reindex/cancel permission":
  - requires:
      test_runner_features: [capabilities]
      reason: Dedicated reindex cancel requires reindex management API
      capabilities:
        - method: POST
          path: /_reindex/{task_id}/_cancel
          capabilities: [reindex_management_api]

  - do:
      headers: {es-security-runas-user: minimal_user}
      catch: forbidden
      reindex_cancel:
        task_id: nodeMissing:123

---
"Cancel reindex forbidden for user with task permissions but no reindex/cancel permission":

setup:
  - skip:
      features: headers
---
"Reindex as same user works":

  - do:
      index:
        index:   source
        id:      "1"
        body:    { "text": "test" }
  - do:
      indices.refresh: {}

  - do:
      reindex:
        body:
          source:
            index: source
          dest:
            index: dest
  - match: {created: 1}

---
"Reindex with runas user works":

  - do:
      index:
        index:   source
        id:      "1"
        body:    { "text": "test" }
  - do:
      indices.refresh: {}

  - do:
      headers: {es-security-runas-user: powerful_user}
      reindex:
        refresh: true
        body:
          source:
            index: source
          dest:
            index: dest
  - match: {created: 1}

  - do:
      search:
        rest_total_hits_as_int: true
        index: dest
        body:
          query:
            match:
              text: test
  - match: { hits.total: 1 }

---
"Reindex with runas user with minimal privileges works":

  - do:
      index:
        index:   source
        id:      "1"
        body:    { "text": "test" }
  - do:
      indices.refresh: {}

  - do:
      headers: {es-security-runas-user: minimal_user}
      reindex:
        refresh: true
        body:
          source:
            index: source
          dest:
            index: dest
  - match: {created: 1}

  - do:
      search:
        rest_total_hits_as_int: true
        index: dest
        body:
          query:
            match:
              text: test
  - match: { hits.total: 1 }

---
"Reindex as readonly user is forbidden":

  - do:
      index:
        index:   source
        id:      "1"
        body:    { "text": "test" }
  - do:
      indices.refresh: {}

  - do:
      headers: {es-security-runas-user: readonly_user}
      catch: forbidden
      reindex:
        body:
          source:
            index: source
          dest:
            index: dest

---
"Reindex as user that can't read from the source is forbidden":

  - do:
      index:
        index:   source
        id:      "1"
        body:    { "text": "test" }
  - do:
      indices.refresh: {}

  - do:
      headers: {es-security-runas-user: dest_only_user}
      catch: forbidden
      reindex:
        body:
          source:
            index: source
          dest:
            index: dest

---
"Using a script to write to an index to which you don't have access is forbidden":
  - do:
      index:
        index:        source
        id:           "1"
        body:         { "user": "kimchy" }
  - do:
      index:
        index:        source
        id:           "2"
        body:         { "user": "another" }
  - do:
      indices.refresh: {}

  - do:
      headers: {es-security-runas-user: minimal_user}
      catch: forbidden
      reindex:
        body:
          source:
            index: source
          dest:
            index: dest
          script:
            source: if (ctx._source.user == "kimchy") {ctx._index = 'other_dest'}

  - do:
      indices.refresh: {}

  # The index to which the user tried the unauthorized write didn't even get created
  - do:
      catch: missing
      search:
        rest_total_hits_as_int: true
        index: other_dest

  - do:
      search:
        rest_total_hits_as_int: true
        index: dest
  - length:   { hits.hits: 1  }
  - match: { hits.hits.0._index: dest }

---
"Reindex misses hidden docs":

  - do:
      index:
        index:   source
        id:      "1"
        body:    { "text": "test" }
  - do:
      index:
        index:   source
        id:      "2"
        body:    { "text": "test", "hidden": true }
  - do:
      indices.refresh: {}

  - do:
      headers: {es-security-runas-user: can_not_see_hidden_docs_user}
      reindex:
        refresh: true
        body:
          source:
            index: source
          dest:
            index: dest
  - match: {created: 1}

  # We copied just one doc, presumably the one without the hidden field
  - do:
      search:
        rest_total_hits_as_int: true
        index: dest
        body:
          query:
            match:
              text: test
  - match: { hits.total: 1 }

  # We didn't copy the doc with the hidden field
  - do:
      search:
        rest_total_hits_as_int: true
        index: dest
        body:
          query:
            match:
              hidden: true
  - match: { hits.total: 0 }

---
"Reindex misses hidden fields":

  - do:
      index:
        index:   source
        id:      "1"
        body:    { "text": "test", "foo": "z", "bar": "z" }
  - do:
      indices.refresh: {}

  - do:
      headers: {es-security-runas-user: can_not_see_hidden_fields_user}
      reindex:
        refresh: true
        body:
          source:
            index: source
          dest:
            index: dest
  - match: {created: 1}

  - do:
      search:
        rest_total_hits_as_int: true
        index: dest
        body:
          query:
            match:
              foo: z
  - match: { hits.total: 1 }

  - do:
      search:
        rest_total_hits_as_int: true
        index: dest
        body:
          query:
            match:
              bar: z
  - match: { hits.total: 1 }

  - do:
      search:
        rest_total_hits_as_int: true
        index: dest
        body:
          query:
            match:
              text: test
  - match: { hits.total: 0 }

---
"Reindex to index with document level security is forbidden":

  - do:
      index:
        index:   dest
        id:      "1"
        body:    { "text": "test" }
  - do:
      indices.refresh: {}

  - do:
      headers: {es-security-runas-user: can_not_see_hidden_docs_user}
      reindex:
        body:
          source:
            index: dest
          dest:
            index: source

---
"Reindex to index with field level security is forbidden":

  - do:
      index:
        index:   dest
        id:      "1"
        body:    { "text": "test" }
  - do:
      indices.refresh: {}

  - do:
      headers: {es-security-runas-user: can_not_see_hidden_fields_user}
      reindex:
        body:
          source:
            index: dest
          dest:
            index: source

---
"Reindex wait_for_completion=false as minimal with task API":

  - do:
      index:
        index:   source
        id:      "1"
        body:    { "text": "test" }
  - do:
      indices.refresh: {}

  - do:
      headers: {es-security-runas-user: minimal_with_task_user}
      reindex:
        refresh: true
        wait_for_completion: false
        body:
          source:
            index: source
          dest:
            index: dest
  - set: {task: task}

  - do:
      headers: {es-security-runas-user: minimal_with_task_user}
      tasks.get:
        wait_for_completion: true
        task_id: $task
  - match: {response.created: 1}

  - do:
      search:
        index: dest
        rest_total_hits_as_int: true
        body:
          query:
            match:
              text: test
  - match: { hits.total: 1 }

  # the minimal user doesn't have permission to read the tasks API
  - do:
      headers: {es-security-runas-user: minimal_user}
      catch: forbidden
      tasks.get:
        task_id: $task

---
"Reindex wait_for_completion=false as minimal with reindex get API":
  - requires:
      test_runner_features: [capabilities]
      reason: Dedicated reindex GET requires reindex management API
      capabilities:
        - method: GET
          path: /_reindex/{task_id}
          capabilities: [reindex_management_api]

  - do:
      index:
        index:   source
        id:      "1"
        body:    { "text": "test" }
  - do:
      indices.refresh: {}

  - do:
      headers: {es-security-runas-user: minimal_with_reindex_get_user}
      reindex:
        refresh: true
        wait_for_completion: false
        body:
          source:
            index: source
          dest:
            index: dest
  - set: {task: task}

  - do:
      headers: {es-security-runas-user: minimal_with_reindex_get_user}
      reindex_get:
        task_id: $task
        wait_for_completion: true
        human: true
  # Assert the dedicated GET /_reindex/{task_id} (human) response matches a finished reindex
  - is_true: completed
  - match: { id: $task }
  - match: { description: "reindex from [source] to [dest]" }
  - match: { cancelled: false }
  - exists: start_time
  - exists: start_time_in_millis
  - exists: running_time
  - exists: running_time_in_nanos
  - exists: status
  - is_false: error
  - match: { response.total: 1 }
  - gt: { response.took: 0 }
  - match: { response.batches: 1 }
  - match: { response.failures: [ ] }
  - match: { response.timed_out: false }

  - do:
      search:
        index: dest
        rest_total_hits_as_int: true
        body:
          query:
            match:
              text: test
  - match: { hits.total: 1 }

  # the minimal user doesn't have permission to call the dedicated reindex GET API
  - do:
      headers: {es-security-runas-user: minimal_user}
      catch: forbidden
      reindex_get:
        task_id: $task

---
"List reindex works with only reindex/list permission":
  - requires:
      test_runner_features: [capabilities]
      reason: Dedicated reindex list requires reindex management API
      capabilities:
        - method: GET
          path: /_reindex
          capabilities: [reindex_management_api]

  - do:
      bulk:
        refresh: true
        body:
          - '{ "create": { "_index": "source"} }'
          - '{ "text": "test" }'
          - '{ "create": { "_index": "source"} }'
          - '{ "text": "test" }'
          - '{ "create": { "_index": "source"} }'
          - '{ "text": "test" }'
          - '{ "create": { "_index": "source"} }'
          - '{ "text": "test" }'
          - '{ "create": { "_index": "source"} }'
          - '{ "text": "test" }'

  - do:
      headers: {es-security-runas-user: minimal_with_reindex_list_user}
      reindex:
        wait_for_completion: false
        requests_per_second: 0.000001
        body:
          source:
            index: source
            size: 1
          dest:
            index: dest
  - set: {task: task}

  - do:
      headers: {es-security-runas-user: minimal_with_reindex_list_user}
      reindex_list:
        human: true
        detailed: true
  - is_true: reindex
  - length: { reindex: 1 }
  - match: { reindex.0.id: $task }
  - match: { reindex.0.description: "reindex from [source] to [dest]" }
  - match: { reindex.0.cancelled: false }
  - is_false: reindex.0.original_task_id
  - is_false: reindex.0.original_start_time
  - is_false: reindex.0.original_start_time_in_millis
  - exists: reindex.0.start_time
  - exists: reindex.0.start_time_in_millis
  - exists: reindex.0.running_time
  - exists: reindex.0.running_time_in_nanos
  - exists: reindex.0.status

  # rethrottle as admin to speed up, then wait for completion to clean up
  - do:
      reindex_rethrottle:
        task_id: $task
        requests_per_second: -1
  - do:
      reindex_get:
        task_id: $task
        wait_for_completion: true

---
"List reindex forbidden without reindex/list permission":
  - requires:
      test_runner_features: [capabilities]
      reason: Dedicated reindex list requires reindex management API
      capabilities:
        - method: GET
          path: /_reindex
          capabilities: [reindex_management_api]

  - do:
      headers: {es-security-runas-user: minimal_user}
      catch: forbidden
      reindex_list: {}

---
"List reindex forbidden for user with task permissions but no reindex/list permission":
  - requires:
      test_runner_features: [capabilities]
      reason: Dedicated reindex list requires reindex management API
      capabilities:
        - method: GET
          path: /_reindex
          capabilities: [reindex_management_api]

  - do:
      headers: {es-security-runas-user: minimal_with_task_user}
      catch: forbidden
      reindex_list: {}


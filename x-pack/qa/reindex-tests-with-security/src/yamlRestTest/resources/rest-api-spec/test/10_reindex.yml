  - do:
      bulk:
        refresh: true
        body:
          - '{ "create": { "_index": "source"} }'
          - '{ "text": "test" }'
          - '{ "create": { "_index": "source"} }'
          - '{ "text": "test" }'
          - '{ "create": { "_index": "source"} }'
          - '{ "text": "test" }'
          - '{ "create": { "_index": "source"} }'
          - '{ "text": "test" }'
          - '{ "create": { "_index": "source"} }'
          - '{ "text": "test" }'

  - do:
      headers: {es-security-runas-user: minimal_with_reindex_rethrottle_user}
      reindex:
        wait_for_completion: false
        requests_per_second: 0.000001
        body:
          source:
            index: source
            size: 1
          dest:
            index: dest
  - set: {task: task}

  - do:
      headers: {es-security-runas-user: minimal_with_reindex_rethrottle_user}
      reindex_rethrottle:
        task_id: $task
        requests_per_second: -1

  # wait for completion and clean up
  - do:
      tasks.get:
        wait_for_completion: true
        task_id: $task


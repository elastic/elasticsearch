# All cluster rights
# All operations on all indices
# Run as all users
admin:
  cluster:
    - all
  indices:
    - names: '*'
      privileges: [ all ]
  run_as:
    - '*'

# Search and write on both source and destination indices. It should work if you could just search on the source and
# write to the destination but that isn't how security works.
minimal:
  cluster:
    - cluster:monitor/main
  indices:
    - names: source
      privileges:
        - read
        - write
        - create_index
        - indices:admin/refresh
    - names: dest
      privileges:
        - read
        - write
        - create_index
        - indices:admin/refresh

# Search and write on both source and destination indices. It should work if you could just search on the source and
# write to the destination but that isn't how security works.
minimal_with_task:
  cluster:
    - cluster:monitor/main
    - cluster:monitor/task/get
  indices:
    - names: source
      privileges:
        - read
        - write
        - create_index
        - indices:admin/refresh
    - names: dest
      privileges:
        - read
        - write
        - create_index
        - indices:admin/refresh

# Just the dedicated reindex task API (GET /_reindex/{task_id}) which calls the GET /_tasks API beneath the hood.
reindex_get_only:
  cluster:
    - cluster:monitor/reindex/get

# Just the dedicated reindex list API (GET /_reindex)
reindex_list_only:
  cluster:
    - cluster:monitor/reindex/list

# Just the dedicated reindex rethrottle API (POST /_reindex/{task_id}/_rethrottle)
reindex_rethrottle_only:
  cluster:
    - cluster:admin/reindex/rethrottle

# Just the dedicated reindex cancel API (POST /_reindex/{task_id}/_cancel).
reindex_cancel_only:
  cluster:
    - cluster:admin/reindex/cancel

# Read only operations on indices
readonly:
  cluster:
    - cluster:monitor/main
  indices:
    - names: '*'
      privileges: [ read ]

# Write operations on destination index, none on source index
dest_only:
  cluster:
    - cluster:monitor/main
  indices:
    - names: dest
      privileges: [ write ]

# Search and write on both source and destination indices with document level security filtering out some docs.
can_not_see_hidden_docs:
  cluster:
    - cluster:monitor/main
  indices:
    - names: source
      privileges:
        - read
        - write
        - create_index
        - indices:admin/refresh
      query:
        bool:
          must_not:
            match:
              hidden: true
    - names: dest
      privileges:
        - read
        - write
        - create_index
        - indices:admin/refresh

# Search and write on both source and destination indices with field level security.
can_not_see_hidden_fields:
  cluster:
    - cluster:monitor/main
  indices:
    - names: source
      privileges:
        - read
        - write
        - create_index
        - indices:admin/refresh
      field_security:
        grant:
          - foo
          - bar
    - names: dest
      privileges:
        - read
        - write
        - create_index
        - indices:admin/refresh
